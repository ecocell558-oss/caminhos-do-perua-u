  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    const firebaseConfig = {
      apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg",
      authDomain: "caminhos-peruacu-blog.firebaseapp.com",
      projectId: "caminhos-peruacu-blog",
      storageBucket: "caminhos-peruacu-blog.firebasestorage.app",
      messagingSenderId: "427400451429",
      appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c"
    };
    try {
      const app = initializeApp(firebaseConfig, 'central-colaborador');
      const db = getFirestore(app);
      const auth = getAuth(app);
      let firebaseUserEmail = '';
      onAuthStateChanged(auth, user => { firebaseUserEmail = user?.email || ''; });
      const postsCollection = collection(db, 'posts');
      const chatCollection = collection(db, 'central_chat');
      window.cpBlogApi = {
        get userEmail() { return firebaseUserEmail; },
        async signIn(email, password) { const result = await signInWithEmailAndPassword(auth, email, password); firebaseUserEmail = result.user.email || email; return firebaseUserEmail; },
        async publishPost(postData) {
          const normalized = {
            title: postData.title || postData.titulo || 'Publicação do colaborador',
            category: postData.category || postData.categoria || 'COLABORADOR',
            excerpt: postData.excerpt || postData.resumo || '',
            full: postData.full || postData.texto || '',
            img: postData.img || '',
            video: postData.video || '',
            link: postData.link || '',
            gallery: Array.isArray(postData.gallery) ? postData.gallery : [],
            galleryLayout: Number(postData.galleryLayout || 3),
            autoCarousel: Boolean(postData.autoCarousel),
            isFeatured: Boolean(postData.isFeatured),
            author: postData.author || 'Central do Colaborador',
            source: 'central-colaborador',
            date: new Date().toISOString()
          };
          const ref = await addDoc(postsCollection, normalized);
          return { id: ref.id, ...normalized };
        },
        async loadPosts() { const snap = await getDocs(query(postsCollection, orderBy('date', 'desc'))); const items = []; snap.forEach(doc => items.push({ id: doc.id, ...doc.data() })); return items; }, async sendChatMessage(message) { await addDoc(chatCollection, message); return true; }, async loadChatMessages() { const snap = await getDocs(query(chatCollection, orderBy('time', 'asc'))); const items = []; snap.forEach(doc => items.push({ id: doc.id, ...doc.data() })); return items; }
      };
      window.dispatchEvent(new CustomEvent('cpBlogApiReady'));
    } catch (error) {
      console.error('Erro ao conectar a Central ao Firebase do blog:', error);
      window.cpBlogApiError = error;
    }
  </script>

 function permute(arr,seed){const orders=[[0,1,2,3],[1,2,3,0],[2,3,0,1],[3,0,1,2],[1,3,0,2],[2,0,3,1],[3,1,2,0],[0,2,1,3]];return orders[seed%orders.length].map(i=>arr[i])}

let currentUser=null,currentTab='dashboard',currentModule=1,currentPage=0;function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function userKey(email){return String(email||'').trim().toLowerCase()}function emptyUser(nome='',email='',cidade=''){return{points:0,profile:{nome,email,cidade,telefone:'',bio:'Colaborador do projeto Caminhos do Peruaçu.'},training:{answered:{},bonus:[],completedAt:{}},tasks:JSON.parse(JSON.stringify(defaultTasks)),partners:[],contents:[]}}let db=load('cpCentralDB',{users:{},creds:{},certs:[],settings:{whatsappConteudos:'',whatsappForum:''},materials:materials.map((m,i)=>({id:i+1,titulo:m[0],descricao:m[1],link:'',ativo:true})),chat:[]});db.users=db.users||{};db.creds=db.creds||{};if(db.users.colaborador&&db.users.colaborador.profile?.email==='colaborador@caminhosdoperuacu.com.br')delete db.users.colaborador;db.collaborators=[];db.chat=(db.chat||[]).filter(m=>!['Mariana Lopes','Carlos Pereira','Bianca Souza','Rafael Mendes','Joana Alves'].includes(m.user));db.settings=db.settings||{whatsappConteudos:'',whatsappForum:''};db.materials=db.materials||materials.map((m,i)=>({id:i+1,titulo:m[0],descricao:m[1],link:'',ativo:true}));db.certs=db.certs||[];Object.values(db.users).forEach(x=>{x.training=x.training||{answered:{},bonus:[],completedAt:{}};x.training.answered=x.training.answered||{};x.training.completedAt=x.training.completedAt||{};x.tasks=x.tasks||JSON.parse(JSON.stringify(defaultTasks));x.partners=x.partners||[];x.contents=x.contents||[]});saveDB();function u(){if(currentUser?.role==='colaborador'){const key=userKey(currentUser.email);db.users[key]=db.users[key]||emptyUser(currentUser.nome,currentUser.email,currentUser.cidade);return db.users[key]}const first=Object.keys(db.users)[0];return first?db.users[first]:emptyUser('Colaborador','','')}function userEntries(){return Object.entries(db.users||{})}function totalAnswered(){return Object.keys(u().training.answered||{}).length}function level(points=u().points){return LEVELS.slice().reverse().find(x=>points>=x[1])[0]}function nextLevel(){return LEVELS.find(x=>u().points<x[1])||LEVELS[LEVELS.length-1]}function addPoints(n,why){u().points+=n;saveDB();toast('+'+n+' pontos: '+why);renderAll()}function saveDB(){save('cpCentralDB',db)}
document.getElementById('loginForm').onsubmit=e=>{e.preventDefault();const email=userKey(document.getElementById('email').value),senha=document.getElementById('senha').value,c=CREDS[email]||db.creds[email];if(!c||c.senha!==senha)return toast('Login inválido. Confira e-mail e senha.');currentUser={email,role:c.role,nome:c.nome,cidade:c.cidade};localStorage.setItem('cpSession',JSON.stringify(currentUser));startApp()};

function touchPresence(){if(!currentUser)return;const p=load('cpPresence',{});p[meId()]={id:meId(),nome:currentProfile().nome,cidade:currentProfile().cidade||currentUser.cidade,role:currentUser.role,last:Date.now()};save('cpPresence',p)}
function onlineUsers(){const p=load('cpPresence',{}),now=Date.now();return Object.values(p).filter(x=>now-x.last<45000)}
function allPeople(){const admin={id:'admin',nome:'Administrador',cidade:'Itacarambi',nivel:'Admin',pontos:'-',bio:'Aprova conteúdos, certificados e gerencia a plataforma.'};return [admin,...userEntries().map(([email,user])=>({id:email,nome:user.profile.nome,cidade:user.profile.cidade,nivel:level(user.points),pontos:user.points,bio:user.profile.bio,me:currentUser?.email===email}))]}window.addEventListener('storage',e=>{if(['cpCentralDB','cpPresence'].includes(e.key)&&currentUser)renderAll()});setInterval(()=>{touchPresence();if(currentTab==='comunidade')renderCommunity()},15000);function startApp(){touchPresence();document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';document.body.classList.toggle('is-admin',currentUser.role==='admin');renderNav();renderAll();showTab('dashboard')}function logout(){localStorage.removeItem('cpSession');location.reload()}function toggleMenu(){document.getElementById('sidebar').classList.toggle('open')}function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toastbox').appendChild(t);setTimeout(()=>t.remove(),3300)}function confetti(){const c=document.getElementById('confetti');for(let i=0;i<90;i++){let s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.background=['#F5B81B','#1E3A2F','#fff','#39a66a'][i%4];s.style.animationDelay=Math.random()*.35+'s';c.appendChild(s);setTimeout(()=>s.remove(),2300)}}function renderNav(){document.getElementById('nav').innerHTML=navItems.map(x=>`<button class="${x[0]===currentTab?'active':''} ${x[0]==='admin'?'admin-only':''}" onclick="showTab('${x[0]}')"><span>${x[1]}</span>${x[2]}</button>`).join('')}function showTab(id){currentTab=id;document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));document.getElementById('pageTitle').textContent=navItems.find(x=>x[0]===id)[2];document.getElementById('sidebar').classList.remove('open');renderNav();renderAll()}
function renderAll(){if(!currentUser)return;document.getElementById('sideName').textContent=currentUser.role==='admin'?'Administrador':u().profile.nome;document.getElementById('sideLevel').textContent=currentUser.role==='admin'?'Painel administrativo':level();document.getElementById('sidePoints').textContent=currentUser.role==='admin'?'Admin':u().points+' pontos';renderDashboard();renderTraining();renderMaterials();renderContents();renderTasks();renderPartners();renderRanking();renderCerts();renderCommunity();renderProfile();renderBlog();renderAdmin()}
function renderDashboard(){const doneTasks=u().tasks.filter(t=>t.done).length,closed=u().partners.filter(p=>p.status==='Aprovado').length,ans=totalAnswered(),nl=nextLevel(),pct=nl[1]===0?100:Math.min(100,Math.round(u().points/nl[1]*100));document.getElementById('dashboard').innerHTML=`<div class="grid"><div class="card stat"><span>Pontos</span><b>${u().points}</b></div><div class="card stat"><span>Nível</span><b>${level()}</b></div><div class="card stat"><span>Treino</span><b>${ans}/500</b></div><div class="card stat"><span>Tarefas / Parceiros</span><b>${doneTasks}/${u().tasks.length} · ${closed}</b></div></div><div class="card" style="margin-top:16px"><div class="item-head"><div><h2>Progresso até ${nl[0]}</h2><p class="hint">Pontuação dinâmica atualizada em tempo real.</p></div><span class="pill gold">${pct}%</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>`}
function canRetakeModule(id){const t=u().training.completedAt?.[id];return t&&Date.now()-new Date(t).getTime()>=RETAKE_MS}
function retakeModule(id){if(!canRetakeModule(id))return toast('Este módulo poderá ser refeito 48h após a conclusão.');Object.keys(u().training.answered).forEach(k=>{if(k.startsWith(id+'-'))delete u().training.answered[k]});delete u().training.completedAt[id];currentModule=id;currentPage=0;saveDB();toast('Módulo liberado para refazer e pontuar novamente.');renderAll()}
function renderTraining(){const m=modules.find(x=>x.id===currentModule),prog=m.questions.filter((_,i)=>u().training.answered[currentModule+'-'+i]?.correct).length,start=currentPage*10,qs=m.questions.slice(start,start+10),total=totalAnswered(),phrase=prog<25?'Vamos construir a base com calma.':'Ótimo ritmo. Agora transforme conhecimento em segurança para orientar visitantes e parceiros.',completedAt=u().training.completedAt?.[currentModule],next=completedAt?new Date(new Date(completedAt).getTime()+RETAKE_MS):null;document.getElementById('treinamento').innerHTML=`<div class="training-hero"><div><h2 style="color:#fff;margin:0 0 8px">Sala de Formação do Colaborador</h2><p style="margin:0;color:#eef7f0">${phrase} Sua missão atual é concluir 10 questões desta página, revisar as explicações e avançar no mapa de aprendizagem.</p><div class="actions"><span class="pill gold">${total}/500 questões</span><span class="pill gold">Módulo ${currentModule}: ${prog}/100</span><span class="pill gold">Módulo completo: ${MODULE_POINTS[currentModule-1]} pontos</span>${completedAt?`<span class="pill gold">Refazer após ${next.toLocaleString('pt-BR')}</span>`:''}</div></div></div><div class="lesson-path">${modules.map(mm=>{const done=mm.questions.filter((_,i)=>u().training.answered[mm.id+'-'+i]?.correct).length,ready=canRetakeModule(mm.id);return`<button class="lesson-node ${mm.id===currentModule?'active':''} ${done===100?'done':''}" onclick="currentModule=${mm.id};currentPage=0;renderTraining()"><b>${mm.id}. ${mm.title}</b><br><small>${done}/100 concluídas · ${MODULE_POINTS[mm.id-1]} pts</small>${ready?'<br><small>Disponível para refazer</small>':''}<div class="bar" style="margin-top:8px"><i style="width:${done}%"></i></div></button>`}).join('')}</div><div class="card"><div class="item-head"><div><b>Aula ${currentPage+1} de 10 · ${m.title}</b><p class="hint">Responda com atenção. Se errar, revise a explicação e tente novamente.</p></div><span class="pill gold">${prog}% do módulo</span></div><div class="bar"><i style="width:${prog}%"></i></div>${canRetakeModule(currentModule)?`<div class="actions"><button class="secondary" onclick="retakeModule(${currentModule})">Refazer módulo e pontuar novamente</button></div>`:''}</div><div class="quiz-tools"><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage--;renderTraining()">← Aula anterior</button><strong>Questões ${start+1} a ${start+qs.length}</strong><button class="ghost" ${currentPage===9?'disabled':''} onclick="currentPage++;renderTraining()">Próxima aula →</button></div>${qs.map((q,idx)=>renderQ(q,start+idx)).join('')}`}
function renderQ(q,idx){const key=currentModule+'-'+idx,answered=u().training.answered[key],locked=answered?.correct;return `<div class="card q-card"><div class="quiz-question"><span class="pill gold">Missão ${idx+1}</span><br>${q.pergunta}</div><div class="alts">${q.alternativas.map((a,i)=>`<button class="alt ${answered?(i===q.correta?'correct':(i===answered.choice?'wrong':'')):''}" ${locked?'disabled':''} onclick="answerQ(${idx},${i})">${'ABCD'[i]}) ${a}</button>`).join('')}</div>${answered?`<div class="explain"><b>${answered.correct?'Resposta perfeita.':'Quase lá. Resposta correta: '+('ABCD'[q.correta])+'.'}</b> ${q.explicacao}</div>`:''}</div>`}
function answerQ(idx,choice){const q=modules[currentModule-1].questions[idx],key=currentModule+'-'+idx;if(u().training.answered[key]?.correct)return;const ok=choice===q.correta;u().training.answered[key]={choice,correct:ok};const completed=modules[currentModule-1].questions.every((_,i)=>u().training.answered[currentModule+'-'+i]?.correct);if(completed&&!u().training.completedAt[currentModule]){const pts=MODULE_POINTS[currentModule-1]||40;u().training.completedAt[currentModule]=new Date().toISOString();u().points+=pts;toast('Módulo completo! +'+pts+' pontos. Poderá refazer em 48h.');confetti()}else toast(ok?'Resposta correta registrada.':'Resposta registrada. Leia a explicação e tente novamente.');saveDB();renderAll()}function renderMaterials(){document.getElementById('materiais').innerHTML=`<h2>Materiais para download</h2><p class="hint">Materiais gerenciados pelo painel admin. O download pode ser simulado ou abrir um link configurado.</p><div class="list">${(db.materials||[]).filter(m=>m.ativo!==false).map(m=>`<div class="item item-head"><div><b>${m.titulo}</b><p class="hint">${m.descricao}</p></div><button class="secondary" onclick="${m.link?`window.open('${m.link}','_blank')`:`alert('Download simulado: ${m.titulo}');toast('Download simulado: ${m.titulo}')`}">${m.link?'Abrir':'Baixar'}</button></div>`).join('')||'<div class="empty">Nenhum material cadastrado.</div>'}</div>`}
function saveMaterial(e){e.preventDefault();const id=matId.value?Number(matId.value):Date.now();const found=db.materials.find(m=>m.id===id);const data={id,titulo:matTitulo.value,descricao:matDesc.value,link:matLink.value,ativo:matAtivo.checked};if(found)Object.assign(found,data);else db.materials.push(data);saveDB();toast(found?'Material atualizado.':'Material adicionado.');renderAdmin();renderMaterials()}

function deleteMaterial(id){if(!confirm('Remover este material?'))return;db.materials=db.materials.filter(m=>m.id!==id);saveDB();toast('Material removido.');renderAdmin();renderMaterials()}function blogPostFromContent(c){return{title:c.titulo,category:c.categoria,excerpt:c.resumo||'',full:c.texto||'',img:c.img||'',video:c.video||'',link:c.link||'',gallery:c.gallery||[],galleryLayout:c.galleryLayout||3,autoCarousel:!!c.autoCarousel,isFeatured:!!c.isFeatured,author:u().profile.nome}}
function renderContents(){document.getElementById('conteudos').innerHTML=`<div class="split"><form class="card" onsubmit="addContent(event)"><h2>Painel de postagem do blog</h2><p class="hint">A prévia abaixo atualiza em tempo real para o colaborador ver como o post está ficando antes de solicitar publicação.</p><label>Título *</label><input id="ctitulo" required oninput="updatePostPreview()"><label>Categoria</label><input id="ccat" value="COLABORADOR" oninput="updatePostPreview()"><label>Resumo</label><textarea id="cresumo" rows="2" style="min-height:72px" oninput="updatePostPreview()"></textarea><label>Conteúdo (HTML)</label><textarea id="ctexto" required placeholder="<p>Escreva aqui a matéria...</p>" oninput="updatePostPreview()"></textarea><label>Imagem capa (URL)</label><input id="cimg" placeholder="https://..." oninput="updatePostPreview()"><label>Vídeo (URL YouTube/Vimeo - opcional)</label><input id="cvideo" placeholder="https://www.youtube.com/embed/..."><label>Link externo (opcional)</label><input id="clink" placeholder="https://..."><label>Galeria (uma URL por linha, máx. 6)</label><textarea id="cgallery" rows="3" style="min-height:86px"></textarea><label>Layout da galeria</label><select id="clayout"><option value="2">2 colunas</option><option value="3" selected>3 colunas</option><option value="4">4 colunas</option></select><div class="actions"><label style="display:flex;gap:8px;align-items:center;margin:0"><input id="ccarousel" type="checkbox" style="width:auto"> Carrossel automático</label><label style="display:flex;gap:8px;align-items:center;margin:0"><input id="cfeatured" type="checkbox" style="width:auto"> Destaque no blog</label></div><button class="secondary" style="margin-top:12px">Solicitar publicação</button></form><div><div class="card" style="margin-bottom:16px"><h2>Prévia ao vivo</h2><div id="postLivePreview" class="item"><p class="hint">Comece a preencher o post para ver a prévia.</p></div></div><h2>Minhas solicitações de postagem</h2><div class="list">${u().contents.length?u().contents.map(c=>`<div class="item"><div class="item-head"><div><b>${c.titulo}</b><p class="hint">${c.categoria} · ${c.resumo||'Sem resumo'}</p></div><span class="pill ${c.status==='Aprovado'?'ok':c.status==='Rejeitado'?'bad':'gold'}">${c.blogStatus==='Publicado'?'Publicado no blog':c.status}</span></div><p class="hint">${c.blogStatus==='Publicado'?'Post publicado no Firebase do blog e disponível no blog.html.':c.blogStatus==='Erro'?'Aprovado, mas houve erro ao publicar no blog. Reaprove pelo admin após verificar internet/Firebase.':'Aguardando análise do administrador.'}</p><div class="actions">${c.blogId?`<button class="ghost" onclick="window.open('blog.html?p=${c.blogId}','_blank')">Ver no blog</button>`:''}<button class="ghost" onclick="previewContent(${c.id})">Prévia</button></div></div>`).join(''):'<div class="empty">Nenhum conteúdo enviado ainda.</div>'}</div></div></div>`;setTimeout(updatePostPreview,50)}
function updatePostPreview(){const box=document.getElementById('postLivePreview');if(!box)return;const title=document.getElementById('ctitulo')?.value||'Título da publicação';const cat=document.getElementById('ccat')?.value||'COLABORADOR';const resumo=document.getElementById('cresumo')?.value||'Resumo da publicação aparecerá aqui.';const text=document.getElementById('ctexto')?.value||'<p>O conteúdo completo do post será exibido nesta área.</p>';const img=document.getElementById('cimg')?.value||'';box.innerHTML=`<span class="pill gold">${cat}</span><h2 style="margin:12px 0;color:var(--secondary)">${title}</h2><p class="hint">${resumo}</p>${img?`<img src="${img}" style="width:100%;max-height:260px;object-fit:cover;border-radius:14px;margin:10px 0" onerror="this.style.display='none'">`:''}<div style="border-top:1px solid var(--line);padding-top:12px;margin-top:12px">${text}</div>`}
function addContent(e){e.preventDefault();const gallery=cgallery.value.split(/\n+/).map(x=>x.trim()).filter(Boolean).slice(0,6);u().contents.push({id:Date.now(),titulo:ctitulo.value,categoria:ccat.value||'COLABORADOR',resumo:cresumo.value,texto:ctexto.value,img:cimg.value,video:cvideo.value,link:clink.value,gallery,galleryLayout:Number(clayout.value||3),autoCarousel:ccarousel.checked,isFeatured:cfeatured.checked,status:'Pendente',blogStatus:'Aguardando aprovação',blogId:'',awarded:false});saveDB();toast('Postagem enviada para aprovação.');renderAll()}function previewContent(id){const c=u().contents.find(x=>x.id===id);if(!c)return;const w=window.open('','_blank');w.document.write(`<title>${c.titulo}</title><body style="font-family:Arial;padding:24px;max-width:860px;margin:auto"><p style="font-weight:bold;color:#D99F0C">${c.categoria}</p><h1>${c.titulo}</h1><p>${c.resumo||''}</p>${c.img?`<img src="${c.img}" style="max-width:100%;border-radius:12px">`:''}<main>${c.texto||''}</main></body>`);w.document.close()}function renderTasks(){document.getElementById('tarefas').innerHTML=`<h2>Tarefas</h2><div class="list">${u().tasks.map(t=>`<div class="item item-head"><div><b>${t.titulo}</b><p class="hint">${t.descricao}</p><span class="pill gold">${t.pontos} pontos</span></div><button class="${t.done?'ghost':'secondary'}" ${t.done?'disabled':''} onclick="doneTask(${t.id})">${t.done?'Concluída':'Concluir'}</button></div>`).join('')}</div>`}function doneTask(id){let t=u().tasks.find(x=>x.id===id);if(t.done)return;t.done=true;addPoints(t.pontos,'tarefa concluída')}

function showPartnerHelp(){alert('Fluxo de parceiros:\n\n1. O colaborador capta um cliente/parceiro para aparecer no app Peruaçu, uma vitrine online.\n2. O parceiro assina a ordem de serviço autorizando a postagem do serviço no app.\n3. O parceiro escolhe e paga um plano: Comum R$ 69,90/mês ou Premium R$ 149,90/mês com destaque.\n4. O colaborador cadastra o parceiro na plataforma e anexa ordem de serviço e comprovante Pix.\n5. O admin aprova ou rejeita. Após aprovado, o parceiro fica salvo na lista do colaborador e o admin adiciona o serviço manualmente no painel do app.')} 
function readFileData(input){return new Promise(resolve=>{const f=input?.files?.[0];if(!f)return resolve('');const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=()=>resolve('');r.readAsDataURL(f)})}
function renderPartners(){document.getElementById('parceiros').innerHTML=`${helpPartners()}<div class="blog-hero"><h2>Captação de parceiros para o app Peruaçu</h2><p>Cadastre clientes captados para publicação na vitrine online. A aprovação depende da ordem de serviço assinada, pagamento do plano e comprovante Pix.</p><div class="actions"><span class="pill gold">Plano comum: R$ 69,90/mês</span><span class="pill gold">Plano premium: R$ 149,90/mês</span></div></div><div class="split" style="margin-top:16px"><form class="card" onsubmit="addPartner(event)"><h2>Cadastrar parceiro captado</h2><label>Nome do parceiro/cliente</label><input id="pnome" required><label>Categoria</label><select id="pcat"><option>Pousada</option><option>Restaurante</option><option>Guia</option><option>Artesanato</option><option>Agência</option><option>Outros</option></select><label>Cidade</label><input id="pcidade" required><label>Contato</label><input id="pcontato" required><label>Plano contratado</label><select id="pplano"><option value="Comum|69.90">Comum - R$ 69,90/mês</option><option value="Premium|149.90">Premium - postagem + destaque - R$ 149,90/mês</option></select><label>Ordem de serviço assinada (imagem/PDF)</label><input id="pos" type="file" accept="image/*,.pdf"><label>Comprovante Pix (imagem/PDF)</label><input id="ppix" type="file" accept="image/*,.pdf"><label>Observações</label><textarea id="pobs" placeholder="Detalhes do serviço, endereço, Instagram, descrição para o app..."></textarea><button class="secondary">Enviar para aprovação</button></form><div><h2>Meus parceiros</h2><div class="list">${u().partners.length?u().partners.map(p=>`<div class="item"><div class="item-head"><div><b>${p.nome}</b><p class="hint">${p.categoria} · ${p.cidade} · ${p.contato}</p><p class="hint">${p.plano||'Plano não informado'} · ${p.valor?('R$ '+Number(p.valor).toFixed(2).replace('.',',')) : ''}</p></div><span class="pill ${p.status==='Aprovado'?'ok':p.status==='Rejeitado'?'bad':'gold'}">${p.status||'Pendente'}</span></div><p class="hint">${p.status==='Aprovado'?'Aprovado. O admin adicionará o serviço manualmente no app Peruaçu.':p.status==='Rejeitado'?'Cadastro rejeitado. Verifique as orientações do admin.':'Aguardando aprovação do admin.'}</p><div class="actions">${p.osData?`<button class="ghost" onclick="openAttachment(${p.id},'osData')">Ver ordem</button>`:''}${p.pixData?`<button class="ghost" onclick="openAttachment(${p.id},'pixData')">Ver Pix</button>`:''}</div></div>`).join(''):'<div class="empty">Nenhum parceiro cadastrado.</div>'}</div></div></div>`}
async function addPartner(e){e.preventDefault();const [plano,valor]=pplano.value.split('|');const osData=await readFileData(pos),pixData=await readFileData(ppix);u().partners.push({id:Date.now(),nome:pnome.value,categoria:pcat.value,cidade:pcidade.value,contato:pcontato.value,plano,valor:Number(valor),obs:pobs.value,osData,pixData,status:'Pendente',awarded:false,createdAt:new Date().toISOString()});saveDB();toast('Parceiro enviado para aprovação do admin.');renderAll()}
function openAttachment(id,field){const p=u().partners.find(x=>x.id===id);if(!p||!p[field])return toast('Anexo não encontrado.');const w=window.open('','_blank');if(p[field].startsWith('data:application/pdf'))w.document.write(`<iframe src="${p[field]}" style="width:100%;height:100vh;border:0"></iframe>`);else w.document.write(`<img src="${p[field]}" style="max-width:100%;height:auto">`);w.document.close()}
function approvePartner(id,ok){const p=u().partners.find(x=>x.id===id);if(!p)return;p.status=ok?'Aprovado':'Rejeitado';if(ok&&!p.awarded){p.awarded=true;u().points+=100;toast('Parceiro aprovado. +100 pontos para o colaborador.')}else toast(ok?'Parceiro aprovado.':'Parceiro rejeitado.');saveDB();renderAll()}function renderRanking(){const rows=[...seedRanking,{nome:u().profile.nome,cidade:u().profile.cidade,pontos:u().points,me:true}].sort((a,b)=>b.pontos-a.pontos);document.getElementById('ranking').innerHTML=`<h2>Ranking de colaboradores</h2><table class="table"><tr><th>#</th><th>Nome</th><th>Cidade</th><th>Pontos</th></tr>${rows.map((r,i)=>`<tr class="${r.me?'me':''}"><td>${i+1}</td><td>${r.nome}${r.me?' (você)':''}</td><td>${r.cidade}</td><td>${r.pontos}</td></tr>`).join('')}</table>`}function renderCerts(){document.getElementById('certificados').innerHTML=`<h2>Certificados</h2><div class="grid">${CERTS.map(c=>`<div class="card"><b>${c[0]}</b><p class="hint">Requer ${c[1]} pontos.</p><button class="secondary" ${u().points<c[1]?'disabled':''} onclick="askCert('${c[0]}',${c[1]})">Solicitar</button></div>`).join('')}</div><h2>Minhas solicitações</h2><div class="list">${db.certs.filter(c=>c.user==='colaborador').map(c=>`<div class="item item-head"><b>${c.nome}</b><span class="pill ${c.status==='Aprovado'?'ok':c.status==='Rejeitado'?'bad':'gold'}">${c.status}</span></div>`).join('')||'<div class="empty">Nenhuma solicitação.</div>'}</div>`}function askCert(nome,pts){if(db.certs.some(c=>c.user==='colaborador'&&c.nome===nome&&c.status!=='Rejeitado'))return toast('Você já solicitou este certificado.');db.certs.push({id:Date.now(),user:'colaborador',usuario:u().profile.nome,nome,pts,status:'Pendente'});saveDB();toast('Certificado solicitado para análise.');renderAll()}
function groupLink(label,link){return `<button class="secondary" onclick="${link?`window.open('${link}','_blank')`:`toast('Link do grupo ${label} ainda não configurado pelo admin.')`}">${link?'Entrar no grupo':'Aguardando link'}</button>`}
function renderCommunity(){const el=document.getElementById('comunidade');if(!el)return;const online=onlineUsers(),people=allPeople();el.innerHTML=`<div class="blog-hero"><h2>Comunidade Caminhos do Peruaçu</h2><p>Colaboradores conectados, grupos oficiais, fórum interno e perfis públicos em um só lugar.</p><div class="actions"><span class="pill gold"><span class="online-dot"></span>${online.length} online agora</span><span class="pill gold">${people.length} perfis</span></div></div><div class="grid" style="margin-top:16px"><div class="group-card"><h3>Grupo de Conteúdos</h3><p class="hint">Espaço para posts de Instagram, Reels, fotos, legendas e materiais de divulgação.</p>${groupLink('de conteúdos',db.settings.whatsappConteudos)}</div><div class="group-card"><h3>Grupo Fórum</h3><p class="hint">Espaço para dúvidas, ideias, alinhamentos e apoio entre colaboradores.</p>${groupLink('fórum',db.settings.whatsappForum)}</div><div class="card stat"><span>Colaboradores online</span><b>${online.length}</b><p class="hint">Atualiza automaticamente enquanto a plataforma está aberta.</p></div><div class="card stat"><span>Mensagens no chat</span><b>${db.chat.length}</b><p class="hint">Chat salvo no navegador via localStorage.</p></div></div><div class="chat-shell" style="margin-top:16px"><div class="card"><h2>Perfis e online</h2><div class="list">${people.map(p=>`<div class="item profile-card"><div class="avatar">${(p.nome||'?').split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div style="flex:1"><b>${online.some(o=>o.id===p.id)?'<span class="online-dot"></span>':''}${p.nome}${p.me?' (você)':''}</b><p class="hint">${p.cidade} · ${p.nivel} · ${p.pontos} pts</p></div><button class="ghost" onclick="openProfile('${p.id}')">Ver</button></div>`).join('')}</div></div><div class="card"><div class="item-head"><div><h2>Chat dos colaboradores</h2><p class="hint">Converse com a equipe dentro da plataforma. Abra em duas abas para ver a atualização em tempo real pelo navegador.</p></div><button class="ghost" onclick="renderCommunity()">Atualizar</button></div><div class="chat-box" id="chatBox">${db.chat.slice(-80).map(m=>`<div class="msg ${m.user===currentProfile().nome?'me':''}"><b>${m.user} · ${m.city||''}</b>${m.text}<br><small>${new Date(m.time).toLocaleString('pt-BR')}</small></div>`).join('')}</div><form class="actions" onsubmit="sendChat(event)"><input id="chatText" placeholder="Escreva uma mensagem para os colaboradores..." required><button class="secondary">Enviar</button></form></div></div>${currentUser?.role==='admin'?`<form class="card" style="margin-top:16px" onsubmit="saveGroups(event)"><h2>Configurar grupos de WhatsApp</h2><label>Link do grupo de conteúdos</label><input id="waConteudos" value="${db.settings.whatsappConteudos}" placeholder="https://chat.whatsapp.com/..."><label>Link do grupo fórum</label><input id="waForum" value="${db.settings.whatsappForum}" placeholder="https://chat.whatsapp.com/..."><button class="secondary">Salvar grupos</button></form>`:''}<div class="modal-back" id="profileModal" onclick="if(event.target.id==='profileModal')closeProfile()"><div class="modal-card" id="profileModalBody"></div></div>`;setTimeout(()=>{const box=document.getElementById('chatBox');if(box)box.scrollTop=box.scrollHeight},50)}
async function sendChat(e){e.preventDefault();const text=chatText.value.trim();if(!text)return;const p=currentProfile(),msg={id:Date.now(),user:p.nome,city:p.cidade,text,time:new Date().toISOString()};db.chat.push(msg);saveDB();try{if(window.cpBlogApi?.sendChatMessage)await window.cpBlogApi.sendChatMessage(msg)}catch(err){console.warn('Chat Firebase indisponível, mantendo localStorage.',err)}toast('Mensagem enviada no chat.');renderCommunity()}
function openProfile(id){const p=allPeople().find(x=>x.id===id);if(!p)return;const online=onlineUsers().some(o=>o.id===p.id);document.getElementById('profileModalBody').innerHTML=`<div class="profile-card"><div class="avatar" style="width:72px;height:72px;font-size:24px">${(p.nome||'?').split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div><h2 style="margin:0;color:var(--secondary)">${p.nome}</h2><p class="hint">${p.cidade} · ${p.nivel} · ${p.pontos} pts</p>${online?'<span class="pill ok"><span class="online-dot"></span>Online agora</span>':'<span class="pill">Offline</span>'}</div></div><p style="margin-top:16px">${p.bio||'Perfil sem bio.'}</p><div class="actions"><button class="secondary" onclick="closeProfile()">Fechar</button></div>`;document.getElementById('profileModal').style.display='flex'}
function closeProfile(){const m=document.getElementById('profileModal');if(m)m.style.display='none'}
function saveGroups(e){e.preventDefault();db.settings.whatsappConteudos=waConteudos.value.trim();db.settings.whatsappForum=waForum.value.trim();saveDB();toast('Grupos de WhatsApp atualizados.');renderCommunity()}function renderProfile(){document.getElementById('perfil').innerHTML=`<form class="card" onsubmit="saveProfile(event)"><h2>Perfil</h2><label>Nome</label><input id="profNome" value="${u().profile.nome}"><label>Cidade</label><input id="profCidade" value="${u().profile.cidade}"><label>Telefone</label><input id="profTel" value="${u().profile.telefone}"><label>Bio</label><textarea id="profBio">${u().profile.bio}</textarea><button class="secondary">Salvar perfil</button></form>`}function saveProfile(e){e.preventDefault();Object.assign(u().profile,{nome:profNome.value,cidade:profCidade.value,telefone:profTel.value,bio:profBio.value});saveDB();toast('Perfil atualizado.');renderAll()}function renderBlog(){document.getElementById('blog').innerHTML=`<div class="blog-hero"><h2>Blog Caminhos do Peruaçu ao vivo</h2><p>Esta visualização abre o blog original sem alterar o arquivo blog.html. Após aprovação, atualize para conferir a publicação.</p><div class="actions"><button class="secondary" onclick="document.getElementById('blogFrame').src='blog.html?central='+Date.now();refreshBlogFeed()">Atualizar blog</button><button class="ghost" onclick="window.open('blog.html','_blank')">Abrir em nova aba</button></div></div><div class="card" style="margin-top:16px;padding:0;overflow:hidden"><iframe id="blogFrame" src="blog.html" title="Blog Caminhos do Peruaçu" style="width:100%;height:720px;border:0;background:#fff"></iframe></div><h2>Posts recentes no Firebase</h2><div id="liveBlogPosts" class="list"><div class="empty">Carregando posts do blog...</div></div>`;setTimeout(refreshBlogFeed,300)}
async function refreshBlogFeed(){const box=document.getElementById('liveBlogPosts');if(!box)return;if(!window.cpBlogApi){box.innerHTML='<div class="empty">Conexão com Firebase ainda carregando. Clique em Atualizar blog em alguns segundos.</div>';return}try{const posts=await window.cpBlogApi.loadPosts();box.innerHTML=posts.slice(0,6).map(p=>`<div class="item item-head"><div><b>${p.title}</b><p class="hint">${p.category||'ECOTURISMO'} · ${new Date(p.date||Date.now()).toLocaleDateString('pt-BR')}</p></div><button class="ghost" onclick="window.open('blog.html?p=${p.id}','_blank')">Ver</button></div>`).join('')||'<div class="empty">Nenhum post encontrado.</div>'}catch(error){box.innerHTML='<div class="empty">Não foi possível carregar os posts recentes: '+error.message+'</div>'}}function blogAuthBox(){const email=window.cpBlogApi?.userEmail||'';return `<div class="card" style="margin-bottom:16px"><h2>Conexão com o blog</h2><p class="hint">Use as mesmas credenciais Firebase do painel Admin Pro do blog. Isso garante publicação quando o Firestore exigir autenticação.</p>${email?`<span class="pill ok">Conectado: ${email}</span>`:`<div class="split" style="grid-template-columns:1fr 1fr auto;align-items:end"><div><label>E-mail Firebase</label><input id="fbEmail" placeholder="admin do blog"></div><div><label>Senha Firebase</label><input id="fbPass" type="password" placeholder="senha do blog"></div><button class="secondary" onclick="connectBlogFirebase()">Conectar</button></div>`}</div>`}
async function connectBlogFirebase(){try{if(!window.cpBlogApi)throw new Error('Firebase ainda carregando.');await window.cpBlogApi.signIn(fbEmail.value,fbPass.value);toast('Central conectada ao Firebase do blog.');renderAdmin()}catch(error){toast('Erro ao conectar ao Firebase do blog: '+error.message)}}function renderAdmin(){if(currentUser?.role!=='admin'){document.getElementById('admin').innerHTML='<div class="card">Acesso restrito ao administrador.</div>';return}let pendingC=u().contents.filter(c=>c.status==='Pendente'||c.blogStatus==='Erro'),pendingCerts=db.certs.filter(c=>c.status==='Pendente'),pendingP=u().partners.filter(p=>(p.status||'Pendente')==='Pendente');document.getElementById('admin').innerHTML=blogAuthBox()+`<h2>Painel administrativo</h2><div class="grid" style="margin-bottom:16px"><div class="card stat"><span>Posts pendentes</span><b>${pendingC.length}</b></div><div class="card stat"><span>Parceiros pendentes</span><b>${pendingP.length}</b></div><div class="card stat"><span>Certificados</span><b>${pendingCerts.length}</b></div><div class="card stat"><span>Materiais</span><b>${db.materials.length}</b></div></div><div class="split"><div><h2>Conteúdos pendentes</h2><div class="list">${pendingC.map(c=>`<div class="item"><b>${c.titulo}</b><p class="hint">${c.categoria} · ${c.resumo||c.texto}</p><div class="actions"><button class="ghost" onclick="previewContent(${c.id})">Prévia</button><button class="ok" onclick="approveContent(${c.id},true)">Aprovar e publicar no blog</button><button class="danger" onclick="approveContent(${c.id},false)">Rejeitar</button></div></div>`).join('')||'<div class="empty">Sem conteúdos pendentes.</div>'}</div><h2 style="margin-top:18px">Parceiros pendentes</h2><div class="list">${pendingP.map(p=>`<div class="item"><b>${p.nome}</b><p class="hint">${p.categoria} · ${p.cidade} · ${p.contato}</p><p class="hint">Plano ${p.plano||'-'} · ${p.valor?('R$ '+Number(p.valor).toFixed(2).replace('.',',')):'valor não informado'}</p><p class="hint">${p.obs||''}</p><div class="actions">${p.osData?`<button class="ghost" onclick="openAttachment(${p.id},'osData')">Ver ordem</button>`:''}${p.pixData?`<button class="ghost" onclick="openAttachment(${p.id},'pixData')">Ver Pix</button>`:''}<button class="ok" onclick="approvePartner(${p.id},true)">Aprovar parceiro</button><button class="danger" onclick="approvePartner(${p.id},false)">Rejeitar</button></div></div>`).join('')||'<div class="empty">Sem parceiros pendentes.</div>'}</div></div><div><h2>Certificados pendentes</h2><div class="list">${pendingCerts.map(c=>`<div class="item"><b>${c.nome}</b><p class="hint">${c.usuario} · requer ${c.pts} pontos</p><div class="actions"><button class="ok" onclick="approveCert(${c.id},true)">Aprovar</button><button class="danger" onclick="approveCert(${c.id},false)">Rejeitar</button></div></div>`).join('')||'<div class="empty">Sem certificados pendentes.</div>'}</div><form class="card" style="margin-top:18px" onsubmit="saveMaterial(event)"><h2>Materiais</h2><input type="hidden" id="matId"><label>Título</label><input id="matTitulo" required><label>Descrição</label><textarea id="matDesc" required></textarea><label>Link ou arquivo local</label><input id="matLink" placeholder="PDF, imagem ou URL"><label style="display:flex;gap:8px;align-items:center"><input id="matAtivo" type="checkbox" checked style="width:auto"> Ativo</label><button class="secondary">Salvar material</button></form><div class="list" style="margin-top:12px">${db.materials.map(m=>`<div class="item"><b>${m.titulo}</b><p class="hint">${m.descricao}</p><span class="pill ${m.ativo!==false?'ok':'bad'}">${m.ativo!==false?'Ativo':'Oculto'}</span><div class="actions"><button class="ghost" onclick="editMaterial(${m.id})">Editar</button><button class="danger" onclick="deleteMaterial(${m.id})">Remover</button></div></div>`).join('')}</div></div></div>`}async function approveContent(id,ok){let c=u().contents.find(x=>x.id===id);if(!c)return;c.status=ok?'Aprovado':'Rejeitado';if(ok){try{if(!window.cpBlogApi)throw new Error('Conexão com Firebase do blog ainda não carregou.');const published=await window.cpBlogApi.publishPost(blogPostFromContent(c));c.blogStatus='Publicado';c.blogId=published.id;if(!c.awarded){c.awarded=true;u().points+=50}toast('Conteúdo aprovado e publicado no blog. +50 pontos para o colaborador.')}catch(error){console.error(error);c.blogStatus='Erro';toast('Conteúdo aprovado, mas não foi possível publicar no blog: '+error.message)}}else{c.blogStatus='Rejeitado';toast('Conteúdo rejeitado.')}saveDB();renderAll()}function approveCert(id,ok){let c=db.certs.find(x=>x.id===id);c.status=ok?'Aprovado':'Rejeitado';saveDB();toast('Certificado '+c.status.toLowerCase()+'.');renderAll()}
const session=load('cpSession',null);if(session){currentUser=session;startApp()}
</script>
</body>
</html>
