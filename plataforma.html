<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Central do Colaborador | Caminhos do Peruaçu</title>
  <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23F5B81B'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='50' fill='%231E3A2F'%3E🌿%3C/text%3E%3C/svg%3E">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#F5B81B;--secondary:#1E3A2F;--bg:#F9F9F9;--card:#fff;--ink:#243029;--muted:#66736c;--line:#e7ebe8;--ok:#198754;--bad:#c0392b;--shadow:0 12px 30px rgba(30,58,47,.1);--r:16px}
    body{font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink)}
    button,input,select,textarea{font:inherit}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--secondary);color:#fff;transition:.2s}
    button:hover{filter:brightness(1.05);transform:translateY(-1px)}
    button.secondary{background:var(--primary);color:var(--secondary)}
    button.ghost{background:#edf1ee;color:var(--secondary)}
    button.danger{background:var(--bad)}
    button.ok{background:var(--ok)}
    button:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left,rgba(245,184,27,.28),transparent 35%),linear-gradient(135deg,#f9f9f9,#eef5f0)}
    .login-card{width:min(460px,100%);background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:30px}
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:22px}
    .brand-logo{width:64px;height:64px;border-radius:18px;object-fit:contain;background:#fff;border:2px solid var(--primary);padding:8px}
    .brand h1{font-size:24px;margin:0;color:var(--secondary)}
    label{display:block;font-weight:800;margin:12px 0 6px}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}
    .hint{font-size:13px;color:var(--muted);margin-top:4px}
    .app{display:none;min-height:100vh}
    .sidebar{position:fixed;inset:0 auto 0 0;width:286px;background:var(--secondary);color:#fff;z-index:10;overflow:auto;transition:.25s;box-shadow:8px 0 24px rgba(0,0,0,.16)}
    .side-head{padding:22px;border-bottom:1px solid rgba(255,255,255,.12)}
    .side-logo{width:74px;height:74px;border-radius:22px;background:#fff;padding:8px;margin-bottom:12px;object-fit:contain}
    .userbox{margin:16px;padding:14px;border-radius:16px;background:rgba(255,255,255,.09)}
    .nav{padding:8px}
    .nav button{width:100%;margin:4px 0;text-align:left;background:transparent;color:#e8f1ec;display:flex;gap:10px;align-items:center}
    .nav button.active,.nav button:hover{background:var(--primary);color:var(--secondary)}
    .logout{margin:16px;width:calc(100% - 32px);background:rgba(255,255,255,.12)}
    .main{margin-left:286px;padding:26px 30px 60px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
    .hamb{display:none}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.02)}
    .stat b{font-size:32px;color:var(--secondary);display:block;margin-top:6px}
    .bar{height:12px;border-radius:99px;background:#e9eee9;overflow:hidden}
    .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#ffd76b);width:0}
    .section{display:none}
    .section.active{display:block}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .list{display:grid;gap:12px}
    .item{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px}
    .item-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
    .pill{display:inline-flex;align-items:center;border-radius:99px;padding:4px 10px;font-size:12px;font-weight:900;background:#eef4ef;color:var(--secondary)}
    .pill.gold{background:#fff1c6}
    .pill.ok{background:#e7f7ee;color:var(--ok)}
    .pill.bad{background:#feeceb;color:var(--bad)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .lesson-path{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
    .lesson-node{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:left;position:relative}
    .lesson-node.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .lesson-node.done:before{content:"✓";position:absolute;right:12px;top:10px;font-weight:bold}
    .alt{display:block;text-align:left;background:#f5f7f5;border:1px solid var(--line);font-weight:600;margin-bottom:8px}
    .alt.correct{background:#dff4e8;border-color:#6bc58f}
    .alt.wrong{background:#fde7e5;border-color:#ec8f86}
    .chat-shell{display:grid;grid-template-columns:320px 1fr;gap:16px}
    .chat-box{height:400px;overflow:auto;background:#fff;border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px}
    .msg{max-width:78%;padding:10px 12px;border-radius:14px;background:#eef4ef}
    .msg.me{align-self:flex-end;background:#fff1c6}
    .online-dot{width:10px;height:10px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:6px}
    .avatar{width:48px;height:48px;border-radius:16px;background:var(--primary);display:grid;place-items:center;font-weight:bold}
    .gallery-preview{display:grid;gap:10px;margin-top:10px}
    .gallery-preview img{width:100%;height:110px;object-fit:cover;border-radius:10px}
    .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:80;padding:18px}
    .modal-card{background:#fff;border-radius:24px;max-width:700px;width:100%;max-height:80vh;overflow:auto;padding:22px}
    .training-hero{background:linear-gradient(135deg,var(--secondary),#2f604e);color:#fff;border-radius:22px;padding:22px;margin-bottom:20px}
    .toastbox{position:fixed;right:18px;bottom:18px;display:grid;gap:8px;z-index:99}
    .toast{background:var(--secondary);color:#fff;padding:12px 18px;border-radius:20px;box-shadow:var(--shadow);font-weight:500}
    .confetti{position:fixed;inset:0;pointer-events:none;z-index:999}
    .confetti span{position:absolute;top:-20px;width:12px;height:16px;background:var(--primary);animation:fall 1.8s linear forwards}
    @keyframes fall{to{transform:translateY(105vh) rotate(720deg)}}
    .admin-only{display:none!important}
    .is-admin .admin-only{display:flex!important}
    @media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}.lesson-path{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:760px){.hamb{display:inline-flex}.sidebar{transform:translateX(-105%)}.sidebar.open{transform:none}.main{margin-left:0;padding:18px}.grid{grid-template-columns:1fr}.split{grid-template-columns:1fr}.chat-shell{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="login" class="login">
  <form class="login-card" id="loginForm">
    <div class="brand"><img class="brand-logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23F5B81B'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='50' fill='%231E3A2F'%3E🌿%3C/text%3E%3C/svg%3E"><div><h1>Central do Colaborador</h1><p>Caminhos do Peruaçu</p></div></div>
    <label>E-mail</label><input id="email" type="email" required>
    <label>Senha</label><input id="senha" type="password" required>
    <button class="secondary" style="width:100%;margin-top:16px">Entrar</button>
    <p class="hint" style="text-align:center;margin-top:12px"><a href="#" onclick="window.resetPasswordEvent()" style="color:var(--primary)">Esqueceu a senha?</a></p>
  </form>
</div>
<div id="app" class="app">
  <aside id="sidebar" class="sidebar">
    <div class="side-head"><img class="side-logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23F5B81B'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='50' fill='%231E3A2F'%3E🌿%3C/text%3E%3C/svg%3E"><h2>Central do Colaborador</h2><small>Caminhos do Peruaçu</small></div>
    <div class="userbox"><b id="sideName"></b><br><span id="sideLevel"></span><br><strong id="sidePoints"></strong></div>
    <nav class="nav" id="nav"></nav>
    <button class="logout" onclick="window.logoutApp()">Sair</button>
  </aside>
  <main class="main"><div class="topbar"><button class="hamb" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><div><h1 id="pageTitle">Dashboard</h1><p class="hint" id="pageSub">Acompanhe sua evolução no projeto.</p></div></div><section id="dashboard" class="section active"></section><section id="treinamento" class="section"></section><section id="materiais" class="section"></section><section id="conteudos" class="section"></section><section id="tarefas" class="section"></section><section id="parceiros" class="section"></section><section id="ranking" class="section"></section><section id="certificados" class="section"></section><section id="comunidade" class="section"></section><section id="perfil" class="section"></section><section id="blog" class="section"></section><section id="admin" class="section"></section></main>
</div>
<div class="toastbox" id="toastbox"></div><div class="confetti" id="confetti"></div>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, setDoc, getDoc, updateDoc, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  const firebaseConfig = { apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg", authDomain: "caminhos-peruacu-blog.firebaseapp.com", projectId: "caminhos-peruacu-blog", storageBucket: "caminhos-peruacu-blog.firebasestorage.app", messagingSenderId: "427400451429", appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c" };
  const app = initializeApp(firebaseConfig);
  const firestore = getFirestore(app);
  const auth = getAuth(app);
  window.cpBlogApi = { userEmail: '', signIn: (e,p) => signInWithEmailAndPassword(auth, e, p), createFirebaseUser: (e,p) => createUserWithEmailAndPassword(auth, e, p), resetPassword: (e) => sendPasswordResetEmail(auth, e), publishPost: async (data) => { const ref = await addDoc(collection(firestore, 'posts'), { title: data.titulo, category: data.categoria, excerpt: data.resumo, full: data.texto, img: data.img, video: data.video, link: data.link, gallery: data.gallery || [], galleryLayout: data.galleryLayout || 3, autoCarousel: data.autoCarousel, isFeatured: data.isFeatured, author: data.author || 'Colaborador', source: 'central', date: new Date().toISOString() }); return { id: ref.id }; }, deletePost: (id) => deleteDoc(doc(firestore, 'posts', id)), loadPosts: async () => { const snap = await getDocs(query(collection(firestore, 'posts'), orderBy('date', 'desc'))); return snap.docs.map(d => ({ id: d.id, ...d.data() })); } };
  window.dispatchEvent(new CustomEvent('cpBlogApiReady'));
  window.resetPasswordEvent = async () => { const email = document.getElementById('email')?.value; if(!email) return toast('Digite seu e-mail'); try{ await window.cpBlogApi.resetPassword(email); toast('📧 Email de redefinição enviado!'); }catch(e){ toast('Erro: '+e.message); } };
  window.toast = (msg) => { const t=document.createElement('div');t.className='toast';t.innerText=msg;document.getElementById('toastbox').appendChild(t);setTimeout(()=>t.remove(),3500); };
  window.confettiEffect = () => { const c=document.getElementById('confetti'); for(let i=0;i<70;i++){ let s=document.createElement('span'); s.style.left=Math.random()*100+'%'; s.style.background=['#F5B81B','#1E3A2F','#fff','#39a66a'][i%4]; s.style.animationDelay=Math.random()*0.4+'s'; c.appendChild(s); setTimeout(()=>s.remove(),2000); } };
  const ADMIN_UID = "JrfKdbpG0VNPN63wGOPqtYpfIMT2";
  const LEVELS=[['Visitante',0],['Explorador',100],['Colaborador',300],['Representante',600],['Embaixador',1000],['Líder Regional',1500]];
  const CERTS=[['Iniciante',1500],['Explorador',3000],['Colaborador',4500],['Embaixador',6000],['Especialista',7500]];
  const navItems=[['dashboard','⌂','Dashboard'],['treinamento','▣','Treinamento'],['materiais','⇩','Materiais'],['conteudos','✎','Meus Conteúdos'],['tarefas','✓','Tarefas'],['parceiros','◎','Parceiros'],['ranking','★','Ranking'],['certificados','▤','Certificados'],['comunidade','☏','Comunidade'],['perfil','◉','Perfil'],['blog','↗','Blog'],['admin','♛','Admin']];
  let currentUser = null, currentTab = 'dashboard', currentModule = 1, currentPage = 0, onlineInterval = null;
  const USERS_COLLECTION = 'central_users', SETTINGS_DOC = 'central_settings', CHAT_COLLECTION = 'central_chat', CERTS_COLLECTION = 'central_certificates', PRESENCE_COLLECTION = 'central_presence';
  async function loadUserData(email){ if(!email) return null; const snap = await getDoc(doc(firestore, USERS_COLLECTION, email.toLowerCase())); return snap.exists() ? snap.data() : null; }
  async function saveUserData(email, data){ await setDoc(doc(firestore, USERS_COLLECTION, email.toLowerCase()), data, { merge: true }); return true; }
  async function loadAllUsers(){ const snap = await getDocs(collection(firestore, USERS_COLLECTION)); let users={}; snap.forEach(d=>users[d.id]=d.data()); return users; }
  async function loadSettings(){ const snap = await getDoc(doc(firestore, SETTINGS_DOC, 'main')); return snap.exists() ? snap.data() : { whatsappConteudos: '', whatsappForum: '', materials: [] }; }
  async function saveSettings(s){ await setDoc(doc(firestore, SETTINGS_DOC, 'main'), s, { merge: true }); }
  async function loadChat(){ const q = query(collection(firestore, CHAT_COLLECTION), orderBy('time', 'desc')); const snap = await getDocs(q); return snap.docs.map(d=>d.data()).reverse(); }
  async function saveChatMessage(m){ await addDoc(collection(firestore, CHAT_COLLECTION), m); }
  async function clearOldChat(){ const oneDay = Date.now() - 86400000; const q = query(collection(firestore, CHAT_COLLECTION), where('time', '<', oneDay)); const snap = await getDocs(q); snap.forEach(d=>deleteDoc(d.ref)); }
  async function loadCertificates(){ const snap = await getDocs(collection(firestore, CERTS_COLLECTION)); return snap.docs.map(d=>({ id: d.id, ...d.data() })); }
  async function saveCertificate(cert){ if(cert.id) await setDoc(doc(firestore, CERTS_COLLECTION, String(cert.id)), cert); else { const ref = await addDoc(collection(firestore, CERTS_COLLECTION), cert); cert.id = ref.id; } return cert; }
  async function deleteCertificate(id){ await deleteDoc(doc(firestore, CERTS_COLLECTION, String(id))); }
  async function updatePresence(uid, data){ await setDoc(doc(firestore, PRESENCE_COLLECTION, uid), { ...data, lastSeen: Date.now() }, { merge: true }); }
  async function loadOnlineUsers(){ const snap = await getDocs(collection(firestore, PRESENCE_COLLECTION)); const now=Date.now(); return snap.docs.map(d=>d.data()).filter(u=> now - (u.lastSeen||0) < 45000); }
  function level(p){ for(let i=LEVELS.length-1;i>=0;i--) if(p>=LEVELS[i][1]) return LEVELS[i][0]; return LEVELS[0][0]; }
  function toast(m){ window.toast(m); }
  const defaultTasks = [{id:1,titulo:'Completar o perfil público',descricao:'Revise nome, cidade, telefone e bio.',pontos:20,done:false},{id:2,titulo:'Baixar o kit comercial',descricao:'Acesse materiais e simule download.',pontos:20,done:false},{id:3,titulo:'Mapear 3 possíveis parceiros',descricao:'Cadastre contatos.',pontos:30,done:false},{id:4,titulo:'Enviar relato de experiência',descricao:'Publique conteúdo aprovado.',pontos:40,done:false},{id:5,titulo:'Atualizar status de parceiros',descricao:'Mantenha funil organizado.',pontos:30,done:false},{id:6,titulo:'🎯 Criar 3 conteúdos para o blog',descricao:'3 conteúdos aprovados.',pontos:100,done:false},{id:7,titulo:'🤝 Cadastrar 2 parceiros',descricao:'2 parceiros aprovados.',pontos:100,done:false},{id:8,titulo:'⏱️ Ficar 3 horas online',descricao:'Acumule 3h ativo.',pontos:100,done:false}];
  const modules = [ { id:1, title:'Conhecendo o Projeto', questions:Array(10).fill().map((_,i)=>({ pergunta:`Questão ${i+1}: Sobre boas práticas no Vale do Peruaçu?`, alternativas:['Respeitar comunidades','Usar flash em cavernas','Tocar pinturas','Ignorar guias'], correta:0, explicacao:'Sempre respeitar o parque e comunidades.' })) } ];
  window.showTab=function(id){ currentTab=id; document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id)); document.getElementById('sidebar').classList.remove('open'); renderNav(); renderAll(); };
  async function renderNav(){ const isAdmin= currentUser?.uid===ADMIN_UID; document.getElementById('nav').innerHTML=navItems.map(x=>`<button class="${x[0]===currentTab?'active':''} ${x[0]==='admin'&&!isAdmin?'admin-only':''}" onclick="window.showTab('${x[0]}')"><span>${x[1]}</span>${x[2]}</button>`).join(''); }
  async function renderAll(){ if(!currentUser) return; let userData=null; if(currentUser.role==='colaborador') userData=await loadUserData(currentUser.email) || { points:0, profile:{ nome:currentUser.nome||'', cidade:'', telefone:'', bio:'' }, tasks:JSON.parse(JSON.stringify(defaultTasks)), partners:[], contents:[], onlineTime:0, training:{ answered:{}, completedAt:{} } }; document.getElementById('sideName').innerText=currentUser.role==='admin'?'Administrador':(userData?.profile?.nome||currentUser.email); document.getElementById('sideLevel').innerText=currentUser.role==='admin'?'Admin':level(userData?.points||0); document.getElementById('sidePoints').innerHTML=currentUser.role==='admin'?'👑':(userData?.points||0)+' pts'; await Promise.all([renderDashboard(userData),renderTraining(userData),renderMaterials(),renderContents(userData),renderTasks(userData),renderPartners(userData),renderRanking(),renderCerts(),renderCommunity(),renderProfile(userData),renderBlog(),renderAdmin()]); }
  async function renderDashboard(d){ if(currentUser.role!=='colaborador') return document.getElementById('dashboard').innerHTML='<div class="card">Bem-vindo Admin</div>'; const doneTasks = d?.tasks?.filter(t=>t.done).length||0; const nl = LEVELS.find(l=> d?.points < l[1]) || LEVELS[LEVELS.length-1]; const pct = nl[1]?Math.min(100,Math.round((d?.points||0)/nl[1]*100)):0; document.getElementById('dashboard').innerHTML=`<div class="grid"><div class="card stat"><span>Pontos</span><b>${d?.points||0}</b></div><div class="card stat"><span>Nível</span><b>${level(d?.points||0)}</b></div><div class="card stat"><span>Progresso</span><b>${doneTasks}/${defaultTasks.length}</b></div><div class="card stat"><span>Parceiros</span><b>${d?.partners?.filter(p=>p.status==='Aprovado').length||0}</b></div></div><div class="card"><div class="item-head"><div><h2>Próximo nível: ${nl[0]}</h2></div><span class="pill gold">${pct}%</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>`; }
  async function renderTraining(d){ if(currentUser.role!=='colaborador') return; const m=modules[0]; document.getElementById('treinamento').innerHTML='<div class="card">Módulo em desenvolvimento prático - a plataforma já registra pontuação, mas o treinamento será expandido. Por enquanto, realize tarefas e parcerias para ganhar pontos.</div>'; }
  async function renderMaterials(){ const settings=await loadSettings(); const mats=settings.materials||[]; document.getElementById('materiais').innerHTML=`<h2>Materiais para download</h2><div class="list">${mats.map(m=>`<div class="item"><b>${m.titulo}</b><p>${m.descricao}</p><button class="secondary" onclick="window.open('${m.link || '#'}','_blank') || toast('Simulação')">Baixar</button></div>`).join('')||'<div class="empty">Nenhum material</div>'}</div>`; }
  async function renderContents(d){ if(currentUser.role!=='colaborador') return; d=d||await loadUserData(currentUser.email); document.getElementById('conteudos').innerHTML=`<div class="split"><form class="card" onsubmit="window.addContent(event);return false"><h2>Novo conteúdo</h2><label>Título</label><input id="ctitulo" required><label>Categoria</label><input id="ccat" value="COLABORADOR"><label>Resumo</label><textarea id="cresumo"></textarea><label>Conteúdo HTML</label><textarea id="ctexto" required></textarea><label>Imagem capa (URL)</label><input id="cimg" placeholder="https://..."><button class="secondary">Enviar para aprovação</button></form><div><h2>Minhas solicitações</h2><div class="list">${(d?.contents||[]).map(c=>`<div class="item"><b>${c.titulo}</b><span class="pill ${c.status==='Aprovado'?'ok':'gold'}">${c.status||'Pendente'}</span><div class="actions"><button class="danger" onclick="window.deleteMyContent(${c.id})">Excluir</button></div></div>`).join('')||'<div class="empty">Nenhum</div>'}</div></div></div>`; }
  window.addContent=async function(e){ e.preventDefault(); if(currentUser.role!=='colaborador') return; const newContent={ id:Date.now(), titulo:document.getElementById('ctitulo').value, categoria:document.getElementById('ccat').value, resumo:document.getElementById('cresumo').value, texto:document.getElementById('ctexto').value, img:document.getElementById('cimg').value, status:'Pendente', blogStatus:'Aguardando', awarded:false, createdAt:new Date().toISOString() }; const userData=await loadUserData(currentUser.email); if(!userData.contents) userData.contents=[]; userData.contents.push(newContent); await saveUserData(currentUser.email, userData); toast('Conteúdo enviado!'); renderAll(); };
  window.deleteMyContent=async function(id){ if(!confirm('Excluir?')) return; const userData=await loadUserData(currentUser.email); userData.contents=userData.contents.filter(c=>c.id!==id); await saveUserData(currentUser.email, userData); toast('Removido'); renderAll(); };
  async function renderTasks(d){ if(currentUser.role!=='colaborador') return; d=d||await loadUserData(currentUser.email); document.getElementById('tarefas').innerHTML=`<div class="list">${(d.tasks||[]).map(t=>`<div class="item item-head"><div><b>${t.titulo}</b><p>${t.descricao}</p><span class="pill gold">${t.pontos} pts</span></div><button class="${t.done?'ghost':'secondary'}" ${t.done?'disabled':''} onclick="window.completeTask(${t.id})">${t.done?'Concluída':'Concluir'}</button></div>`).join('')}</div>`; }
  window.completeTask=async function(id){ const userData=await loadUserData(currentUser.email); let task=userData.tasks.find(t=>t.id===id); if(task.done) return; if(id===1 && (!userData.profile?.nome||!userData.profile?.cidade)) return toast('Complete o perfil primeiro'); task.done=true; userData.points=(userData.points||0)+task.pontos; await saveUserData(currentUser.email, userData); toast(`+${task.pontos} pontos!`); renderAll(); };
  async function renderPartners(d){ if(currentUser.role!=='colaborador') return; d=d||await loadUserData(currentUser.email); document.getElementById('parceiros').innerHTML=`<div class="split"><form class="card" onsubmit="window.addPartner(event);return false"><h2>Cadastrar parceiro</h2><label>Nome</label><input id="pnome" required><label>Categoria</label><select id="pcat"><option>Pousada</option><option>Guia</option></select><label>Cidade</label><input id="pcidade" required><label>Contato</label><input id="pcontato" required><button class="secondary">Enviar</button></form><div><h2>Meus parceiros</h2><div class="list">${(d.partners||[]).map(p=>`<div class="item"><b>${p.nome}</b><span class="pill ${p.status==='Aprovado'?'ok':'gold'}">${p.status||'Pendente'}</span></div>`).join('')||'<div class="empty">Nenhum</div>'}</div></div>`; }
  window.addPartner=async function(e){ e.preventDefault(); const newPartner={ id:Date.now(), nome:document.getElementById('pnome').value, categoria:document.getElementById('pcat').value, cidade:document.getElementById('pcidade').value, contato:document.getElementById('pcontato').value, status:'Pendente' }; const userData=await loadUserData(currentUser.email); if(!userData.partners) userData.partners=[]; userData.partners.push(newPartner); await saveUserData(currentUser.email, userData); toast('Parceiro enviado!'); renderAll(); };
  async function renderRanking(){ const users=await loadAllUsers(); const rows=Object.entries(users).map(([e,u])=>({ nome:u.profile?.nome||e, pontos:u.points||0, me:currentUser?.email===e })).sort((a,b)=>b.pontos-a.pontos); document.getElementById('ranking').innerHTML=`<table class="table"><tr><th>#</th><th>Nome</th><th>Pontos</th></tr>${rows.map((r,i)=>`<tr class="${r.me?'me':''}"><td>${i+1}</td><td>${r.nome}</td><td>${r.pontos}</td></tr>`).join('')}</table>`; }
  async function renderCerts(){ const certs=await loadCertificates(); const userCerts=certs.filter(c=>c.user===currentUser?.email); const userPoints=currentUser.role==='colaborador'?(await loadUserData(currentUser.email))?.points||0:0; document.getElementById('certificados').innerHTML=`<div class="grid">${CERTS.map(c=>`<div class="card"><b>${c[0]}</b><p>${c[1]} pts</p><button ${userPoints<c[1]?'disabled':''} onclick="window.askCert('${c[0]}',${c[1]})">Solicitar</button></div>`).join('')}</div><div class="list">${userCerts.map(c=>`<div class="item"><b>${c.nome}</b> <span class="pill ${c.status==='Aprovado'?'ok':'gold'}">${c.status}</span></div>`).join('')}</div>`; }
  window.askCert=async function(nome,pts){ const certs=await loadCertificates(); if(certs.some(c=>c.user===currentUser?.email && c.nome===nome && c.status!=='Rejeitado')) return toast('Já solicitado'); const newCert={ id:Date.now().toString(), user:currentUser.email, usuario:(await loadUserData(currentUser.email))?.profile?.nome||currentUser.email, nome, pts, status:'Pendente', requestDate:new Date().toISOString() }; await saveCertificate(newCert); toast('Solicitado!'); renderAll(); };
  async function renderCommunity(){ const online=await loadOnlineUsers(); const chat=await loadChat(); const settings=await loadSettings(); const profile=currentUser.role==='colaborador'? (await loadUserData(currentUser.email))?.profile||{nome:currentUser.email}:{nome:'Admin'}; document.getElementById('comunidade').innerHTML=`<div class="chat-shell"><div class="card"><h2>Online (${online.length})</h2><div class="list">${online.map(o=>`<div><span class="online-dot"></span> ${o.nome||'Colaborador'}</div>`).join('')}</div></div><div class="card"><div class="chat-box" id="chatBox">${chat.slice(-50).map(m=>`<div class="msg ${m.user===profile.nome?'me':''}"><b>${m.user}</b><br>${m.text}<br><small>${new Date(m.time).toLocaleTimeString()}</small></div>`).join('')}</div><form onsubmit="window.sendChatMessage(event);return false"><div class="actions"><input id="chatMsg" placeholder="Mensagem..." required><button class="secondary">Enviar</button></div></form></div></div>${currentUser?.uid===ADMIN_UID?`<form class="card" onsubmit="window.updateGroups(event)"><label>WhatsApp Conteúdos</label><input id="waCon" value="${settings.whatsappConteudos||''}"><label>WhatsApp Fórum</label><input id="waFor" value="${settings.whatsappForum||''}"><button>Salvar grupos</button></form>`:''}`; setTimeout(()=>{document.getElementById('chatBox')&&(document.getElementById('chatBox').scrollTop=document.getElementById('chatBox').scrollHeight)},100); }
  window.sendChatMessage=async function(e){ e.preventDefault(); const msg=document.getElementById('chatMsg').value.trim(); if(!msg) return; const profile=currentUser.role==='colaborador'?(await loadUserData(currentUser.email))?.profile||{nome:currentUser.email}:{nome:'Administrador'}; await saveChatMessage({ user:profile.nome, text:msg, time:Date.now() }); document.getElementById('chatMsg').value=''; renderCommunity(); };
  window.updateGroups=async function(e){ e.preventDefault(); const settings=await loadSettings(); settings.whatsappConteudos=document.getElementById('waCon').value; settings.whatsappForum=document.getElementById('waFor').value; await saveSettings(settings); toast('Grupos atualizados'); renderCommunity(); };
  async function renderProfile(d){ if(currentUser.role!=='colaborador') return; d=d||await loadUserData(currentUser.email); document.getElementById('perfil').innerHTML=`<form class="card" onsubmit="window.saveProfileData(event)"><label>Nome</label><input id="profNome" value="${d.profile?.nome||''}"><label>Cidade</label><input id="profCidade" value="${d.profile?.cidade||''}"><label>Telefone</label><input id="profTel" value="${d.profile?.telefone||''}"><label>Bio</label><textarea id="profBio">${d.profile?.bio||''}</textarea><button>Salvar</button></form>`; }
  window.saveProfileData=async function(e){ e.preventDefault(); const userData=await loadUserData(currentUser.email); userData.profile={ nome:document.getElementById('profNome').value, cidade:document.getElementById('profCidade').value, telefone:document.getElementById('profTel').value, bio:document.getElementById('profBio').value }; await saveUserData(currentUser.email, userData); toast('Perfil salvo'); renderAll(); };
  async function renderBlog(){ document.getElementById('blog').innerHTML=`<iframe src="blog.html" style="width:100%;height:600px;border-radius:16px;border:0"></iframe>`; }
  async function renderAdmin(){ if(currentUser?.uid!==ADMIN_UID) return; const allUsers=await loadAllUsers(); const allContents=Object.values(allUsers).flatMap(u=>u.contents||[]); const pendingContents=allContents.filter(c=>c.status==='Pendente'); document.getElementById('admin').innerHTML=`<div class="grid"><div class="card"><h3>Conteúdos pendentes</h3><b>${pendingContents.length}</b><div class="list">${pendingContents.map(c=>`<div class="item"><b>${c.titulo}</b><div class="actions"><button class="ok" onclick="window.approveContentAdmin(${c.id},true)">✅ Aprovar</button><button class="danger" onclick="window.approveContentAdmin(${c.id},false)">❌</button></div></div>`).join('')}</div></div></div>`; }
  window.approveContentAdmin=async function(id,approved){ let found=false; const users=await loadAllUsers(); for(const [email,user] of Object.entries(users)){ const idx=user.contents?.findIndex(c=>c.id===id); if(idx!==-1){ user.contents[idx].status=approved?'Aprovado':'Rejeitado'; if(approved && !user.contents[idx].awarded){ user.contents[idx].awarded=true; user.points=(user.points||0)+50; toast(`+50 pontos para ${email}`); window.confettiEffect(); } await saveUserData(email, user); found=true; break; } } if(found){ toast(approved?'Aprovado!':'Rejeitado'); renderAll(); } };
  document.getElementById('loginForm').onsubmit=async(e)=>{ e.preventDefault(); const email=document.getElementById('email').value.trim(); const senha=document.getElementById('senha').value; try{ const cred=await window.cpBlogApi.signIn(email,senha); const isAdmin=cred.user.uid===ADMIN_UID; currentUser={ email:cred.user.email, role:isAdmin?'admin':'colaborador', nome:'', uid:cred.user.uid }; if(!isAdmin){ let ud=await loadUserData(email); if(!ud){ ud={ points:0, profile:{nome:email.split('@')[0], cidade:'', telefone:'', bio:''}, tasks:defaultTasks.map(t=>({...t})), partners:[], contents:[], onlineTime:0, training:{ answered:{}, completedAt:{} } }; await saveUserData(email, ud); } } document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; document.body.classList.toggle('is-admin',isAdmin); await renderNav(); await renderAll(); window.showTab('dashboard'); setInterval(async ()=>{ if(currentUser && currentUser.role!=='admin' && document.hasFocus()){ const ud=await loadUserData(currentUser.email); if(ud){ const task8=ud.tasks?.find(t=>t.id===8); if(task8 && !task8.done){ ud.onlineTime=(ud.onlineTime||0)+1; if(ud.onlineTime>=10800){ task8.done=true; ud.points=(ud.points||0)+task8.pontos; toast(`🎉 +${task8.pontos} pts pela tarefa online!`); window.confettiEffect(); } await saveUserData(currentUser.email, ud); } } } }, 1000); await updatePresence(cred.user.uid, { id:cred.user.uid, nome:currentUser.role==='admin'?'Admin':'Colaborador', cidade:'', role:currentUser.role }); }catch(err){ toast('Erro: '+err.message); } };
  window.logoutApp=()=>{ if(onlineInterval) clearInterval(onlineInterval); localStorage.removeItem('cpSession'); location.reload(); };
  window.toast=toast;
  const saved=localStorage.getItem('cpSession');
  if(saved) try{ const {email}=JSON.parse(saved); if(email) document.getElementById('email').value=email; }catch(e){}
</script>
</body>
