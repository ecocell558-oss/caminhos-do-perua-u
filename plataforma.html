  <style>

{margin:0;font-size:21px}.side-head small{color:var(--primary);font-weight:800}.userbox{margin:16px;padding:14px;border-radius:16px;background:rgba(255,255,255,.09)}.userbox b{display:block}.nav{padding:8px}.nav button{width:100%;margin:4px 0;text-align:left;background:transparent;color:#e8f1ec;display:flex;gap:10px;align-items:center}.nav button.active,.nav button:hover{background:var(--primary);color:var(--secondary)}.logout{margin:16px;width:calc(100% - 32px);background:rgba(255,255,255,.12)}.main{margin-left:286px;padding:26px 30px 60px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}.topbar h1{margin:0;color:var(--secondary);font-size:28px}.hamb{display:none}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 4px 18px rgba(0,0,0,.035);padding:18px}.stat b{display:block;color:var(--secondary);font-size:28px;margin-top:4px}.stat span{color:var(--muted);font-weight:800;font-size:13px}.bar{height:12px;border-radius:99px;background:#e9eee9;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#ffd76b);width:0}.section{display:none}.section.active{display:block}.section h2{margin:4px 0 14px;color:var(--secondary)}.split{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}.list{display:grid;gap:12px}.item{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px}.item-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.pill{display:inline-flex;align-items:center;border-radius:99px;padding:4px 9px;font-size:12px;font-weight:900;background:#eef4ef;color:var(--secondary)}.pill.gold{background:#fff1c6}.pill.ok{background:#e7f7ee;color:var(--ok)}.pill.bad{background:#feeceb;color:var(--bad)}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.quiz-tools{display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;align-items:center;margin:12px 0}.q-card{margin-bottom:12px}.alts{display:grid;gap:8px;margin-top:10px}.alt{display:block;text-align:left;background:#f5f7f5;color:var(--ink);border:1px solid var(--line);font-weight:700}.alt.correct{background:#dff4e8;border-color:#6bc58f}.alt.wrong{background:#fde7e5;border-color:#ec8f86}.explain{margin-top:8px;color:var(--muted);font-size:14px}.table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:14px;background:#fff}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.table th{background:#eef4ef;color:var(--secondary)}.me{background:#fff8df!important;font-weight:900}.toastbox{position:fixed;right:18px;bottom:18px;display:grid;gap:10px;z-index:50}.toast{background:var(--secondary);color:#fff;padding:12px 14px;border-radius:14px;box-shadow:var(--shadow);max-width:360px}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60}.confetti span{position:absolute;top:-20px;width:10px;height:16px;background:var(--primary);animation:fall 1.9s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg)}}.blog-hero{background:linear-gradient(135deg,var(--secondary),#284f41);color:#fff;border-radius:18px;padding:22px}.empty{color:var(--muted);padding:12px}.admin-only{display:none!important}.is-admin .admin-only{display:flex!important}.comission-badge{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;padding:8px 15px;border-radius:20px;font-size:13px;font-weight:800;display:inline-block;margin-bottom:12px}.side-logo{width:74px;height:74px;border-radius:22px;object-fit:contain;background:#fff;border:2px solid var(--primary);padding:7px;margin-bottom:10px}.training-hero{background:linear-gradient(135deg,var(--secondary),#2f604e);color:#fff;border-radius:22px;padding:22px;margin-bottom:16px}.lesson-path{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:14px 0}.lesson-node{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:left;color:var(--secondary);position:relative}.lesson-node.active{background:var(--primary)}.lesson-node.done:before{content:"✓";position:absolute;right:10px;top:8px;font-weight:1000}.chat-shell{display:grid;grid-template-columns:320px 1fr;gap:16px}.chat-box{height:430px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px}.msg{max-width:78%;padding:10px 12px;border-radius:14px;background:#eef4ef}.msg.me{align-self:flex-end;background:#fff1c6}.msg b{display:block;font-size:12px;color:var(--secondary);margin-bottom:3px}.online-dot{width:10px;height:10px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:6px}.profile-card{display:flex;gap:12px;align-items:center}.avatar{width:48px;height:48px;border-radius:16px;background:var(--primary);display:grid;place-items:center;color:var(--secondary);font-weight:1000}.group-card{background:linear-gradient(135deg,#fff,#f4faf6);border:1px solid var(--line);border-radius:18px;padding:18px}.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:center;justify-content:center;z-index:70;padding:18px}.modal-card{background:#fff;border-radius:20px;max-width:720px;width:100%;max-height:80vh;overflow-y:auto;padding:22px;box-shadow:var(--shadow)}.partner-detail-card{background:#fef9e6;border-left:4px solid var(--primary);margin-top:12px;padding:12px;border-radius:12px}.points-control{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:12px;padding:15px;margin-top:15px}.points-input-group{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap}.points-input-group input{width:120px;text-align:center;font-size:18px;font-weight:bold;padding:8px;border-radius:8px;border:1px solid var(--line)}@media(max-width:900px){.chat-shell{grid-template-columns:1fr}.lesson-path{grid-template-columns:1fr}}@media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}.split{grid-template-columns:1fr}}@media(max-width:760px){.hamb{display:inline-flex}.sidebar{transform:translateX(-105%)}.sidebar.open{transform:none}.main{margin-left:0;padding:18px}.grid{grid-template-columns:1fr}}

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc, setDoc, getDoc, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg",
      authDomain: "caminhos-peruacu-blog.firebaseapp.com",
      projectId: "caminhos-peruacu-blog",
      storageBucket: "caminhos-peruacu-blog.firebasestorage.app",
      messagingSenderId: "427400451429",
      appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c"
    };
    
    const app = initializeApp(firebaseConfig);
    const firestore = getFirestore(app);
    const auth = getAuth(app);
    
    window.cpBlogApi = {
      signIn(email, password) { return signInWithEmailAndPassword(auth, email, password); },
      async createFirebaseUser(email, password, displayName) { return await createUserWithEmailAndPassword(auth, email, password); },
      async savePartner(partnerData) {
        if(partnerData.id) { const ref = doc(firestore, 'partners', partnerData.id); await updateDoc(ref, partnerData); return partnerData; }
        const ref = await addDoc(collection(firestore, 'partners'), partnerData);
        return { id: ref.id, ...partnerData };
      },
      async deletePartnerFirebase(partnerId) { await deleteDoc(doc(firestore, 'partners', partnerId)); },
      async loadPartners() { const snap = await getDocs(query(collection(firestore, 'partners'), orderBy('createdAt', 'desc'))); return snap.docs.map(d => ({ id: d.id, ...d.data() })); },
      async updatePartnerStatus(partnerId, status, awarded, comissaoPaga) { await updateDoc(doc(firestore, 'partners', partnerId), { status, awarded, comissaoPaga }); },
      async saveUser(userData) { await setDoc(doc(firestore, 'users', userData.uid), userData, { merge: true }); },
      async loadUser(uid) { const snap = await getDoc(doc(firestore, 'users', uid)); return snap.exists() ? { uid: snap.id, ...snap.data() } : null; },
      async loadAllUsers() { const snap = await getDocs(collection(firestore, 'users')); return snap.docs.map(d => ({ uid: d.id, ...d.data() })); },
      async deleteUserFirebase(uid) { await deleteDoc(doc(firestore, 'users', uid)); },
      async saveMessage(messageData) { return await addDoc(collection(firestore, 'messages'), messageData); },
      async loadMessages(callback) { return onSnapshot(query(collection(firestore, 'messages'), orderBy('time', 'desc')), (snapshot) => { callback(snapshot.docs.map(d => ({ id: d.id, ...d.data() })).reverse()); }); },
      async saveCert(certData) {
        if(certData.id) { await setDoc(doc(firestore, 'certificates', certData.id), certData, { merge: true }); return certData; }
        const ref = await addDoc(collection(firestore, 'certificates'), certData);
        return { id: ref.id, ...certData };
      },
      async loadCerts(userUid) {
        let q = query(collection(firestore, 'certificates'), orderBy('requestDate', 'desc'));
        if(userUid) q = query(collection(firestore, 'certificates'), where('userUid', '==', userUid), orderBy('requestDate', 'desc'));
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      },
      async deleteCertFirebase(certId) { await deleteDoc(doc(firestore, 'certificates', certId)); },
      async saveMaterial(materialData) { await setDoc(doc(firestore, 'materials', materialData.id || Date.now().toString()), materialData); },
      async loadMaterials() { const snap = await getDocs(collection(firestore, 'materials')); return snap.docs.map(d => ({ id: d.id, ...d.data() })); },
      async deleteMaterialFirebase(materialId) { await deleteDoc(doc(firestore, 'materials', materialId.toString())); },
      async saveSettings(settingsData) { await setDoc(doc(firestore, 'settings', 'appSettings'), settingsData, { merge: true }); },
      async loadSettings() { const snap = await getDoc(doc(firestore, 'settings', 'appSettings')); return snap.exists() ? snap.data() : { whatsappConteudos: '', whatsappForum: '' }; }
    };
  </script>

<body>
  <div id="login" class="login">
    <form class="login-card" id="loginForm">
      <div class="brand">
        <img class="brand-logo" src="logo2.png" alt="Logo" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23F5B81B%22/><text x=%2250%22 y=%2267%22 text-anchor=%22middle%22 font-size=%2250%22 fill=%22%231E3A2F%22>🌿</text></svg>'">
        <div><h1>Central do Colaborador</h1><p>Caminhos do Peruaçu</p></div>
      </div>
      <label>E-mail</label><input id="email" type="email" required>
      <label>Senha</label><input id="senha" type="password" required>

    </form>
  </div>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar">
      <div class="side-head">
        <img class="side-logo" src="logo2.png" alt="Logo" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23F5B81B%22/><text x=%2250%22 y=%2267%22 text-anchor=%22middle%22 font-size=%2250%22 fill=%22%231E3A2F%22>🌿</text></svg>'">
        <h2>Central do Colaborador</h2>
        <small>Caminhos do Peruaçu</small>
      </div>
      <div class="userbox"><b id="sideName"></b><span id="sideLevel"></span><br><strong id="sidePoints"></strong></div>
      <nav class="nav" id="nav"></nav>
      <button class="logout" onclick="window.logout()">Sair</button>
    </aside>
    <main class="main"><div class="topbar"><button class="hamb" onclick="toggleMenu()">☰</button><div><h1 id="pageTitle">Dashboard</h1><p class="hint" id="pageSub">Acompanhe sua evolução no projeto.</p></div></div><section id="dashboard" class="section active"></section><section id="treinamento" class="section"></section><section id="materiais" class="section"></section><section id="tarefas" class="section"></section><section id="parceiros" class="section"></section><section id="ranking" class="section"></section><section id="certificados" class="section"></section><section id="comunidade" class="section"></section><section id="perfil" class="section"></section><section id="blog" class="section"></section><section id="admin" class="section"></section></main>
  </div>
  <div class="toastbox" id="toastbox"></div>
  <div class="confetti" id="confetti"></div>

<script>
// CONSTANTES
const ADMIN_UID = "JrfKdbpG0VNPN63wGOPqtYpfIMT2";
let pointsAdjustmentHistory = {};
let currentUser = null;
let currentTab = 'dashboard';
let currentModule = 1;
let currentPage = 0;
let onlineInterval = null;
let firebasePartners = [];
let firebaseUsers = [];
let firebaseMessages = [];
let firebaseCerts = [];
let firebaseMaterials = [];
let firebaseSettings = { whatsappConteudos: '', whatsappForum: '' };
let messagesUnsubscribe = null;
let currentUserData = null;

const LEVELS = [['Iniciante',0],['Explorador',1500],['Colaborador',3000],['Embaixador',4500],['Especialista',6000],['Mestre',7500]];
const CERTS = [['Iniciante',1500],['Explorador',3000],['Colaborador',4500],['Embaixador',6000],['Especialista',7500]];
const navItems=[['dashboard','⌂','Dashboard'],['treinamento','▣','Treinamento'],['materiais','⇩','Materiais'],['tarefas','✓','Tarefas'],['parceiros','◎','Parceiros'],['ranking','★','Ranking'],['certificados','▤','Certificados'],['comunidade','☏','Comunidade'],['perfil','◉','Perfil'],['blog','↗','Blog'],['admin','♛','Admin']];
const defaultTasks = [{id:1,titulo:'Completar o perfil público',descricao:'Revise nome, cidade, telefone e bio.',pontos:20,done:false},{id:2,titulo:'Baixar o kit comercial',descricao:'Acesse os materiais e simule o download.',pontos:20,done:false},{id:3,titulo:'Mapear 3 possíveis parceiros',descricao:'Cadastre contatos de pousadas, guias ou restaurantes.',pontos:30,done:false},{id:4,titulo:'Enviar relato de experiência',descricao:'Publique um conteúdo para aprovação.',pontos:40,done:false},{id:5,titulo:'Atualizar status de parceiros',descricao:'Mantenha o funil comercial organizado.',pontos:30,done:false},{id:6,titulo:'🎯 Criar 3 conteúdos para o blog',descricao:'Tenha 3 conteúdos aprovados pelo administrador.',pontos:100,done:false},{id:7,titulo:'🤝 Cadastrar 2 parceiros',descricao:'Tenha 2 parceiros aprovados pelo administrador.',pontos:100,done:false},{id:8,titulo:'⏱️ Ficar 3 horas online',descricao:'Acumule 3 horas de tempo ativo na plataforma.',pontos:100,done:false}];
const defaultMaterials = [{id:'1',titulo:'Portfólio Caminhos do Peruaçu',descricao:'PDF de 24 páginas',link:'',ativo:true},{id:'2',titulo:'Cartão de Visita',descricao:'Material comercial',link:'',ativo:true},{id:'3',titulo:'Material de Serviço',descricao:'PDF de apoio comercial',link:'',ativo:true}];

function makeQuestions(){
  return [1,2,3,4,5].map(m => ({id:m, title:'Módulo '+m, questions:Array(10).fill().map((_,i)=>({pergunta:'Questão '+(i+1)+' do módulo '+m, alternativas:['A','B','C','D'], correta:0, explicacao:'Explicação aqui'}))}));
}
const modules=makeQuestions();
const MODULE_POINTS=[40,60,80,100,120],RETAKE_MS=48*60*60*1000;

function level(p){ let pts = p || (currentUserData?.points || 0); for(let i=LEVELS.length-1;i>=0;i--) if(pts>=LEVELS[i][1]) return LEVELS[i][0]; return 'Iniciante'; }
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toastbox').appendChild(t);setTimeout(()=>t.remove(),3300);}
function confetti(){const c=document.getElementById('confetti');for(let i=0;i<90;i++){let s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.background=['#F5B81B','#1E3A2F','#fff','#39a66a'][i%4];s.style.animationDelay=Math.random()*.35+'s';c.appendChild(s);setTimeout(()=>s.remove(),2300);}}

async function syncUsersFromFirebase() { try { firebaseUsers = await window.cpBlogApi.loadAllUsers(); if(currentUser && currentUser.uid !== ADMIN_UID) { const fbUser = await window.cpBlogApi.loadUser(currentUser.uid); if(fbUser) { currentUserData = fbUser; if(!currentUserData.tasks) currentUserData.tasks = JSON.parse(JSON.stringify(defaultTasks)); if(!currentUserData.training) currentUserData.training = { answered: {}, completedAt: {} }; if(!currentUserData.points) currentUserData.points = 0; if(!currentUserData.profile) currentUserData.profile = { nome: currentUser.nome || 'Colaborador', cidade: 'Itacarambi', telefone: '', bio: 'Colaborador do projeto.' }; await window.cpBlogApi.saveUser(currentUserData); } } if(currentTab === 'admin' && currentUser?.uid === ADMIN_UID) renderAdmin(); if(currentTab === 'ranking') renderRanking(); if(currentTab === 'comunidade') renderCommunity(); } catch(e) { console.error(e); } }
async function saveUserToFirebase(userData) { try { await window.cpBlogApi.saveUser(userData); await syncUsersFromFirebase(); } catch(e) { console.error(e); } }
async function syncPartnersFromFirebase() { try { firebasePartners = await window.cpBlogApi.loadPartners(); if(currentTab === 'parceiros') renderPartners(); if(currentUser?.uid === ADMIN_UID && currentTab === 'admin') renderAdmin(); } catch(e) { console.error(e); } }
async function syncCertsFromFirebase() { try { firebaseCerts = await window.cpBlogApi.loadCerts(currentUser?.uid === ADMIN_UID ? null : currentUser?.uid); if(currentTab === 'certificados') renderCerts(); if(currentTab === 'admin' && currentUser?.uid === ADMIN_UID) renderAdmin(); } catch(e) { console.error(e); } }
async function syncMaterialsFromFirebase() { try { firebaseMaterials = await window.cpBlogApi.loadMaterials(); if(firebaseMaterials.length === 0) { for(const m of defaultMaterials) await window.cpBlogApi.saveMaterial(m); firebaseMaterials = await window.cpBlogApi.loadMaterials(); } if(currentTab === 'materiais') renderMaterials(); if(currentTab === 'admin' && currentUser?.uid === ADMIN_UID) renderAdmin(); } catch(e) { console.error(e); } }
async function syncSettingsFromFirebase() { try { firebaseSettings = await window.cpBlogApi.loadSettings(); if(currentTab === 'comunidade') renderCommunity(); } catch(e) { console.error(e); } }
async function initMessagesListener() { if(messagesUnsubscribe) messagesUnsubscribe(); messagesUnsubscribe = await window.cpBlogApi.loadMessages((msgs) => { firebaseMessages = msgs; if(currentTab === 'comunidade') renderCommunity(); }); }
async function sendMessageToFirebase(text, userName, userCity) { await window.cpBlogApi.saveMessage({ id: Date.now(), user: userName, city: userCity, text: text, time: new Date().toISOString(), userUid: currentUser?.uid }); }
async function saveCertToFirebase(certData) { await window.cpBlogApi.saveCert(certData); await syncCertsFromFirebase(); }
async function deleteCertFromFirebase(certId) { await window.cpBlogApi.deleteCertFirebase(certId); await syncCertsFromFirebase(); }
async function processFile(file) { if(!file) return ''; return new Promise((resolve) => { const reader = new FileReader(); reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(file); }); }

function startOnlineTracking(){ if(onlineInterval) clearInterval(onlineInterval); onlineInterval = setInterval(async () => { if(currentUser && currentUser.uid !== ADMIN_UID && document.hasFocus() && currentUserData){ const task = currentUserData.tasks?.find(t => t.id === 8); if(task && !task.done){ currentUserData.onlineTime = (currentUserData.onlineTime || 0) + 1; if(currentUserData.onlineTime >= 10800){ task.done = true; currentUserData.points = (currentUserData.points || 0) + task.pontos; await saveUserToFirebase(currentUserData); toast(`🎉 Tarefa concluída! +${task.pontos} pontos!`); confetti(); if(currentTab === 'tarefas') renderTasks(); } await saveUserToFirebase(currentUserData); if(currentTab === 'tarefas') renderTasks(); } } }, 1000); }

async function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.body.classList.toggle('is-admin', currentUser?.uid === ADMIN_UID);
  await syncUsersFromFirebase();
  await syncPartnersFromFirebase();
  await syncCertsFromFirebase();
  await syncMaterialsFromFirebase();
  await syncSettingsFromFirebase();
  await initMessagesListener();
  renderNav();
  renderAll();
  showTab('dashboard');
  if(currentUser.uid !== ADMIN_UID) startOnlineTracking();
}

window.logout=function(){ if(onlineInterval) clearInterval(onlineInterval); if(messagesUnsubscribe) messagesUnsubscribe(); localStorage.removeItem('cpSession'); location.reload(); };
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');}
function renderNav(){const isAdmin = (currentUser?.uid === ADMIN_UID);document.getElementById('nav').innerHTML=navItems.map(x=>`<button class="${x[0]===currentTab?'active':''} ${x[0]==='admin' && !isAdmin?'admin-only':''}" onclick="window.showTab('${x[0]}')"><span>${x[1]}</span>${x[2]}</button>`).join('');}
window.showTab=function(id){currentTab=id;document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));document.getElementById('pageTitle').textContent=navItems.find(x=>x[0]===id)[2];document.getElementById('sidebar').classList.remove('open');renderNav();renderAll();};
async function renderAll(){ if(!currentUser)return; document.getElementById('sideName').textContent=currentUser.uid===ADMIN_UID?'Administrador':(currentUserData?.profile?.nome || 'Colaborador'); document.getElementById('sideLevel').textContent=currentUser.uid===ADMIN_UID?'Painel admin':level(); document.getElementById('sidePoints').textContent=currentUser.uid===ADMIN_UID?'Admin':(currentUserData?.points || 0)+' pontos'; renderDashboard(); renderTraining(); renderMaterials(); renderTasks(); renderPartners(); renderRanking(); renderCerts(); renderCommunity(); renderProfile(); renderBlog(); renderAdmin(); }
function renderDashboard(){const doneTasks=currentUserData?.tasks?.filter(t=>t.done).length||0,closed=firebasePartners.filter(p=>p.status==='Aprovado'&&p.userUid===currentUser?.uid).length,ans=Object.keys(currentUserData?.training?.answered||{}).length,nl=LEVELS.find(x=>(currentUserData?.points||0)<x[1])||LEVELS[LEVELS.length-1],pct=Math.min(100,Math.round((currentUserData?.points||0)/nl[1]*100));document.getElementById('dashboard').innerHTML=`<div class="grid"><div class="card stat"><span>Pontos</span><b>${currentUserData?.points||0}</b></div><div class="card stat"><span>Nível</span><b>${level()}</b></div><div class="card stat"><span>Treino</span><b>${ans}/50</b></div><div class="card stat"><span>Tarefas/Parceiros</span><b>${doneTasks}/${currentUserData?.tasks?.length||8} · ${closed}</b></div></div><div class="card"><div class="item-head"><div><h2>Progresso até ${nl[0]}</h2></div><span class="pill gold">${pct}%</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>`;}
function renderTraining(){ document.getElementById('treinamento').innerHTML='<div class="card"><h2>Treinamento</h2><p class="hint">Módulos disponíveis em breve.</p></div>'; }
function renderMaterials(){document.getElementById('materiais').innerHTML=`<h2>Materiais para download</h2><div class="list">${firebaseMaterials.filter(m=>m.ativo!==false).map(m=>`<div class="item item-head"><div><b>${m.titulo}</b><p class="hint">${m.descricao}</p></div><button class="secondary" onclick="${m.link?`window.open('${m.link}','_blank')`:`alert('Download simulado: ${m.titulo}')`}">${m.link?'Abrir':'Baixar'}</button></div>`).join('')||'<div class="empty">Nenhum material cadastrado.</div>'}</div>`;}
function renderTasks(){document.getElementById('tarefas').innerHTML=`<h2>Tarefas</h2><div class="list">${(currentUserData?.tasks||[]).map(t=>`<div class="item item-head"><div><b>${t.titulo}</b><p class="hint">${t.descricao}</p><span class="pill gold">${t.pontos} pontos</span></div><button class="${t.done?'ghost':'secondary'}" ${t.done?'disabled':''} onclick="window.doneTask(${t.id})">${t.done?'Concluída':'Concluir'}</button></div>`).join('')}</div>`;}
window.doneTask=async function(id){let t=currentUserData.tasks.find(x=>x.id===id);if(t.done)return;t.done=true;currentUserData.points=(currentUserData.points||0)+t.pontos;await saveUserToFirebase(currentUserData);toast(`+${t.pontos} pontos!`);renderAll();};
function helpPartners(){return `<button style="position:fixed;right:22px;bottom:88px;border-radius:999px;width:56px;height:56px;font-size:24px;z-index:45" class="secondary" onclick="alert('Comissão: 30% sobre o plano')">?</button>`;}
window.editPartner = function(partnerId){ const partner = firebasePartners.find(p => p.id == partnerId); if(!partner) return; window.editingPartnerId = partnerId; window.editingPartnerData = partner; renderPartners(); setTimeout(()=>{ document.getElementById('pnome').value=partner.nome; document.getElementById('pcat').value=partner.categoria; document.getElementById('pcidade').value=partner.cidade; document.getElementById('pcontato').value=partner.contato; document.getElementById('pobs').value=partner.obs||''; },100); }
window.cancelEditPartner = function(){ window.editingPartnerId=null; window.editingPartnerData=null; renderPartners(); }
function renderPartners(){ let partnersToShow = firebasePartners; let isAdminView = (currentUser?.uid === ADMIN_UID); if(!isAdminView) partnersToShow = partnersToShow.filter(p => p.userUid === currentUser?.uid); const pending = partnersToShow.filter(p=>p.status==='Pendente'); const approved = partnersToShow.filter(p=>p.status==='Aprovado'); const rejected = partnersToShow.filter(p=>p.status==='Rejeitado'); document.getElementById('parceiros').innerHTML = `${helpPartners()}<div class="blog-hero"><h2>${isAdminView?'Gestão de Parceiros':'Captação de Parceiros'}</h2><div class="comission-badge">💰 Você recebe 30% de comissão!</div></div><div class="split"><form class="card" onsubmit="window.addPartner(event)"><h2>${window.editingPartnerId?'Editar':'Cadastrar'} Parceiro</h2><label>Nome</label><input id="pnome" required value="${window.editingPartnerData?.nome||''}"><label>Categoria</label><select id="pcat"><option>Pousada</option><option>Restaurante</option><option>Guia</option></select><label>Cidade</label><input id="pcidade" required><label>Contato</label><input id="pcontato" required><label>Plano</label><select id="pplano"><option value="Comum|69.90">Comum - R$69,90</option><option value="Premium|149.90">Premium - R$149,90</option></select><label>Ordem Serviço</label><input id="pos" type="file" accept="image/*,.pdf"><label>Comprovante Pix</label><input id="ppix" type="file" accept="image/*,.pdf"><label>Observações</label><textarea id="pobs"></textarea><button class="secondary">${window.editingPartnerId?'Salvar':'Enviar'}</button>${window.editingPartnerId?'<button class="ghost" onclick="window.cancelEditPartner()">Cancelar</button>':''}</form><div><h2>Pendentes (${pending.length})</h2><div class="list">${pending.map(p=>`<div class="item"><b>${p.nome}</b><p class="hint">${p.categoria} · ${p.cidade}</p><div class="actions">${isAdminView?`<button class="ok" onclick="window.approvePartner('${p.id}',true)">Aprovar</button><button class="danger" onclick="window.approvePartner('${p.id}',false)">Rejeitar</button>`:''}<button class="ghost" onclick="window.editPartner('${p.id}')">Editar</button><button class="danger" onclick="window.deletePartner('${p.id}')">Excluir</button></div></div>`).join('')||'<div class="empty">Nenhum pendente</div>'}</div><h2>Aprovados (${approved.length})</h2><div class="list">${approved.map(p=>`<div class="item"><b>${p.nome}</b><p class="hint">${p.plano} - R$${p.valor}</p><div class="actions"><button class="ghost" onclick="window.editPartner('${p.id}')">Editar</button><button class="danger" onclick="window.deletePartner('${p.id}')">Excluir</button></div></div>`).join('')||'<div class="empty">Nenhum aprovado</div>'}</div></div></div>`; window.editingPartnerId=null; window.editingPartnerData=null; }
window.addPartner = async function(e){ e.preventDefault(); const [plano, valor] = document.getElementById('pplano').value.split('|'); const posFile = document.getElementById('pos').files[0]; const pixFile = document.getElementById('ppix').files[0]; const osData = posFile ? await processFile(posFile) : ''; const pixData = pixFile ? await processFile(pixFile) : ''; let status = window.editingPartnerId ? (window.editingPartnerData?.status||'Pendente') : 'Pendente'; if(currentUser?.uid === ADMIN_UID && !window.editingPartnerId) status = 'Aprovado'; const partnerData = { nome: document.getElementById('pnome').value, categoria: document.getElementById('pcat').value, cidade: document.getElementById('pcidade').value, contato: document.getElementById('pcontato').value, plano, valor: Number(valor), obs: document.getElementById('pobs').value, osData, pixData, status, colaboradorEmail: currentUser?.email, colaboradorNome: currentUserData?.profile?.nome || 'Colaborador', userUid: currentUser?.uid, createdAt: window.editingPartnerId ? (window.editingPartnerData?.createdAt||new Date().toISOString()) : new Date().toISOString() }; if(window.editingPartnerId) partnerData.id = window.editingPartnerId; await window.cpBlogApi.savePartner(partnerData); await syncPartnersFromFirebase(); toast(window.editingPartnerId?'Parceiro atualizado!':'Parceiro enviado!'); window.editingPartnerId=null; window.editingPartnerData=null; renderPartners(); };
window.deletePartner = async function(partnerId){ if(!confirm('Excluir parceiro?')) return; await window.cpBlogApi.deletePartnerFirebase(partnerId); await syncPartnersFromFirebase(); toast('Parceiro excluído!'); renderPartners(); };
window.approvePartner = async function(partnerId, ok){ let target = firebasePartners.find(p=>p.id==partnerId); if(!target) return; const newStatus = ok?'Aprovado':'Rejeitado'; await window.cpBlogApi.updatePartnerStatus(partnerId, newStatus, ok, ok); if(ok && !target.awarded){ const targetUser = firebaseUsers.find(u=>u.email===target.colaboradorEmail||u.uid===target.userUid); if(targetUser){ targetUser.points = (targetUser.points||0)+100; await window.cpBlogApi.saveUser(targetUser); await syncUsersFromFirebase(); toast(`+100 pontos para o colaborador!`); } } await syncPartnersFromFirebase(); renderPartners(); };
function renderRanking(){const rows=firebaseUsers.map(u=>({nome:u.profile?.nome||u.email,cidade:u.profile?.cidade||'',pontos:u.points||0,me:u.uid===currentUser?.uid})).sort((a,b)=>b.pontos-a.pontos);document.getElementById('ranking').innerHTML=`<h2>Ranking</h2><table class="table"><thead><tr><th>#</th><th>Nome</th><th>Cidade</th><th>Pontos</th></tr></thead><tbody>${rows.slice(0,20).map((r,i)=>`<tr class="${r.me?'me':''}"><td>${i+1}</td><td>${r.nome}${r.me?' (você)':''}</td><td>${r.cidade}</td><td>${r.pontos}</td></tr>`).join('')}</tbody></table>`;}
async function renderCerts(){ const userCerts = firebaseCerts.filter(c=>c.userUid===currentUser?.uid); document.getElementById('certificados').innerHTML=`<h2>Certificados Disponíveis</h2><div class="grid">${CERTS.map(c=>`<div class="card"><b>${c[0]}</b><p class="hint">Requer ${c[1]} pontos.</p><button class="secondary" ${(currentUserData?.points||0)<c[1]?'disabled':''} onclick="window.askCert('${c[0]}',${c[1]})">Solicitar</button></div>`).join('')}</div><h2>Minhas Solicitações</h2><div class="list">${userCerts.length?userCerts.map(c=>`<div class="item"><div><b>${c.nome}</b><p class="hint">Solicitado: ${new Date(c.requestDate).toLocaleDateString('pt-BR')}</p>${c.motivo?`<p class="hint" style="color:#c0392b">Motivo: ${c.motivo}</p>`:''}</div><span class="pill ${c.status==='Aprovado'?'ok':c.status==='Rejeitado'?'bad':'gold'}">${c.status}</span>${c.certificadoUrl&&c.status==='Aprovado'?`<div class="actions"><button class="secondary" onclick="window.open('${c.certificadoUrl}','_blank')">📄 BAIXAR</button></div>`:''}</div>`).join(''):'<div class="empty">Nenhuma solicitação</div>'}</div>`;}
window.askCert = async function(nome, pts){ if(firebaseCerts.some(c=>c.userUid===currentUser?.uid&&c.nome===nome&&c.status!=='Rejeitado')) return toast('Já solicitou este certificado'); const certData = { id: Date.now().toString(), userUid: currentUser?.uid, usuario: currentUserData?.profile?.nome||'Colaborador', nome, pts, status:'Pendente', requestDate: new Date().toISOString(), certificadoUrl:'', motivo:'' }; await saveCertToFirebase(certData); toast('Certificado solicitado!'); renderAll(); };
function renderCommunity(){const onlineUsers = firebaseUsers.filter(u=>u.lastSeen&&(Date.now()-u.lastSeen)<45000);document.getElementById('comunidade').innerHTML=`<div class="blog-hero"><h2>Comunidade</h2><div class="actions"><span class="pill gold"><span class="online-dot"></span>${onlineUsers.length} online</span></div></div><div class="chat-shell"><div class="card"><h2>Perfis</h2><div class="list">${firebaseUsers.map(p=>`<div class="item profile-card"><div class="avatar">${(p.profile?.nome||p.email||'?')[0]}</div><div><b>${p.profile?.nome||p.email}${p.uid===currentUser?.uid?' (você)':''}</b><p class="hint">${p.points||0} pts</p></div><button class="ghost" onclick="window.openProfile('${p.uid}')">Ver</button></div>`).join('')}</div></div><div class="card"><h2>Chat</h2><div class="chat-box" id="chatBox">${firebaseMessages.slice(-50).map(m=>`<div class="msg ${m.userUid===currentUser?.uid?'me':''}"><b>${m.user}</b>${m.text}<br><small>${new Date(m.time).toLocaleTimeString('pt-BR')}</small></div>`).join('')}</div><form class="actions" onsubmit="window.sendChat(event)"><input id="chatText" placeholder="Mensagem..." required><button class="secondary">Enviar</button></form></div></div>`; setTimeout(()=>{const b=document.getElementById('chatBox');if(b)b.scrollTop=b.scrollHeight},50);}
window.sendChat=async function(e){e.preventDefault();const text=document.getElementById('chatText').value.trim();if(!text)return;await sendMessageToFirebase(text, currentUserData?.profile?.nome||'Colaborador', currentUserData?.profile?.cidade||'');document.getElementById('chatText').value='';renderCommunity();};
window.openProfile=function(uid){const p=firebaseUsers.find(x=>x.uid===uid);if(!p)return;alert(`Perfil: ${p.profile?.nome||p.email}\nPontos: ${p.points||0}\nNível: ${level(p.points)}\nBio: ${p.profile?.bio||'Sem bio'}`);};
async function renderProfile(){document.getElementById('perfil').innerHTML=`<form class="card" onsubmit="window.saveProfile(event)"><h2>Perfil</h2><label>Nome</label><input id="profNome" value="${currentUserData?.profile?.nome||''}"><label>Cidade</label><input id="profCidade" value="${currentUserData?.profile?.cidade||''}"><label>Telefone</label><input id="profTel" value="${currentUserData?.profile?.telefone||''}"><label>Bio</label><textarea id="profBio">${currentUserData?.profile?.bio||''}</textarea><button class="secondary">Salvar</button></form>`;}
window.saveProfile=async function(e){e.preventDefault();currentUserData.profile={nome:document.getElementById('profNome').value,cidade:document.getElementById('profCidade').value,telefone:document.getElementById('profTel').value,bio:document.getElementById('profBio').value};await saveUserToFirebase(currentUserData);toast('Perfil atualizado!');renderAll();};
function renderBlog(){document.getElementById('blog').innerHTML=`<div class="blog-hero"><h2>Blog</h2><button class="secondary" onclick="window.open('blog.html','_blank')">Abrir Blog</button></div>`;}
async function renderAdmin(){ if(currentUser?.uid !== ADMIN_UID){ document.getElementById('admin').innerHTML='<div class="card">Acesso restrito.</div>'; return; } const pendingCerts = firebaseCerts.filter(c=>c.status==='Pendente'); const approvedCerts = firebaseCerts.filter(c=>c.status==='Aprovado'); document.getElementById('admin').innerHTML = `<h2>Admin</h2><div class="card"><h3>Criar Colaborador</h3><div class="split"><div><label>Nome</label><input id="newCollabNome"><label>E-mail</label><input id="newCollabEmail"></div><div><label>Senha</label><input id="newCollabSenha" type="password"><label>Cidade</label><input id="newCollabCidade"></div></div><button class="secondary" onclick="window.createCollaboratorAccount()">Criar</button></div><div class="card"><h3>Colaboradores</h3><div class="list">${firebaseUsers.map(c=>`<div class="item"><b>${c.profile?.nome||c.email}</b><p class="hint">${c.points||0} pts</p><div class="actions"><button class="ok" onclick="window.verPerfilColaborador('${c.uid}')">Ver</button><button class="danger" onclick="window.deleteCollaborator('${c.uid}')">Excluir</button></div></div>`).join('')}</div></div><div class="grid"><div class="card stat"><span>Cert. Pendentes</span><b>${pendingCerts.length}</b></div><div class="card stat"><span>Cert. Aprovados</span><b>${approvedCerts.length}</b></div></div><div class="split"><div><h2>Solicitações de Certificado</h2><div class="list">${pendingCerts.map(c=>`<div class="item"><b>${c.nome}</b><p class="hint">${c.usuario}</p><div class="actions"><button class="ok" onclick="window.openApproveCertModal('${c.id}')">Aprovar</button><button class="danger" onclick="window.rejectCertPrompt('${c.id}')">Rejeitar</button></div></div>`).join('')||'<div class="empty">Nenhuma pendente</div>'}</div></div><div><h2>Materiais</h2><form class="card" onsubmit="window.saveMaterial(event)"><input type="hidden" id="matId"><label>Título</label><input id="matTitulo" required><label>Descrição</label><textarea id="matDesc"></textarea><label>Link</label><input id="matLink"><label><input id="matAtivo" type="checkbox" checked> Ativo</label><button class="secondary">Salvar</button></form><div class="list">${firebaseMaterials.map(m=>`<div class="item"><b>${m.titulo}</b><div class="actions"><button class="ghost" onclick="window.editMaterial('${m.id}')">Editar</button><button class="danger" onclick="window.deleteMaterial('${m.id}')">Excluir</button></div></div>`).join('')}</div></div></div><div class="modal-back" id="certModal" onclick="if(event.target.id==='certModal')closeCertModal()"><div class="modal-card" id="certModalBody"></div></div>`; }
window.verPerfilColaborador = function(uid){ const user = firebaseUsers.find(u=>u.uid===uid); if(!user) return; alert(`Perfil: ${user.profile?.nome||user.email}\nPontos: ${user.points||0}\nNível: ${level(user.points)}\nCidade: ${user.profile?.cidade||''}\nTelefone: ${user.profile?.telefone||''}\nBio: ${user.profile?.bio||''}`); };
window.openApproveCertModal = function(certId){ const cert = firebaseCerts.find(c=>c.id==certId); if(!cert) return; document.getElementById('certModalBody').innerHTML = `<h2>Aprovar Certificado: ${cert.nome}</h2><label>Link do certificado (URL):</label><input type="url" id="certLink" style="width:100%"><br><br><div class="actions"><button class="ok" onclick="window.approveCertWithLink('${certId}')">Aprovar</button><button class="danger" onclick="closeCertModal()">Cancelar</button></div>`; document.getElementById('certModal').style.display='flex'; };
window.closeCertModal = function(){ document.getElementById('certModal').style.display='none'; };
window.approveCertWithLink = async function(certId){ const link = document.getElementById('certLink')?.value.trim(); if(!link) return toast('Insira o link'); const cert = firebaseCerts.find(c=>c.id==certId); if(cert){ cert.status='Aprovado'; cert.certificadoUrl=link; await saveCertToFirebase(cert); toast('Certificado aprovado!'); renderAll(); closeCertModal(); } };
window.rejectCertPrompt = async function(certId){ const motivo = prompt('Motivo da rejeição:'); if(!motivo) return; const cert = firebaseCerts.find(c=>c.id==certId); if(cert){ cert.status='Rejeitado'; cert.motivo=motivo; await saveCertToFirebase(cert); toast('Certificado rejeitado!'); renderAll(); } };
window.createCollaboratorAccount = async function(){ const email = document.getElementById('newCollabEmail')?.value.trim(); const nome = document.getElementById('newCollabNome')?.value.trim(); const senha = document.getElementById('newCollabSenha')?.value; const cidade = document.getElementById('newCollabCidade')?.value.trim()||'Itacarambi'; if(!email||!nome||!senha) return toast('Preencha todos os campos'); if(senha.length<6) return toast('Senha mínimo 6 caracteres'); try { const userCred = await window.cpBlogApi.createFirebaseUser(email, senha, nome); const newUser = { uid: userCred.user.uid, email, points:0, profile:{nome, cidade, telefone:'', bio:'Colaborador do projeto'}, training:{answered:{},completedAt:{}}, tasks:JSON.parse(JSON.stringify(defaultTasks)), contents:[], onlineTime:0, createdAt:new Date().toISOString() }; await window.cpBlogApi.saveUser(newUser); await syncUsersFromFirebase(); toast(`Colaborador ${nome} criado!`); document.getElementById('newCollabEmail').value=''; document.getElementById('newCollabNome').value=''; document.getElementById('newCollabSenha').value=''; document.getElementById('newCollabCidade').value=''; renderAdmin(); } catch(e){ toast('Erro: '+e.message); } };
window.deleteCollaborator = async function(uid){ if(!confirm('Excluir colaborador?')) return; await window.cpBlogApi.deleteUserFirebase(uid); await syncUsersFromFirebase(); toast('Colaborador excluído!'); renderAdmin(); renderCommunity(); };
window.saveMaterial = async function(e){ e.preventDefault(); const data = { id: document.getElementById('matId').value||Date.now().toString(), titulo: document.getElementById('matTitulo').value, descricao: document.getElementById('matDesc').value, link: document.getElementById('matLink').value, ativo: document.getElementById('matAtivo').checked }; await window.cpBlogApi.saveMaterial(data); await syncMaterialsFromFirebase(); toast('Material salvo!'); document.getElementById('matId').value=''; document.getElementById('matTitulo').value=''; document.getElementById('matDesc').value=''; document.getElementById('matLink').value=''; document.getElementById('matAtivo').checked=true; renderAdmin(); renderMaterials(); };
window.editMaterial = function(id){ const m = firebaseMaterials.find(x=>x.id==id); if(!m) return; document.getElementById('matId').value=m.id; document.getElementById('matTitulo').value=m.titulo; document.getElementById('matDesc').value=m.descricao; document.getElementById('matLink').value=m.link||''; document.getElementById('matAtivo').checked=m.ativo!==false; toast('Material carregado para edição'); };
window.deleteMaterial = async function(id){ if(!confirm('Excluir material?')) return; await window.cpBlogApi.deleteMaterialFirebase(id); await syncMaterialsFromFirebase(); toast('Material excluído!'); renderAdmin(); renderMaterials(); };

// LOGIN - CORRIGIDO
document.getElementById('loginForm').onsubmit = async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  try {
    const userCredential = await window.cpBlogApi.signIn(email, senha);
    const firebaseUser = userCredential.user;
    const isAdmin = (firebaseUser.uid === ADMIN_UID);
    
    currentUser = {
      email: firebaseUser.email,
      role: isAdmin ? 'admin' : 'colaborador',
      nome: isAdmin ? 'Administrador' : 'Colaborador',
      cidade: 'Itacarambi',
      uid: firebaseUser.uid
    };
    
    if(!isAdmin) {
      let userFromFirebase = await window.cpBlogApi.loadUser(firebaseUser.uid);
      if(!userFromFirebase) {
        currentUserData = {
          uid: firebaseUser.uid,
          email: firebaseUser.email,
          points: 0,
          profile: { nome: currentUser.nome, cidade: currentUser.cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' },
          training: { answered: {}, completedAt: {} },
          tasks: JSON.parse(JSON.stringify(defaultTasks)),
          contents: [],
          onlineTime: 0,
          createdAt: new Date().toISOString()
        };
        await window.cpBlogApi.saveUser(currentUserData);
      } else {
        currentUserData = userFromFirebase;
      }
    }
    
    localStorage.setItem('cpSession', JSON.stringify({ uid: currentUser.uid, email: currentUser.email, role: currentUser.role }));
    await syncUsersFromFirebase();
    await syncPartnersFromFirebase();
    await syncCertsFromFirebase();
    await syncMaterialsFromFirebase();
    await syncSettingsFromFirebase();
    await initMessagesListener();
    startApp();
  } catch(error) {
    toast('Login inválido: ' + error.message);
  }
};

const savedSession = localStorage.getItem('cpSession');
if(savedSession){
  try {
    const session = JSON.parse(savedSession);
    currentUser = { uid: session.uid, email: session.email, role: session.role, nome: session.role === 'admin' ? 'Administrador' : 'Colaborador', cidade: 'Itacarambi' };
    (async () => {
      if(currentUser.role !== 'admin') {
        currentUserData = await window.cpBlogApi.loadUser(currentUser.uid);
        if(!currentUserData) {
          currentUserData = {
            uid: currentUser.uid,
            email: currentUser.email,
            points: 0,
            profile: { nome: currentUser.nome, cidade: currentUser.cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' },
            training: { answered: {}, completedAt: {} },
            tasks: JSON.parse(JSON.stringify(defaultTasks)),
            contents: [],
            onlineTime: 0,
            createdAt: new Date().toISOString()
          };
          await window.cpBlogApi.saveUser(currentUserData);
        }
      }
      await syncUsersFromFirebase();
      await syncPartnersFromFirebase();
      await syncCertsFromFirebase();
      await syncMaterialsFromFirebase();
      await syncSettingsFromFirebase();
      await initMessagesListener();
      startApp();
    })();
  } catch(e) { localStorage.removeItem('cpSession'); }
}
</script>
