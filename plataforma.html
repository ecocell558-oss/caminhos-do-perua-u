  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc, onSnapshot, setDoc, getDoc, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg",
      authDomain: "caminhos-peruacu-blog.firebaseapp.com",
      projectId: "caminhos-peruacu-blog",
      storageBucket: "caminhos-peruacu-blog.firebasestorage.app",
      messagingSenderId: "427400451429",
      appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c"
    };
    
    const app = initializeApp(firebaseConfig);
    const firestore = getFirestore(app);
    const auth = getAuth(app);
    
    window.cpBlogApi = {
      userEmail: '',
      userUid: '',
      auth: auth,
      signIn(email, password) {
        return signInWithEmailAndPassword(auth, email, password);
      },
      async createFirebaseUser(email, password, displayName) {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        return userCredential.user;
      },
      async publishPost(postData) {
        const postsCollection = collection(firestore, 'posts');
        const normalized = {
          title: postData.title || postData.titulo || 'Publicação do colaborador',
          category: postData.category || postData.categoria || 'COLABORADOR',
          excerpt: postData.excerpt || postData.resumo || '',
          full: postData.full || postData.texto || '',
          img: postData.img || '',
          video: postData.video || '',
          link: postData.link || '',
          gallery: Array.isArray(postData.gallery) ? postData.gallery : [],
          galleryLayout: Number(postData.galleryLayout || 3),
          autoCarousel: Boolean(postData.autoCarousel),
          isFeatured: Boolean(postData.isFeatured),
          author: postData.author || 'Central do Colaborador',
          source: 'central-colaborador',
          date: new Date().toISOString()
        };
        const ref = await addDoc(postsCollection, normalized);
        return { id: ref.id, ...normalized };
      },
      async deletePost(postId) {
        const postRef = doc(firestore, 'posts', postId);
        await deleteDoc(postRef);
        return true;
      },
      async loadPosts() {
        const postsCollection = collection(firestore, 'posts');
        const snap = await getDocs(query(postsCollection, orderBy('date', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async savePartner(partnerData) {
        const partnersCollection = collection(firestore, 'partners');
        if(partnerData.id) {
          const partnerRef = doc(firestore, 'partners', partnerData.id);
          await updateDoc(partnerRef, partnerData);
          return { id: partnerData.id, ...partnerData };
        }
        const docRef = await addDoc(partnersCollection, partnerData);
        return { id: docRef.id, ...partnerData };
      },
      async deletePartnerFirebase(partnerId) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await deleteDoc(partnerRef);
        return true;
      },
      async loadPartners() {
        const partnersCollection = collection(firestore, 'partners');
        const snap = await getDocs(query(partnersCollection, orderBy('createdAt', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async updatePartnerStatus(partnerId, status, awarded, comissaoPaga) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await updateDoc(partnerRef, { status, awarded, comissaoPaga });
        return true;
      },
      async saveUser(userData) {
        const userRef = doc(firestore, 'users', userData.uid);
        await setDoc(userRef, userData, { merge: true });
        return userData;
      },
      async loadUser(uid) {
        const userRef = doc(firestore, 'users', uid);
        const snap = await getDoc(userRef);
        if(snap.exists()) return { uid: snap.id, ...snap.data() };
        return null;
      },
      async loadAllUsers() {
        const usersCollection = collection(firestore, 'users');
        const snap = await getDocs(usersCollection);
        const items = [];
        snap.forEach(doc => items.push({ uid: doc.id, ...doc.data() }));
        return items;
      },
      async deleteUserFirebase(uid) {
        const userRef = doc(firestore, 'users', uid);
        await deleteDoc(userRef);
        return true;
      },
      async saveMessage(messageData) {
        const messagesCollection = collection(firestore, 'messages');
        const ref = await addDoc(messagesCollection, messageData);
        return { id: ref.id, ...messageData };
      },
      async loadMessages(callback) {
        const messagesCollection = collection(firestore, 'messages');
        const q = query(messagesCollection, orderBy('time', 'desc'));
        const unsubscribe = onSnapshot(q, (snapshot) => {
          const items = [];
          snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          callback(items.reverse());
        });
        return unsubscribe;
      },
      async saveCertConfig(certConfig) {
        const configRef = doc(firestore, 'certificatesConfig', 'mainConfig');
        await setDoc(configRef, certConfig, { merge: true });
        return certConfig;
      },
      async loadCertConfig() {
        const configRef = doc(firestore, 'certificatesConfig', 'mainConfig');
        const snap = await getDoc(configRef);
        if(snap.exists()) return snap.data();
        return { certificates: [
          { nome: 'Iniciante', pontos: 1500, link: '' },
          { nome: 'Explorador', pontos: 3000, link: '' },
          { nome: 'Colaborador', pontos: 4500, link: '' },
          { nome: 'Embaixador', pontos: 6000, link: '' },
          { nome: 'Especialista', pontos: 7500, link: '' }
        ] };
      },
      async saveMaterial(materialData) {
        const materialsCollection = collection(firestore, 'materials');
        const materialId = materialData.id ? materialData.id.toString() : Date.now().toString();
        const materialRef = doc(firestore, 'materials', materialId);
        await setDoc(materialRef, { ...materialData, id: materialId });
        return { id: materialId, ...materialData };
      },
      async loadMaterials() {
        const materialsCollection = collection(firestore, 'materials');
        const snap = await getDocs(materialsCollection);
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async deleteMaterialFirebase(materialId) {
        const materialRef = doc(firestore, 'materials', materialId.toString());
        await deleteDoc(materialRef);
        return true;
      },
      async saveSettings(settingsData) {
        const settingsRef = doc(firestore, 'settings', 'appSettings');
        await setDoc(settingsRef, settingsData, { merge: true });
        return settingsData;
      },
      async loadSettings() {
        const settingsRef = doc(firestore, 'settings', 'appSettings');
        const snap = await getDoc(settingsRef);
        if(snap.exists()) return snap.data();
        return { whatsappConteudos: '', whatsappForum: '' };
      }
    };
    
    window.dispatchEvent(new CustomEvent('cpBlogApiReady'));
  </script>

async function processFile(file, maxSizeKB = 400) {
  if (!file) return '';
  if (!file.type.startsWith('image/')) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        const maxDimension = 1000;
        if (width > maxDimension || height > maxDimension) {
          if (width > height) { height = (height * maxDimension) / width; width = maxDimension; }
          else { width = (width * maxDimension) / height; height = maxDimension; }
        }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        let quality = 0.7;
        let result = canvas.toDataURL('image/jpeg', quality);
        while (result.length > maxSizeKB * 1024 && quality > 0.2) { quality -= 0.1; result = canvas.toDataURL('image/jpeg', quality); }
        resolve(result);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function makeQuestions(){
 const modulesBase=[
  {title:'Conhecendo o Projeto',themes:['missão do projeto','Vale do Peruaçu/MG','Cerrado','Parque Nacional Cavernas do Peruaçu','turismo sustentável'],correct:['valorizar conservação, educação e renda local','apresentar o destino com responsabilidade ambiental','respeitar regras do parque e comunidades','conectar visitantes a serviços locais qualificados','promover turismo sustentável no Vale do Peruaçu'],wrong:['prometer acesso sem regras ambientais','ignorar guias e comunidades locais','tratar o parque apenas como cenário de fotos','estimular visita sem planejamento','deixar lixo na trilha']},
  {title:'Vendas e Captação de Parceiros',themes:['abordagem inicial','escuta ativa','objeção de preço','benefícios para parceiros','follow-up comercial'],correct:['ouvir a necessidade e apresentar benefícios concretos','registrar contato, próximo passo e objeções','explicar a vitrine online e os planos com clareza','confirmar ordem de serviço e comprovante Pix','manter relacionamento depois do fechamento'],wrong:['pressionar sem entender o cliente','prometer resultado impossível','deixar o contato sem registro','falar apenas da própria pontuação','ignorar dúvidas do parceiro']},
  {title:'Níveis e Pontuação',themes:['nível Iniciante','nível Explorador','nível Colaborador','nível Embaixador','nível Especialista'],correct:['os pontos atualizam nível, ranking e certificados','cada questão correta soma 5 pontos','conteúdo aprovado soma 50 pontos','parceiro aprovado soma 100 pontos','módulo completo soma bônus de 500 pontos'],wrong:['questões corretas não contam pontos','conteúdo aprovado tira pontos','parceiro vale menos que uma questão','certificado não depende de pontuação','nível não muda com pontos']},
  {title:'Dúvidas Frequentes',themes:['certificados','conteúdos pendentes','tarefas','parceiros','blog'],correct:['solicitar e aguardar análise administrativa','enviar dados completos para evitar rejeição','acompanhar status dentro da plataforma','revisar explicações e corrigir próximos envios','usar o fórum e o chat para tirar dúvidas'],wrong:['aprovar o próprio pedido','enviar cadastro sem contato','ignorar status pendente','duplicar solicitação sem necessidade','enviar conteúdo igual já rejeitado']},
  {title:'Cavernas do Peruaçu',themes:['criação do parque','área do parque','Patrimônio Mundial','Gruta do Janelão','arte rupestre'],correct:['O Parque Nacional Cavernas do Peruaçu foi criado em 21 de setembro de 1999','O parque possui área de 56.448 hectares','Em 2025 foi reconhecido como Patrimônio Mundial Natural da UNESCO','A Gruta do Janelão é o principal atrativo do parque','As pinturas rupestres do Peruaçu têm até 12 mil anos'],wrong:['O parque foi criado em 1985','A área do parque é de 10.000 hectares','O parque foi reconhecido pela UNESCO em 2010','A Gruta do Janelão fica fechada para visitação','As pinturas rupestres têm apenas 500 anos']}
 ];
 return modulesBase.map((m,mi) => {
   const questions = [];
   for(let i = 0; i < 5; i++) {
     const theme = m.themes[i % m.themes.length];
     const correct = m.correct[i % m.correct.length];
     const wrongs = [m.wrong[(i) % m.wrong.length], m.wrong[(i+1) % m.wrong.length], m.wrong[(i+2) % m.wrong.length]];
     const alternativas = [...wrongs];
     const posCorreta = Math.floor(Math.random() * 4);
     alternativas.splice(posCorreta, 0, correct);
     questions.push({ pergunta: `Questão ${i+1}: Sobre "${theme}", qual a informação correta?`, alternativas: alternativas, correta: posCorreta, explicacao: `Resposta correta: ${correct}.` });
   }
   return {id:mi+1, title:m.title, questions: questions};
 });
}

const RETAKE_MS=48*60*60*1000;

function canRetakeModule(id){const t=currentUserData?.training?.completedAt?.[id];return t&&Date.now()-new Date(t).getTime()>=RETAKE_MS}
window.retakeModule=async function(id){if(!canRetakeModule(id))return toast('Este módulo poderá ser refeito 48h após a conclusão.');Object.keys(currentUserData.training.answered).forEach(k=>{if(k.startsWith(id+'-'))delete currentUserData.training.answered[k]});delete currentUserData.training.completedAt[id];currentModule=id;currentPage=0;await saveUserToFirebase(currentUserData);toast('Módulo liberado para refazer e pontuar novamente.');renderAll()};

function renderTraining(){const m=modules.find(x=>x.id===currentModule),prog=m.questions.filter((_,i)=>currentUserData?.training?.answered[currentModule+'-'+i]?.correct).length,start=currentPage*5,qs=m.questions.slice(start,start+5);document.getElementById('treinamento').innerHTML=`<div class="training-hero"><div><h2 style="color:#fff;margin:0 0 8px">Sala de Formação do Colaborador</h2><p style="margin:0;color:#eef7f0">Complete os módulos para evoluir.</p></div></div><div class="lesson-path">${modules.map(mm=>{const done=mm.questions.filter((_,i)=>currentUserData?.training?.answered[mm.id+'-'+i]?.correct).length;return`<button class="lesson-node ${mm.id===currentModule?'active':''} ${done===5?'done':''}" onclick="currentModule=${mm.id};currentPage=0;renderTraining()"><b>${mm.id}. ${mm.title}</b><br><small>${done}/5 · ${MODULE_POINTS[mm.id-1]} pts</small><div class="bar" style="margin-top:8px"><i style="width:${(done/5)*100}%"></i></div></button>`}).join('')}</div><div class="card"><div class="item-head"><div><b>Módulo ${currentModule} · ${m.title}</b></div><span class="pill gold">${prog}/5</span></div><div class="bar"><i style="width:${(prog/5)*100}%"></i></div>${canRetakeModule(currentModule)?`<div class="actions"><button class="secondary" onclick="window.retakeModule(${currentModule})">Refazer módulo</button></div>`:''}</div><div class="quiz-tools"><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage--;renderTraining()">← Anterior</button><strong>Questões ${start+1}-${start+qs.length}</strong><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage++;renderTraining()">Próximo →</button></div>${qs.map((q,idx)=>renderQ(q,start+idx)).join('')}`}
function renderQ(q,idx){const key=currentModule+'-'+idx,answered=currentUserData?.training?.answered[key];return `<div class="card q-card"><div class="quiz-question"><span class="pill gold">Q${idx+1}</span><br>${q.pergunta}</div><div class="alts">${q.alternativas.map((a,i)=>`<button class="alt ${answered?(i===q.correta?'correct':(i===answered.choice?'wrong':'')):''}" ${answered?.correct?'disabled':''} onclick="window.answerQ(${idx},${i})">${'ABCD'[i]}) ${a}</button>`).join('')}</div>${answered?`<div class="explain"><b>${answered.correct?'✓ Correta!':'✗ Incorreta. Resposta: '+('ABCD'[q.correta])}</b> ${q.explicacao}</div>`:''}</div>`}
window.answerQ=async function(idx,choice){const q=modules[currentModule-1].questions[idx],key=currentModule+'-'+idx;if(currentUserData?.training?.answered[key]?.correct)return;const ok=choice===q.correta;if(!currentUserData.training.answered) currentUserData.training.answered={};currentUserData.training.answered[key]={choice,correct:ok};if(ok){currentUserData.points = (currentUserData.points || 0) + 5;toast('Correta! +5 pontos');}else toast('Incorreta.');const completed=modules[currentModule-1].questions.every((_,i)=>currentUserData.training.answered[currentModule+'-'+i]?.correct===true);if(completed&&!currentUserData.training.completedAt[currentModule]){const pts=MODULE_POINTS[currentModule-1];currentUserData.training.completedAt[currentModule]=new Date().toISOString();currentUserData.points = (currentUserData.points || 0) + pts;await saveUserToFirebase(currentUserData);toast(`🏆 Módulo completo! +${pts} pontos!`);confetti();}else{await saveUserToFirebase(currentUserData);}renderAll()};

window.sendChat=async function(e){e.preventDefault();const text=chatText.value.trim();if(!text)return;await sendMessageToFirebase(text, currentUserData?.profile?.nome || 'Colaborador', currentUserData?.profile?.cidade || '');chatText.value='';renderCommunity()};
async function renderProfile(){document.getElementById('perfil').innerHTML=`<form class="card" onsubmit="window.saveProfile(event)"><h2>Perfil</h2><label>Nome</label><input id="profNome" value="${currentUserData?.profile?.nome || ''}"><label>Cidade</label><input id="profCidade" value="${currentUserData?.profile?.cidade || ''}"><label>Telefone</label><input id="profTel" value="${currentUserData?.profile?.telefone || ''}"><label>Bio</label><textarea id="profBio">${currentUserData?.profile?.bio || ''}</textarea><button class="secondary">Salvar</button></form>`}
window.saveProfile=async function(e){e.preventDefault();if(!currentUserData.profile) currentUserData.profile={};currentUserData.profile.nome=profNome.value;currentUserData.profile.cidade=profCidade.value;currentUserData.profile.telefone=profTel.value;currentUserData.profile.bio=profBio.value;await saveUserToFirebase(currentUserData);toast('Perfil atualizado.');const profileTask=currentUserData.tasks?.find(t=>t.id===1);if(profileTask&&!profileTask.done&&currentUserData.profile.nome&&currentUserData.profile.cidade&&currentUserData.profile.telefone){profileTask.done=true;currentUserData.points = (currentUserData.points || 0) + profileTask.pontos;await saveUserToFirebase(currentUserData);toast(`+${profileTask.pontos} pontos!`);}renderAll()};
function renderBlog(){document.getElementById('blog').innerHTML=`<div class="blog-hero"><h2>Blog</h2><iframe id="blogFrame" src="blog.html" style="width:100%;height:600px;border:0"></iframe></div>`}

async function renderAdmin(){
  if(currentUser?.uid !== ADMIN_UID){
    document.getElementById('admin').innerHTML='<div class="card">Acesso restrito.</div>';
    return;
  }
  const certs = firebaseCertConfig.certificates || [];
  document.getElementById('admin').innerHTML = `
    <h2>👑 Admin - Certificados</h2>
    <div class="card">
      <h3>📜 Configurar Links dos Certificados</h3>
      <p class="hint">Insira os links (Google Drive, Dropbox, etc) para cada certificado. Colaboradores poderão baixar diretamente ao atingir a pontuação.</p>
      <div id="certsConfigList">
        ${certs.map((cert, idx) => `
          <div class="item" style="margin-bottom:12px">
            <label><strong>${cert.nome}</strong> (${cert.pontos} pontos)</label>
            <div class="password-reveal">
              <input type="text" id="certLink_${idx}" value="${cert.link || ''}" placeholder="Link do certificado (URL)" style="flex:1">
              <button class="ghost" onclick="window.testCertLink('${idx}')">🔗 Testar</button>
            </div>
          </div>
        `).join('')}
      </div>
      <button class="secondary" onclick="window.saveCertLinks()">💾 Salvar Links dos Certificados</button>
    </div>
    
    <div class="card" style="margin-top:20px">
      <h3>➕ Criar Colaborador</h3>
      <div class="split">
        <div><label>Nome</label><input id="newCollabNome" placeholder="Nome"><label>E-mail</label><input id="newCollabEmail" placeholder="email@exemplo.com"></div>
        <div><label>Senha</label><input id="newCollabSenha" type="password" placeholder="******"><label>Cidade</label><input id="newCollabCidade" placeholder="Cidade"></div>
      </div>
      <button class="secondary" onclick="window.createCollaboratorAccount()">➕ Criar Conta</button>
    </div>
    
    <div class="card" style="margin-top:20px">
      <h3>👥 Colaboradores (${firebaseUsers.length})</h3>
      <div class="list" style="max-height:300px;overflow-y:auto">
        ${firebaseUsers.map(c => `
          <div class="item">
            <div class="item-head">
              <div><b>${c.profile?.nome || c.email}</b><p class="hint">${c.email} · ${c.points || 0} pts</p></div>
              <div class="actions">
                <button class="ghost" onclick="window.verPerfilColaborador('${c.uid}')">👁️ Ver</button>
                <button class="danger" onclick="window.deleteCollaborator('${c.uid}')">🗑️ Excluir</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

window.saveCertLinks = async function() {
  const certs = firebaseCertConfig.certificates || [];
  const updatedCerts = certs.map((cert, idx) => {
    const linkInput = document.getElementById(`certLink_${idx}`);
    return { ...cert, link: linkInput ? linkInput.value.trim() : '' };
  });
  firebaseCertConfig.certificates = updatedCerts;
  await saveCertConfigToFirebase(firebaseCertConfig);
  toast('✅ Links dos certificados salvos!');
  renderCerts();
};

window.testCertLink = function(idx) {
  const linkInput = document.getElementById(`certLink_${idx}`);
  if(linkInput && linkInput.value.trim()) {
    window.open(linkInput.value.trim(), '_blank');
  } else {
    toast('Link vazio. Insira um link primeiro.');
  }
};

window.verPerfilColaborador = function(uid) {
  const user = firebaseUsers.find(u => u.uid === uid);
  if(!user) { toast('Colaborador não encontrado'); return; }
  const history = pointsAdjustmentHistory[uid] || [];
  const safeId = uid.replace(/[^a-zA-Z0-9]/g, '_');
  let modal = document.getElementById('profileModalGlobal');
  if(!modal) {
    modal = document.createElement('div');
    modal.id = 'profileModalGlobal';
    modal.className = 'modal-back';
    modal.style.display = 'flex';
    modal.onclick = function(e) { if(e.target === modal) modal.style.display = 'none'; };
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="modal-card">
      <h2>👤 ${user.profile?.nome || user.email}</h2>
      <p><strong>📧 E-mail:</strong> ${user.email}</p>
      <p><strong>⭐ Pontos:</strong> <span style="font-size:28px;font-weight:900;color:var(--primary)">${user.points || 0}</span></p>
      <div class="points-control">
        <h4>🎮 Controle de Pontos</h4>
        <div class="points-input-group">
          <input type="number" id="pointsValue_${safeId}" placeholder="Quantidade" value="10">
          <button class="ok" onclick="window.adjustPoints('${uid}', 'add')">➕ Adicionar</button>
          <button class="danger" onclick="window.adjustPoints('${uid}', 'remove')">➖ Remover</button>
        </div>
      </div>
      <div class="actions"><button class="secondary" onclick="document.getElementById('profileModalGlobal').style.display='none'">Fechar</button></div>
    </div>
  `;
  modal.style.display = 'flex';
};

window.adjustPoints = async function(uid, operation) {
  const user = firebaseUsers.find(u => u.uid === uid);
  if(!user) return;
  const safeId = uid.replace(/[^a-zA-Z0-9]/g, '_');
  const pointsInput = document.getElementById(`pointsValue_${safeId}`);
  let points = parseInt(pointsInput?.value);
  if(isNaN(points) || points <= 0) { toast('Valor válido'); return; }
  const oldPoints = user.points || 0;
  let newPoints = operation === 'add' ? oldPoints + points : Math.max(0, oldPoints - points);
  user.points = newPoints;
  await window.cpBlogApi.saveUser(user);
  await syncUsersFromFirebase();
  if(!pointsAdjustmentHistory[uid]) pointsAdjustmentHistory[uid] = [];
  pointsAdjustmentHistory[uid].push({ date: new Date().toISOString(), operation: operation === 'add' ? `+${points}` : `-${points}`, oldPoints, newPoints });
  toast(`Pontos alterados: ${oldPoints} → ${newPoints}`);
  renderAll();
  const modal = document.getElementById('profileModalGlobal');
  if(modal && modal.style.display === 'flex') window.verPerfilColaborador(uid);
};

window.createCollaboratorAccount = async function() {
  const email = document.getElementById('newCollabEmail')?.value.trim();
  const nome = document.getElementById('newCollabNome')?.value.trim();
  const senha = document.getElementById('newCollabSenha')?.value;
  const cidade = document.getElementById('newCollabCidade')?.value.trim() || 'Itacarambi';
  if(!email || !nome || !senha) return toast('Preencha todos os campos');
  if(senha.length < 6) return toast('Senha mínimo 6 caracteres');
  try {
    const userCredential = await window.cpBlogApi.createFirebaseUser(email, senha, nome);
    const newUserData = {
      uid: userCredential.uid,
      email: email,
      points: 0,
      profile: { nome: nome, cidade: cidade, telefone: '', bio: 'Colaborador' },
      training: { answered: {}, bonus: [], completedAt: {} },
      tasks: JSON.parse(JSON.stringify(defaultTasks)),
      contents: [],
      onlineTime: 0,
      createdAt: new Date().toISOString()
    };
    await window.cpBlogApi.saveUser(newUserData);
    await syncUsersFromFirebase();
    toast(`✅ Colaborador "${nome}" criado!`);
    renderAdmin();
  } catch(error) { toast('Erro: ' + error.message); }
};

window.deleteCollaborator = async function(uid) {
  if(!confirm('Excluir permanentemente?')) return;
  try {
    await window.cpBlogApi.deleteUserFirebase(uid);
    await syncUsersFromFirebase();
    toast('Removido!');
    renderAdmin();
  } catch(e) { toast('Erro: ' + e.message); }
};

function renderDashboard(){const doneTasks=currentUserData?.tasks?.filter(t=>t.done).length||0,closed=firebasePartners.filter(p=>p.status==='Aprovado' && p.userUid===currentUser?.uid).length;document.getElementById('dashboard').innerHTML=`<div class="grid"><div class="card stat"><span>Pontos</span><b>${currentUserData?.points||0}</b></div><div class="card stat"><span>Nível</span><b>${level()}</b></div><div class="card stat"><span>Tarefas</span><b>${doneTasks}/${currentUserData?.tasks?.length||8}</b></div><div class="card stat"><span>Parceiros</span><b>${closed}</b></div></div>`}
function renderNav(){const isAdmin = (currentUser?.uid === ADMIN_UID);document.getElementById('nav').innerHTML=navItems.map(x=>`<button class="${x[0]===currentTab?'active':''} ${x[0]==='admin' && !isAdmin?'admin-only':''}" onclick="window.showTab('${x[0]}')"><span>${x[1]}</span>${x[2]}</button>`).join('')}
window.showTab=function(id){currentTab=id;document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));document.getElementById('pageTitle').textContent=navItems.find(x=>x[0]===id)[2];document.getElementById('sidebar').classList.remove('open');renderNav();renderAll()};
async function renderAll(){
  if(!currentUser)return;
  document.getElementById('sideName').textContent=currentUser.role==='admin'?'Admin':currentUserData?.profile?.nome||'Colaborador';
  document.getElementById('sideLevel').textContent=currentUser.role==='admin'?'Admin':level();
  document.getElementById('sidePoints').textContent=currentUser.role==='admin'?'Admin':(currentUserData?.points||0)+' pts';
  renderDashboard();
  renderTraining();
  renderMaterials();
  renderTasks();
  renderPartners();
  renderRanking();
  renderCerts();
  renderCommunity();
  renderProfile();
  renderBlog();
  renderAdmin();
}

async function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const isAdmin = (currentUser?.uid === ADMIN_UID);
  document.body.classList.toggle('is-admin',isAdmin);
  await syncUsersFromFirebase();
  await syncPartnersFromFirebase();
  await syncMaterialsFromFirebase();
  await syncSettingsFromFirebase();
  await syncCertConfigFromFirebase();
  await initMessagesListener();
  renderNav();
  renderAll();
  showTab('dashboard');
}

window.logout=async function(){if(onlineInterval)clearInterval(onlineInterval);if(messagesUnsubscribe)messagesUnsubscribe();localStorage.removeItem('cpSession');location.reload();};
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open')}

document.getElementById('loginForm').onsubmit = async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  try {
    const userCredential = await window.cpBlogApi.signIn(email, senha);
    const firebaseUser = userCredential.user;
    let role = firebaseUser.uid === ADMIN_UID ? 'admin' : 'colaborador';
    currentUser = { email: firebaseUser.email, role: role, uid: firebaseUser.uid };
    if(role === 'colaborador') {
      let userFromFirebase = await window.cpBlogApi.loadUser(firebaseUser.uid);
      if(!userFromFirebase) {
        currentUserData = {
          uid: firebaseUser.uid,
          email: firebaseUser.email,
          points: 0,
          profile: { nome: 'Colaborador', cidade: 'Itacarambi', telefone: '', bio: 'Colaborador' },
          training: { answered: {}, bonus: [], completedAt: {} },
          tasks: JSON.parse(JSON.stringify(defaultTasks)),
          contents: [],
          onlineTime: 0,
          createdAt: new Date().toISOString()
        };
        await window.cpBlogApi.saveUser(currentUserData);
      } else {
        currentUserData = userFromFirebase;
      }
    }
    localStorage.setItem('cpSession', JSON.stringify(currentUser));
    startApp();
  } catch(error) { toast('Login inválido: ' + error.message); }
};

const session = localStorage.getItem('cpSession');
if(session){
  currentUser = JSON.parse(session);
  if(currentUser.uid === ADMIN_UID) currentUser.role = 'admin';
  else currentUser.role = 'colaborador';
  (async () => {
    await syncUsersFromFirebase();
    await syncPartnersFromFirebase();
    await syncMaterialsFromFirebase();
    await syncSettingsFromFirebase();
    await syncCertConfigFromFirebase();
    await initMessagesListener();
    if(currentUser.role === 'colaborador') {
      currentUserData = await window.cpBlogApi.loadUser(currentUser.uid);
      if(!currentUserData) {
        currentUserData = {
          uid: currentUser.uid,
          email: currentUser.email,
          points: 0,
          profile: { nome: 'Colaborador', cidade: 'Itacarambi', telefone: '', bio: 'Colaborador' },
          training: { answered: {}, bonus: [], completedAt: {} },
          tasks: JSON.parse(JSON.stringify(defaultTasks)),
          contents: [],
          onlineTime: 0,
          createdAt: new Date().toISOString()
        };
        await window.cpBlogApi.saveUser(currentUserData);
      }
    }
    startApp();
  })();
}
</script>
