  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg",
      authDomain: "caminhos-peruacu-blog.firebaseapp.com",
      projectId: "caminhos-peruacu-blog",
      storageBucket: "caminhos-peruacu-blog.firebasestorage.app",
      messagingSenderId: "427400451429",
      appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c"
    };
    
    const app = initializeApp(firebaseConfig);
    const firestore = getFirestore(app);
    const auth = getAuth(app);
    
    window.cpBlogApi = {
      userEmail: '',
      userUid: '',
      async signIn(email, password) {
        const result = await signInWithEmailAndPassword(auth, email, password);
        this.userEmail = result.user.email;
        this.userUid = result.user.uid;
        return result;
      },
      async createFirebaseUser(email, password, displayName) {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        return userCredential.user;
      },
      async publishPost(postData) {
        const postsCollection = collection(firestore, 'posts');
        const normalized = {
          title: postData.title || postData.titulo || 'Publicação do colaborador',
          category: postData.category || postData.categoria || 'COLABORADOR',
          excerpt: postData.excerpt || postData.resumo || '',
          full: postData.full || postData.texto || '',
          img: postData.img || '',
          video: postData.video || '',
          link: postData.link || '',
          gallery: Array.isArray(postData.gallery) ? postData.gallery : [],
          galleryLayout: Number(postData.galleryLayout || 3),
          autoCarousel: Boolean(postData.autoCarousel),
          isFeatured: Boolean(postData.isFeatured),
          author: postData.author || 'Central do Colaborador',
          source: 'central-colaborador',
          date: new Date().toISOString()
        };
        const ref = await addDoc(postsCollection, normalized);
        return { id: ref.id, ...normalized };
      },
      async deletePost(postId) {
        const postRef = doc(firestore, 'posts', postId);
        await deleteDoc(postRef);
        return true;
      },
      async loadPosts() {
        const postsCollection = collection(firestore, 'posts');
        const snap = await getDocs(query(postsCollection, orderBy('date', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async savePartner(partnerData) {
        const partnersCollection = collection(firestore, 'partners');
        if(partnerData.id) {
          const partnerRef = doc(firestore, 'partners', partnerData.id);
          await updateDoc(partnerRef, partnerData);
          return { id: partnerData.id, ...partnerData };
        }
        const docRef = await addDoc(partnersCollection, partnerData);
        return { id: docRef.id, ...partnerData };
      },
      async deletePartnerFirebase(partnerId) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await deleteDoc(partnerRef);
        return true;
      },
      async loadPartners() {
        const partnersCollection = collection(firestore, 'partners');
        const snap = await getDocs(query(partnersCollection, orderBy('createdAt', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async updatePartnerStatus(partnerId, status, awarded, comissaoPaga) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await updateDoc(partnerRef, { status, awarded, comissaoPaga });
        return true;
      }
    };
    
    window.dispatchEvent(new CustomEvent('cpBlogApiReady'));
  </script>

window.adjustPoints = function(email, operation) {
  const emailKey = userKey(email);
  const user = db.users[emailKey];
  if(!user) { toast('Colaborador não encontrado'); return; }
  const safeId = emailKey.replace(/[^a-zA-Z0-9]/g, '_');
  const pointsInput = document.getElementById(`pointsValue_${safeId}`);
  let points = parseInt(pointsInput?.value);
  if(isNaN(points) || points <= 0) { toast('Digite um valor válido (maior que 0)'); return; }
  const oldPoints = user.points;
  let newPoints = oldPoints;
  let operationText = '';
  if(operation === 'add') { newPoints = oldPoints + points; operationText = `Adicionou +${points} pontos`; }
  else if(operation === 'remove') { newPoints = Math.max(0, oldPoints - points); operationText = `Removeu ${points} pontos`; }
  user.points = newPoints;
  saveDB();
  if(!pointsAdjustmentHistory[emailKey]) pointsAdjustmentHistory[emailKey] = [];
  pointsAdjustmentHistory[emailKey].push({ date: new Date().toISOString(), operation: operation === 'add' ? `+${points}` : `-${points}`, oldPoints: oldPoints, newPoints: newPoints, admin: currentUser?.email || 'Admin' });
  toast(`✅ ${operationText}! Pontos alterados de ${oldPoints} para ${newPoints}`);
  renderAdmin();
  if(email === currentUser?.email) renderAll();
  const modal = document.getElementById('profileModalGlobal');
  if(modal && modal.style.display === 'flex') {
    window.verPerfilColaborador(email, user.profile?.nome || email);
  }
};

window.setExactPoints = function(email) {
  const emailKey = userKey(email);
  const user = db.users[emailKey];
  if(!user) { toast('Colaborador não encontrado'); return; }
  const safeId = emailKey.replace(/[^a-zA-Z0-9]/g, '_');
  const pointsInput = document.getElementById(`exactPointsValue_${safeId}`);
  let points = parseInt(pointsInput?.value);
  if(isNaN(points) || points < 0) { toast('Digite um valor válido (maior ou igual a 0)'); return; }
  const oldPoints = user.points;
  const difference = points - oldPoints;
  user.points = points;
  saveDB();
  if(!pointsAdjustmentHistory[emailKey]) pointsAdjustmentHistory[emailKey] = [];
  pointsAdjustmentHistory[emailKey].push({ date: new Date().toISOString(), operation: `Definido para ${points} (${difference >= 0 ? '+' : ''}${difference})`, oldPoints: oldPoints, newPoints: points, admin: currentUser?.email || 'Admin' });

  renderAdmin();
  if(email === currentUser?.email) renderAll();
  const modal = document.getElementById('profileModalGlobal');
  if(modal && modal.style.display === 'flex') {
    window.verPerfilColaborador(email, user.profile?.nome || email);
  }
};

async function compressImage(dataUrl, maxSizeKB = 400) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      const maxDimension = 1000;
      if (width > maxDimension || height > maxDimension) {
        if (width > height) {
          height = (height * maxDimension) / width;
          width = maxDimension;
        } else {
          width = (width * maxDimension) / height;
          height = maxDimension;
        }
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      let quality = 0.7;
      let result = canvas.toDataURL('image/jpeg', quality);
      while (result.length > maxSizeKB * 1024 && quality > 0.2) {
        quality -= 0.1;
        result = canvas.toDataURL('image/jpeg', quality);
      }
      resolve(result);
    };
    img.src = dataUrl;
  });
}

async function processFile(file, maxSizeKB = 400) {
  if (!file) return '';
  if (!file.type.startsWith('image/')) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const compressed = await compressImage(e.target.result, maxSizeKB);
      resolve(compressed);
    };
    reader.readAsDataURL(file);
  });
}

function renderTraining(){const m=modules.find(x=>x.id===currentModule),prog=m.questions.filter((_,i)=>u().training.answered[currentModule+'-'+i]?.correct).length,start=currentPage*10,qs=m.questions.slice(start,start+10),total=totalAnswered(),phrase=prog<10?'Vamos construir a base com calma.':'Ótimo ritmo. Agora transforme conhecimento em segurança para orientar visitantes e parceiros.',completedAt=u().training.completedAt?.[currentModule],next=completedAt?new Date(new Date(completedAt).getTime()+RETAKE_MS):null;document.getElementById('treinamento').innerHTML=`<div class="training-hero"><div><h2 style="color:#fff;margin:0 0 8px">Sala de Formação do Colaborador</h2><p style="margin:0;color:#eef7f0">${phrase} Sua missão atual é concluir todas as 10 questões do módulo, revisar as explicações e avançar no mapa de aprendizagem.</p><div class="actions"><span class="pill gold">${total}/50 questões</span><span class="pill gold">Módulo ${currentModule}: ${prog}/10</span><span class="pill gold">Módulo completo: ${MODULE_POINTS[currentModule-1]} pontos</span>${completedAt?`<span class="pill gold">Refazer após ${next.toLocaleString('pt-BR')}</span>`:''}</div></div></div><div class="lesson-path">${modules.map(mm=>{const done=mm.questions.filter((_,i)=>u().training.answered[mm.id+'-'+i]?.correct).length,ready=canRetakeModule(mm.id);return`<button class="lesson-node ${mm.id===currentModule?'active':''} ${done===10?'done':''}" onclick="currentModule=${mm.id};currentPage=0;renderTraining()"><b>${mm.id}. ${mm.title}</b><br><small>${done}/10 concluídas · ${MODULE_POINTS[mm.id-1]} pts</small>${ready?'<br><small>Disponível para refazer</small>':''}<div class="bar" style="margin-top:8px"><i style="width:${(done/10)*100}%"></i></div></button>`}).join('')}</div><div class="card"><div class="item-head"><div><b>Módulo ${currentModule} · ${m.title}</b><p class="hint">Responda todas as 10 questões corretamente para concluir o módulo e ganhar ${MODULE_POINTS[currentModule-1]} pontos.</p></div><span class="pill gold">${prog}% do módulo</span></div><div class="bar"><i style="width:${(prog/10)*100}%"></i></div>${canRetakeModule(currentModule)?`<div class="actions"><button class="secondary" onclick="window.retakeModule(${currentModule})">Refazer módulo e pontuar novamente</button></div>`:''}</div><div class="quiz-tools"><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage--;renderTraining()">← Questões anteriores</button><strong>Questões ${start+1} a ${start+qs.length}</strong><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage++;renderTraining()">Próximas questões →</button></div>${qs.map((q,idx)=>renderQ(q,start+idx)).join('')}`}
function renderQ(q,idx){const key=currentModule+'-'+idx,answered=u().training.answered[key],locked=answered?.correct;return `<div class="card q-card"><div class="quiz-question"><span class="pill gold">Questão ${idx+1}</span><br>${q.pergunta}</div><div class="alts">${q.alternativas.map((a,i)=>`<button class="alt ${answered?(i===q.correta?'correct':(i===answered.choice?'wrong':'')):''}" ${locked?'disabled':''} onclick="window.answerQ(${idx},${i})">${'ABCD'[i]}) ${a}</button>`).join('')}</div>${answered?`<div class="explain"><b>${answered.correct?'Resposta perfeita! ✓':'Quase lá. Resposta correta: '+('ABCD'[q.correta])+'.'}</b> ${q.explicacao}</div>`:''}</div>`}
window.answerQ=function(idx,choice){const q=modules[currentModule-1].questions[idx],key=currentModule+'-'+idx;if(u().training.answered[key]?.correct)return;const ok=choice===q.correta;u().training.answered[key]={choice,correct:ok};if(ok){u().points+=5;toast('Resposta correta! +5 pontos');}else toast('Resposta incorreta. Leia a explicação e tente novamente.');const completed=modules[currentModule-1].questions.every((_,i)=>u().training.answered[currentModule+'-'+i]?.correct===true);if(completed&&!u().training.completedAt[currentModule]){const pts=MODULE_POINTS[currentModule-1]||40;u().training.completedAt[currentModule]=new Date().toISOString();u().points+=pts;saveDB();toast(`🏆 Módulo ${currentModule} completo! +${pts} pontos! Poderá refazer em 48h.`);confetti();}else{saveDB();}renderAll()};
function renderMaterials(){document.getElementById('materiais').innerHTML=`<h2>Materiais para download</h2><p class="hint">Materiais gerenciados pelo painel admin. O download pode ser simulado ou abrir um link configurado.</p><div class="list">${(db.materials||[]).filter(m=>m.ativo!==false).map(m=>`<div class="item item-head"><div><b>${m.titulo}</b><p class="hint">${m.descricao}</p></div><button class="secondary" onclick="${m.link?`window.open('${m.link}','_blank')`:`alert('Download simulado: ${m.titulo}');toast('Download simulado: ${m.titulo}')`}">${m.link?'Abrir':'Baixar'}</button></div>`).join('')||'<div class="empty">Nenhum material cadastrado.</div>'}</div>`}
function saveMaterial(e){e.preventDefault();const id=matId.value?Number(matId.value):Date.now();const found=db.materials.find(m=>m.id===id);const data={id,titulo:matTitulo.value,descricao:matDesc.value,link:matLink.value,ativo:matAtivo.checked};if(found)Object.assign(found,data);else db.materials.push(data);saveDB();toast(found?'Material atualizado.':'Material adicionado.');renderAdmin();renderMaterials()}
function editMaterial(id){const m=db.materials.find(x=>x.id===id);if(!m)return;matId.value=m.id;matTitulo.value=m.titulo;matDesc.value=m.descricao;matLink.value=m.link||'';matAtivo.checked=m.ativo!==false;toast('Material carregado para edição.')}
function deleteMaterial(id){if(!confirm('Remover este material?'))return;db.materials=db.materials.filter(m=>m.id!==id);saveDB();toast('Material removido.');renderAdmin();renderMaterials()}

window.doneTask=function(id){let t=u().tasks.find(x=>x.id===id);if(t.done)return;if(t.id===1){const perfilCompleto = u().profile.nome && u().profile.cidade && u().profile.telefone;if(!perfilCompleto){toast('Complete seu perfil (nome, cidade e telefone) primeiro!');return;}t.done=true;addPoints(t.pontos,'tarefa concluída');}
else if(t.id===2){toast('Conclua esta tarefa acessando a aba Materiais e baixando o conteúdo!');}
else if(t.id===3){toast('Conclua esta tarefa cadastrando 3 parceiros na aba Parceiros!');}
else if(t.id===4){toast('Conclua esta tarefa enviando um conteúdo que seja aprovado pelo admin!');}
else if(t.id===5){toast('Conclua esta tarefa mantendo parceiros atualizados!');}
else if(t.id===6){toast('Esta tarefa será concluída automaticamente ao ter 3 conteúdos aprovados!');}

else{t.done=true;addPoints(t.pontos,'tarefa concluída');}saveDB();renderAll()}

window.editPartner = function(partnerId){
  const partner = getAllPartners().find(p => p.id == partnerId);
  if(!partner) return toast('Parceiro não encontrado');
  if(currentUser?.role !== 'admin' && partner.userUid !== currentUser?.uid) {
    return toast('Você só pode editar seus próprios parceiros');
  }
  window.editingPartnerId = partnerId;
  window.editingPartnerData = partner;
  renderPartners();
  setTimeout(() => {
    document.getElementById('pnome').value = partner.nome;
    document.getElementById('pcat').value = partner.categoria;
    document.getElementById('pcidade').value = partner.cidade;
    document.getElementById('pcontato').value = partner.contato;
    document.getElementById('pobs').value = partner.obs || '';
    const planoOption = partner.plano === 'Comum' ? 'Comum|69.90' : 'Premium|149.90';
    document.getElementById('pplano').value = planoOption;
  }, 100);
}

window.cancelEditPartner = function(){
  window.editingPartnerId = null;
  window.editingPartnerData = null;
  renderPartners();
}

window.openPartnerAttachment = function(partnerId, field){
  const partner = getAllPartners().find(p => p.id == partnerId);
  if(!partner || !partner[field]) return toast('Anexo não encontrado.');
  const w = window.open('','_blank');
  if(partner[field].startsWith('data:application/pdf')) w.document.write(`<iframe src="${partner[field]}" style="width:100%;height:100vh;border:0"></iframe>`);
  else w.document.write(`<img src="${partner[field]}" style="max-width:100%;height:auto">`);
  w.document.close();
}

window.addPartner = async function(e){
  e.preventDefault();
  if(!currentUser || !currentUser.uid) { toast('Usuário não autenticado. Faça login novamente.'); return; }
  const [plano, valor] = document.getElementById('pplano').value.split('|');
  const posFile = document.getElementById('pos').files[0];
  const pixFile = document.getElementById('ppix').files[0];
  const isAdminUser = (currentUser?.role === 'admin');
  let osData = window.editingPartnerData?.osData || '';
  let pixData = window.editingPartnerData?.pixData || '';
  if(posFile) { toast('Processando imagem da Ordem de Serviço...'); osData = await processFile(posFile, 400); }
  if(pixFile) { toast('Processando imagem do Comprovante Pix...'); pixData = await processFile(pixFile, 400); }
  let partnerStatus = window.editingPartnerId ? (window.editingPartnerData?.status || 'Pendente') : 'Pendente';
  let partnerAwarded = window.editingPartnerId ? (window.editingPartnerData?.awarded || false) : false;
  let partnerComissaoPaga = window.editingPartnerId ? (window.editingPartnerData?.comissaoPaga || false) : false;
  if(isAdminUser && !window.editingPartnerId) { partnerStatus = 'Aprovado'; partnerAwarded = true; partnerComissaoPaga = true; }
  const partnerData = { nome: document.getElementById('pnome').value || '', categoria: document.getElementById('pcat').value || '', cidade: document.getElementById('pcidade').value || '', contato: document.getElementById('pcontato').value || '', plano: plano || 'Comum', valor: Number(valor) || 69.90, obs: document.getElementById('pobs').value || '', osData: osData || '', pixData: pixData || '', status: partnerStatus, awarded: partnerAwarded, comissaoPaga: partnerComissaoPaga, colaboradorEmail: currentUser?.email || '', colaboradorNome: isAdminUser ? 'Administrador' : (u().profile?.nome || currentUser?.nome || 'Colaborador'), userUid: currentUser?.uid || '', createdAt: window.editingPartnerId ? (window.editingPartnerData?.createdAt || new Date().toISOString()) : new Date().toISOString() };
  if(window.editingPartnerId) partnerData.id = window.editingPartnerId;
  try { const saved = await window.cpBlogApi.savePartner(partnerData); await syncPartnersFromFirebase(); toast(window.editingPartnerId ? '✏️ Parceiro atualizado com sucesso!' : (isAdminUser ? '✅ Parceiro adicionado diretamente como APROVADO!' : '🤝 Parceiro enviado para aprovação do admin!')); window.editingPartnerId = null; window.editingPartnerData = null; renderPartners(); document.getElementById('pos').value = ''; document.getElementById('ppix').value = ''; } catch(error) { console.error('Erro detalhado:', error); toast('Erro ao salvar parceiro: ' + error.message); }
};

window.deletePartner = async function(partnerId){ if(!confirm('Excluir este parceiro permanentemente?')) return; try { await window.cpBlogApi.deletePartnerFirebase(partnerId); await syncPartnersFromFirebase(); toast('Parceiro removido com sucesso!'); renderPartners(); if(currentUser?.uid === ADMIN_UID && currentTab === 'admin') renderAdmin(); } catch(error) { toast('Erro ao excluir parceiro: ' + error.message); } }
window.approvePartner = async function(partnerId, ok, colaboradorEmail){ let targetPartner = getAllPartners().find(p => p.id == partnerId); if(!targetPartner) return toast('Parceiro não encontrado'); const newStatus = ok ? 'Aprovado' : 'Rejeitado'; try { await window.cpBlogApi.updatePartnerStatus(partnerId, newStatus, ok ? true : false, ok ? true : false); if(ok && !targetPartner.awarded){ const targetUser = db.users[userKey(colaboradorEmail || targetPartner.colaboradorEmail)]; if(targetUser){ targetUser.points = (targetUser.points || 0) + 100; saveDB(); } toast(`✅ Parceiro aprovado! +100 pontos para o colaborador. Comissão de R$ ${(targetPartner.valor * 0.3).toFixed(2)}`); } else { toast(ok ? 'Parceiro aprovado.' : 'Parceiro rejeitado.'); } await syncPartnersFromFirebase(); renderPartners(); if(currentUser?.uid === ADMIN_UID && currentTab === 'admin') renderAdmin(); } catch(error) { toast('Erro ao atualizar status: ' + error.message); } }
function renderRanking(){const rows=[...seedRanking,{nome:u().profile.nome,cidade:u().profile.cidade,pontos:u().points,me:true}].sort((a,b)=>b.pontos-a.pontos);document.getElementById('ranking').innerHTML=`<h2>Ranking de colaboradores</h2><table class="table"><thead><tr><th>#</th><th>Nome</th><th>Cidade</th><th>Pontos</th></tr></thead><tbody>${rows.map((r,i)=>`<tr class="${r.me?'me':''}"><td>${i+1}</td><td>${r.nome}${r.me?' (você)':''}</td><td>${r.cidade}</td><td>${r.pontos}</td></tr>`).join('')}</tbody></table>`}
function renderCerts(){ const userCerts = db.certs.filter(c => c.user === currentUser?.email); document.getElementById('certificados').innerHTML=`<h2>Certificados Disponíveis</h2><div class="grid">${CERTS.map(c=>`<div class="card"><b>${c[0]}</b><p class="hint">Requer ${c[1]} pontos.</p><button class="secondary" ${u().points<c[1]?'disabled':''} onclick="window.askCert('${c[0]}',${c[1]})">Solicitar</button></div>`).join('')}</div><h2>Minhas Solicitações</h2><div class="list">${userCerts.length ? userCerts.map(c=>`<div class="item"><div class="item-head"><div><b>${c.nome}</b><p class="hint">Solicitado em ${new Date(c.requestDate).toLocaleDateString('pt-BR')}</p>${c.motivo ? `<p class="hint" style="color:#c0392b">Motivo da rejeição: ${c.motivo}</p>` : ''}</div><span class="pill ${c.status==='Aprovado'?'ok':c.status==='Rejeitado'?'bad':'gold'}">${c.status}</span></div>${c.certificadoUrl && c.status === 'Aprovado' ? `<div class="actions"><button class="secondary" onclick="window.open('${c.certificadoUrl}','_blank')">📄 BAIXAR CERTIFICADO</button></div>` : ''}</div>`).join('') : '<div class="empty">Nenhuma solicitação de certificado.</div>'}</div>`; }
window.askCert = function(nome, pts){ if(db.certs.some(c=>c.user===currentUser?.email && c.nome===nome && c.status!=='Rejeitado')){ return toast('Você já solicitou este certificado.'); } db.certs.push({ id: Date.now(), user: currentUser?.email, usuario: u().profile.nome, nome: nome, pts: pts, status: 'Pendente', requestDate: new Date().toISOString(), certificadoUrl: '', motivo: '' }); saveDB(); toast('📜 Certificado solicitado para análise.'); renderAll(); };
function groupLink(label,link){return `<button class="secondary" onclick="${link?`window.open('${link}','_blank')`:`toast('Link do grupo ${label} ainda não configurado pelo admin.')`}">${link?'Entrar no grupo':'Aguardando link'}</button>`}
function renderCommunity(){const el=document.getElementById('comunidade');if(!el)return;const online=onlineUsers(),people=allPeople();el.innerHTML=`<div class="blog-hero"><h2>Comunidade Caminhos do Peruaçu</h2><p>Colaboradores conectados, grupos oficiais, fórum interno e perfis públicos em um só lugar.</p><div class="actions"><span class="pill gold"><span class="online-dot"></span>${online.length} online agora</span><span class="pill gold">${people.length} perfis</span><span class="pill gold">Chat limpo a cada 24h</span></div></div><div class="grid" style="margin-top:16px"><div class="group-card"><h3>Grupo de Conteúdos</h3><p class="hint">Espaço para posts de Instagram, Reels, fotos, legendas e materiais de divulgação.</p>${groupLink('de conteúdos',db.settings.whatsappConteudos)}</div><div class="group-card"><h3>Grupo Fórum</h3><p class="hint">Espaço para dúvidas, ideias, alinhamentos e apoio entre colaboradores.</p>${groupLink('fórum',db.settings.whatsappForum)}</div><div class="card stat"><span>Colaboradores online</span><b>${online.length}</b><p class="hint">Atualiza automaticamente enquanto a plataforma está aberta.</p></div><div class="card stat"><span>Mensagens no chat</span><b>${db.chat.length}</b><p class="hint">Chat salvo no navegador via localStorage. Mensagens apagadas após 24h.</p></div></div><div class="chat-shell" style="margin-top:16px"><div class="card"><h2>Perfis e online</h2><div class="list">${people.map(p=>`<div class="item profile-card"><div class="avatar">${(p.nome||'?').split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div style="flex:1"><b>${online.some(o=>o.id===p.id)?'<span class="online-dot"></span>':''}${p.nome}${p.me?' (você)':''}</b><p class="hint">${p.cidade} · ${p.nivel} · ${p.pontos} pts</p></div><button class="ghost" onclick="window.openProfile('${p.id}')">Ver</button></div>`).join('')}</div></div><div class="card"><div class="item-head"><div><h2>Chat dos colaboradores</h2><p class="hint">Converse com a equipe dentro da plataforma. As mensagens são apagadas automaticamente após 24 horas.</p></div><button class="ghost" onclick="renderCommunity()">Atualizar</button></div><div class="chat-box" id="chatBox">${db.chat.slice(-80).map(m=>`<div class="msg ${m.user===currentProfile().nome?'me':''}"><b>${m.user} · ${m.city||''}</b>${m.text}<br><small>${new Date(m.time).toLocaleString('pt-BR')}</small></div>`).join('')}</div><form class="actions" onsubmit="window.sendChat(event)"><input id="chatText" placeholder="Escreva uma mensagem para os colaboradores..." required><button class="secondary">Enviar</button></form></div></div>${currentUser?.uid === ADMIN_UID ?`<form class="card" style="margin-top:16px" onsubmit="window.saveGroups(event)"><h2>Configurar grupos de WhatsApp</h2><label>Link do grupo de conteúdos</label><input id="waConteudos" value="${db.settings.whatsappConteudos}" placeholder="https://chat.whatsapp.com/..."><label>Link do grupo fórum</label><input id="waForum" value="${db.settings.whatsappForum}" placeholder="https://chat.whatsapp.com/..."><button class="secondary">Salvar grupos</button></form>`:''}<div class="modal-back" id="profileModal" onclick="if(event.target.id==='profileModal')window.closeProfile()"><div class="modal-card" id="profileModalBody"></div></div>`;setTimeout(()=>{const box=document.getElementById('chatBox');if(box)box.scrollTop=box.scrollHeight},50)}
window.sendChat=async function(e){e.preventDefault();const text=chatText.value.trim();if(!text)return;const p=currentProfile(),msg={id:Date.now(),user:p.nome,city:p.cidade,text,time:new Date().toISOString()};db.chat.push(msg);saveDB();toast('Mensagem enviada no chat.');renderCommunity()};
window.openProfile=function(id){const p=allPeople().find(x=>x.id===id);if(!p)return;const online=onlineUsers().some(o=>o.id===p.id);document.getElementById('profileModalBody').innerHTML=`<div class="profile-card"><div class="avatar" style="width:72px;height:72px;font-size:24px">${(p.nome||'?').split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div><h2 style="margin:0;color:var(--secondary)">${p.nome}</h2><p class="hint">${p.cidade} · ${p.nivel} · ${p.pontos} pts</p>${online?'<span class="pill ok"><span class="online-dot"></span>Online agora</span>':'<span class="pill">Offline</span>'}</div></div><p style="margin-top:16px">${p.bio||'Perfil sem bio.'}</p><div class="actions"><button class="secondary" onclick="window.closeProfile()">Fechar</button></div>`;document.getElementById('profileModal').style.display='flex'};
window.saveGroups=function(e){e.preventDefault();db.settings.whatsappConteudos=waConteudos.value.trim();db.settings.whatsappForum=waForum.value.trim();saveDB();toast('Grupos de WhatsApp atualizados.');renderCommunity()};function renderProfile(){document.getElementById('perfil').innerHTML=`<form class="card" onsubmit="window.saveProfile(event)"><h2>Perfil</h2><label>Nome</label><input id="profNome" value="${u().profile.nome}"><label>Cidade</label><input id="profCidade" value="${u().profile.cidade}"><label>Telefone</label><input id="profTel" value="${u().profile.telefone}"><label>Bio</label><textarea id="profBio">${u().profile.bio}</textarea><button class="secondary">Salvar perfil</button></form>`}
window.saveProfile=function(e){e.preventDefault();Object.assign(u().profile,{nome:profNome.value,cidade:profCidade.value,telefone:profTel.value,bio:profBio.value});saveDB();toast('Perfil atualizado.');const profileTask=u().tasks.find(t=>t.id===1);if(profileTask&&!profileTask.done&&u().profile.nome&&u().profile.cidade&&u().profile.telefone){profileTask.done=true;u().points+=profileTask.pontos;toast(`+${profileTask.pontos} pontos: Perfil completo!`);saveDB();}renderAll()};
function renderBlog(){document.getElementById('blog').innerHTML=`<div class="blog-hero"><h2>Blog Caminhos do Peruaçu ao vivo</h2><p>Painel de Colaborador: clique 2x e pressione V 2x para acessar. Atualize a página para visualizar as publicações.</p><div class="actions"><button class="secondary" onclick="document.getElementById('blogFrame').src='blog.html?central='+Date.now();window.refreshBlogFeed()">Atualizar blog</button><button class="ghost" onclick="window.open('blog.html','_blank')">Abrir em nova aba</button></div></div><div class="card" style="margin-top:16px;padding:0;overflow:hidden"><iframe id="blogFrame" src="blog.html" title="Blog Caminhos do Peruaçu" style="width:100%;height:720px;border:0;background:#fff"></iframe></div><h2>Posts recentes no blog</h2><div id="liveBlogPosts" class="list"><div class="empty">Carregando posts do blog...</div></div>`;setTimeout(window.refreshBlogFeed,300)}
window.refreshBlogFeed=async function(){const box=document.getElementById('liveBlogPosts');if(!box)return;if(!window.cpBlogApi){box.innerHTML='<div class="empty">Conexão com Firebase ainda carregando...</div>';return}try{const posts=await window.cpBlogApi.loadPosts();box.innerHTML=posts.slice(0,6).map(p=>`<div class="item item-head"><div><b>${p.title}</b><p class="hint">${p.category||'ECOTURISMO'} · ${new Date(p.date||Date.now()).toLocaleDateString('pt-BR')}</p></div><button class="ghost" onclick="window.open('blog.html?p=${p.id}','_blank')">Ver</button></div>`).join('')||'<div class="empty">Nenhum post encontrado.</div>'}catch(error){box.innerHTML='<div class="empty">Erro: '+error.message+'</div>'}}

// RENDER ADMIN (com CERTIFICADOS via LINK)

// Modal para aprovar certificado com LINK em vez de arquivo
window.openApproveCertModal = function(certId){
  const cert = db.certs.find(c => c.id === certId);
  if(!cert) return;
  document.getElementById('certModalBody').innerHTML = `
    <h2>✅ Aprovar Certificado: ${cert.nome}</h2>
    <p>👤 Colaborador: ${cert.usuario}</p>
    <p>📅 Solicitado em: ${new Date(cert.requestDate).toLocaleString('pt-BR')}</p>
    <label>🔗 Link do certificado (URL):</label>
    <input type="url" id="certLink" placeholder="https://..." style="width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid var(--line)">
    <p class="hint" style="margin-top:8px">Cole o link onde o colaborador poderá baixar o certificado (Google Drive, Dropbox, site, etc).</p>
    <br><br>
    <div class="actions">
      <button class="ok" onclick="window.approveCertWithLink(${cert.id})">✅ APROVAR</button>
      <button class="danger" onclick="closeCertModal()">Cancelar</button>
    </div>
  `;
  document.getElementById('certModal').style.display = 'flex';
};

window.closeCertModal = function(){ document.getElementById('certModal').style.display = 'none'; };

// Função para aprovar certificado com LINK
window.approveCertWithLink = function(certId){
  const link = document.getElementById('certLink')?.value.trim();
  if(!link) return toast('Insira o link do certificado');
  if(!link.startsWith('http://') && !link.startsWith('https://')) return toast('Insira um link válido (começando com http:// ou https://)');
  const cert = db.certs.find(c => c.id === certId);
  if(cert){
    cert.status = 'Aprovado';
    cert.certificadoUrl = link;
    saveDB();
    toast(`✅ Certificado "${cert.nome}" aprovado! Link disponível para o colaborador.`);
    renderAll();
    closeCertModal();
  }
};

window.rejectCertPrompt = function(certId){
  const motivo = prompt('Informe o motivo da rejeição (aparecerá para o colaborador):', 'Não atende aos critérios necessários');
  if(motivo === null) return;
  if(motivo.trim() === '') return toast('Informe um motivo para rejeição');
  const cert = db.certs.find(c => c.id === certId);
  if(cert){ cert.status = 'Rejeitado'; cert.motivo = motivo; saveDB(); toast(`❌ Certificado "${cert.nome}" rejeitado.`); renderAll(); }
};

window.rejectCert = function(certId, motivo){
  const cert = db.certs.find(c => c.id === certId);
  if(cert){ cert.status = 'Rejeitado'; cert.motivo = motivo; saveDB(); toast(`❌ Certificado "${cert.nome}" rejeitado.`); renderAll(); }
};

window.createCollaboratorAccount = async function() {
  const email = document.getElementById('newCollabEmail')?.value.trim();
  const nome = document.getElementById('newCollabNome')?.value.trim();
  const senha = document.getElementById('newCollabSenha')?.value;
  const cidade = document.getElementById('newCollabCidade')?.value.trim() || 'Itacarambi';
  if(!email || !nome || !senha) return toast('Preencha todos os campos');
  if(senha.length < 6) return toast('Senha deve ter no mínimo 6 caracteres');
  const emailKey = userKey(email);
  if(db.users[emailKey]) return toast('Este e-mail já está cadastrado');
  try {
    const userCredential = await window.cpBlogApi.createFirebaseUser(email, senha, nome);
    const firebaseUid = userCredential.uid;
    db.users[emailKey] = emptyUser(nome, email, cidade);
    db.creds[emailKey] = { senha: senha, role: 'colaborador', nome: nome, cidade: cidade, uid: firebaseUid, createdAt: new Date().toISOString() };
    saveDB();
    toast(`✅ Colaborador "${nome}" criado com sucesso!`);
    document.getElementById('newCollabEmail').value = '';
    document.getElementById('newCollabNome').value = '';
    document.getElementById('newCollabSenha').value = '';
    if(document.getElementById('newCollabCidade')) document.getElementById('newCollabCidade').value = '';
    renderAdmin();
    renderCommunity();
  } catch (error) {
    if(error.code === 'auth/email-already-in-use') { toast('❌ Este e-mail já está em uso no Firebase.'); }
    else { toast('❌ Erro: ' + error.message); }
  }
};

window.deleteCollaborator = function(email) {
  if(!confirm(`⚠️ Remover colaborador "${email}"?`)) return;
  const emailKey = userKey(email);
  delete db.users[emailKey];
  delete db.creds[emailKey];
  saveDB();
  toast(`Colaborador ${email} removido!`);
  renderAdmin();
  renderCommunity();
  closeProfile();
};

window.resetCollaboratorPassword = function(email) {
  const newPassword = prompt(`Nova senha para ${email}:`, 'novaSenha123');
  if(!newPassword || newPassword.length < 6) return toast('Mínimo 6 caracteres');
  const emailKey = userKey(email);
  if(db.creds[emailKey]) { db.creds[emailKey].senha = newPassword; saveDB(); toast(`✅ Senha atualizada!`); renderAdmin(); }
};

window.checkSpecialTasks = checkSpecialTasks;
window.saveMaterial = saveMaterial;
window.editMaterial = editMaterial;
window.deleteMaterial = deleteMaterial;

const session = load('cpSession', null);
if(session){
  currentUser = session;
  if(currentUser.uid === ADMIN_UID){
    currentUser.role = 'admin';
    currentUser.isAdmin = true;
  } else {
    currentUser.role = 'colaborador';
  }
  syncPartnersFromFirebase().then(() => startApp());
}
</script>
