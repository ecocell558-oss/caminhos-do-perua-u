  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc, onSnapshot, setDoc, getDoc, where, deleteField, writeBatch } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg",
      authDomain: "caminhos-peruacu-blog.firebaseapp.com",
      projectId: "caminhos-peruacu-blog",
      storageBucket: "caminhos-peruacu-blog.firebasestorage.app",
      messagingSenderId: "427400451429",
      appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c"
    };
    
    const app = initializeApp(firebaseConfig);
    const firestore = getFirestore(app);
    const auth = getAuth(app);
    
    window.cpBlogApi = {
      userEmail: '',
      userUid: '',
      auth: auth,
      signIn(email, password) {
        return signInWithEmailAndPassword(auth, email, password);
      },
      async createFirebaseUser(email, password, displayName) {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        return userCredential.user;
      },
      async publishPost(postData) {
        const postsCollection = collection(firestore, 'posts');
        const normalized = {
          title: postData.title || postData.titulo || 'Publicação do colaborador',
          category: postData.category || postData.categoria || 'COLABORADOR',
          excerpt: postData.excerpt || postData.resumo || '',
          full: postData.full || postData.texto || '',
          img: postData.img || '',
          video: postData.video || '',
          link: postData.link || '',
          gallery: Array.isArray(postData.gallery) ? postData.gallery : [],
          galleryLayout: Number(postData.galleryLayout || 3),
          autoCarousel: Boolean(postData.autoCarousel),
          isFeatured: Boolean(postData.isFeatured),
          author: postData.author || 'Central do Colaborador',
          source: 'central-colaborador',
          date: new Date().toISOString()
        };
        const ref = await addDoc(postsCollection, normalized);
        return { id: ref.id, ...normalized };
      },
      async deletePost(postId) {
        const postRef = doc(firestore, 'posts', postId);
        await deleteDoc(postRef);
        return true;
      },
      async loadPosts() {
        const postsCollection = collection(firestore, 'posts');
        const snap = await getDocs(query(postsCollection, orderBy('date', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async savePartner(partnerData) {
        const partnersCollection = collection(firestore, 'partners');
        if(partnerData.id) {
          const partnerRef = doc(firestore, 'partners', partnerData.id);
          await updateDoc(partnerRef, partnerData);
          return { id: partnerData.id, ...partnerData };
        }
        const docRef = await addDoc(partnersCollection, partnerData);
        return { id: docRef.id, ...partnerData };
      },
      async deletePartnerFirebase(partnerId) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await deleteDoc(partnerRef);
        return true;
      },
      async loadPartners() {
        const partnersCollection = collection(firestore, 'partners');
        const snap = await getDocs(query(partnersCollection, orderBy('createdAt', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async updatePartnerStatus(partnerId, status, awarded, comissaoPaga) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await updateDoc(partnerRef, { status, awarded, comissaoPaga });
        return true;
      },
      async saveUser(userData) {
        const userRef = doc(firestore, 'users', userData.uid);
        await setDoc(userRef, userData, { merge: true });
        return userData;
      },
      async loadUser(uid) {
        const userRef = doc(firestore, 'users', uid);
        const snap = await getDoc(userRef);
        if(snap.exists()) return { uid: snap.id, ...snap.data() };
        return null;
      },
      async loadAllUsers() {
        const usersCollection = collection(firestore, 'users');
        const snap = await getDocs(usersCollection);
        const items = [];
        snap.forEach(doc => items.push({ uid: doc.id, ...doc.data() }));
        return items;
      },
      async deleteUserFirebase(uid) {
        const userRef = doc(firestore, 'users', uid);
        await deleteDoc(userRef);
        return true;
      },
      async saveMessage(messageData) {
        const messagesCollection = collection(firestore, 'messages');
        const ref = await addDoc(messagesCollection, messageData);
        return { id: ref.id, ...messageData };
      },
      async loadMessages(callback) {
        const messagesCollection = collection(firestore, 'messages');
        const q = query(messagesCollection, orderBy('time', 'asc'));
        const unsubscribe = onSnapshot(q, (snapshot) => {
          const items = [];
          snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          callback(items);
        });
        return unsubscribe;
      },
      async clearOldMessages() {
        try {
          const messagesCollection = collection(firestore, 'messages');
          const snap = await getDocs(messagesCollection);
          const batch = writeBatch(firestore);
          snap.forEach(doc => {
            batch.delete(doc.ref);
          });
          await batch.commit();
          console.log('Chat limpo às 00:00');
        } catch(e) {
          console.error('Erro ao limpar chat:', e);
        }
      },
      async loadCertSettings() {
        const certSettingsRef = doc(firestore, 'settings', 'certificates');
        const snap = await getDoc(certSettingsRef);
        if(snap.exists()) return snap.data();
        return {
          Iniciante: { url: '', active: false },
          Explorador: { url: '', active: false },
          Colaborador: { url: '', active: false },
          Embaixador: { url: '', active: false },
          Especialista: { url: '', active: false },
          Mestre: { url: '', active: false }
        };
      },
      async saveCertSettings(settingsData) {
        const certSettingsRef = doc(firestore, 'settings', 'certificates');
        await setDoc(certSettingsRef, settingsData);
        return settingsData;
      },
      async saveMaterial(materialData) {
        const materialsCollection = collection(firestore, 'materials');
        const materialId = materialData.id ? materialData.id.toString() : Date.now().toString();
        const materialRef = doc(firestore, 'materials', materialId);
        await setDoc(materialRef, { ...materialData, id: materialId });
        return { id: materialId, ...materialData };
      },
      async loadMaterials() {
        const materialsCollection = collection(firestore, 'materials');
        const snap = await getDocs(materialsCollection);
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async deleteMaterialFirebase(materialId) {
        const materialRef = doc(firestore, 'materials', materialId.toString());
        await deleteDoc(materialRef);
        return true;
      },
      async saveSettings(settingsData) {
        const settingsRef = doc(firestore, 'settings', 'appSettings');
        await setDoc(settingsRef, settingsData, { merge: true });
        return settingsData;
      },
      async loadSettings() {
        const settingsRef = doc(firestore, 'settings', 'appSettings');
        const snap = await getDoc(settingsRef);
        if(snap.exists()) return snap.data();
        return { whatsappConteudos: '', whatsappForum: '' };
      }
    };
    
    window.dispatchEvent(new CustomEvent('cpBlogApiReady'));
  </script>

function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toastbox').appendChild(t);setTimeout(()=>t.remove(),3300)}
function confetti(){const c=document.getElementById('confetti');for(let i=0;i<90;i++){let s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.background=['#F5B81B','#1E3A2F','#fff','#39a66a'][i%4];s.style.animationDelay=Math.random()*.35+'s';c.appendChild(s);setTimeout(()=>s.remove(),2300)}}
function level(points=currentUserData?.points || 0){return LEVELS.slice().reverse().find(x=>points>=x[1])[0]}

function totalAnswered(){return Object.keys(currentUserData?.training?.answered || {}).length}

// ==================== LIMPEZA DO CHAT DIÁRIA ====================
function scheduleDailyChatCleanup() {
  const now = new Date();
  const nextMidnight = new Date(now);
  nextMidnight.setHours(24, 0, 0, 0);
  const delay = nextMidnight.getTime() - now.getTime();
  
  setTimeout(async () => {
    if(window.cpBlogApi) {
      await window.cpBlogApi.clearOldMessages();
      firebaseMessages = [];
      if(currentTab === 'comunidade') {
        isUpdatingChat = true;
        updateChatUI();
        setTimeout(() => { isUpdatingChat = false; }, 100);
      }
    }
    scheduleDailyChatCleanup();
  }, delay);
}

// ==================== FUNÇÕES DO SISTEMA ====================
function startOnlineTracking(){
  if(onlineInterval) clearInterval(onlineInterval);
  onlineInterval = setInterval(async () => {
    if(currentUser && currentUser.role !== 'admin' && document.hasFocus() && currentUserData){
      const task = currentUserData.tasks?.find(t => t.id === 8);
      if(task && !task.done){
        currentUserData.onlineTime = (currentUserData.onlineTime || 0) + 1;
        if(currentUserData.onlineTime >= 10800){
          task.done = true;
          currentUserData.points = (currentUserData.points || 0) + task.pontos;
          await saveUserToFirebase(currentUserData);
          toast(`🎉 Tarefa "${task.titulo}" concluída! +${task.pontos} pontos!`);
          confetti();
          if(currentTab === 'tarefas') renderTasks();
        }
        await saveUserToFirebase(currentUserData);
        if(currentTab === 'tarefas') renderTasks();
      }
    }
  }, 1000);
}
async function checkSpecialTasks(){
  if(!currentUserData) return;
  // Tarefa 6: 3 conteúdos aprovados
  const task6 = currentUserData.tasks?.find(t => t.id === 6);
  if(task6 && !task6.done){
    const approvedContents = (currentUserData.contents || []).filter(c => c.status === 'Aprovado' && c.blogStatus === 'Publicado').length;
    if(approvedContents >= 3){
      task6.done = true;
      currentUserData.points = (currentUserData.points || 0) + task6.pontos;
      await saveUserToFirebase(currentUserData);
      toast(`🎉 Tarefa "${task6.titulo}" concluída! +${task6.pontos} pontos!`);
      confetti();
      if(currentTab === 'tarefas') renderTasks();
    }
  }
  // Tarefa 7: 2 parceiros aprovados
  const task7 = currentUserData.tasks?.find(t => t.id === 7);
  if(task7 && !task7.done){
    const approvedPartners = firebasePartners.filter(p => p.status === 'Aprovado' && p.userUid === currentUser?.uid).length;
    if(approvedPartners >= 2){
      task7.done = true;
      currentUserData.points = (currentUserData.points || 0) + task7.pontos;
      await saveUserToFirebase(currentUserData);
      toast(`🎉 Tarefa "${task7.titulo}" concluída! +${task7.pontos} pontos!`);
      confetti();
      if(currentTab === 'tarefas') renderTasks();
    }
  }
}

  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const isAdmin = (currentUser?.uid === ADMIN_UID);
  document.body.classList.toggle('is-admin',isAdmin);

  {title:'Níveis e Pontuação',themes:['nível Iniciante','nível Explorador','nível Colaborador','nível Embaixador','nível Especialista','nível Mestre','pontos por conteúdo','pontos por parceiro','pontos por questão','bônus de módulo'],correct:['os pontos atualizam nível, ranking e certificados','cada questão correta soma 5 pontos','conteúdo aprovado soma 50 pontos','parceiro aprovado soma 100 pontos','módulo completo soma bônus de 500 pontos','nível superior exige mais pontos','certificados requerem pontuação mínima','tarefas concedem bônus especiais','ranking ordena por pontuação','colaborador ativo acumula mais pontos'],wrong:['questões corretas não contam pontos','conteúdo aprovado tira pontos','parceiro vale menos que uma questão','certificado não depende de pontuação','nível não muda com pontos','pontos não servem para nada','qualquer um pode ser líder regional sem pontos','tarefas não dão pontos','ranking é aleatório','certificados são automáticos']},
  {title:'Dúvidas Frequentes',themes:['certificados','conteúdos pendentes','tarefas','parceiros','blog','materiais','perfil','ranking','aprovação admin','suporte ao colaborador'],correct:['solicitar e aguardar análise administrativa','enviar dados completos para evitar rejeição','acompanhar status dentro da plataforma','revisar explicações e corrigir próximos envios','usar o fórum e o chat para tirar dúvidas','certificados são enviados em PDF','conteúdos pendentes precisam de correção','tarefas especiais exigem critérios','perfil atualizado evita problemas','admin analisa em até 48h'],wrong:['aprovar o próprio pedido','enviar cadastro sem contato','ignorar status pendente','duplicar solicitação sem necessidade','enviar conteúdo igual já rejeitado','não ler feedback do admin','cadastrar parceiro sem documentação','ignorar prazos','deixar perfil incompleto','enviar reclamação sem contexto']},
  {title:'Cavernas do Peruaçu',themes:['criação do parque','área do parque','Patrimônio Mundial','maior estalactite do mundo','Gruta do Janelão','visitação e condutores','arte rupestre','Lapa dos Desenhos','Lapa do Rezar','Trilha do Arco do André'],correct:['O Parque Nacional Cavernas do Peruaçu foi criado em 21 de setembro de 1999','O parque possui área de 56.448 hectares (564 km²)','Em 2025 foi reconhecido como Patrimônio Mundial Natural da UNESCO','A Perna da Bailarina é a maior estalactite do mundo com 28 metros de comprimento','A Gruta do Janelão é o principal atrativo do parque, com galerias de mais de 100m de altura','A visitação é obrigatoriamente acompanhada por condutor credenciado pelo ICMBio','As pinturas rupestres do Peruaçu têm até 12 mil anos','A Lapa dos Desenhos possui mais de 3.600 figuras rupestres','A Lapa do Rezar tem mais de 500 degraus e um salão de 90m de largura','A trilha do Arco do André tem 8km (ida e volta) e nível semipesado'],wrong:['O parque foi criado em 1985','A área do parque é de 10.000 hectares','O parque foi reconhecido pela UNESCO em 2010','A estalactite Perna da Bailarina tem 15 metros','A Gruta do Janelão fica fechada para visitação','Não é necessário agendamento para visitar','As pinturas rupestres têm apenas 500 anos','A Lapa dos Desenhos não tem pinturas preservadas','A Lapa do Rezar tem trilha plana sem esforço','A trilha do Arco do André é nível leve e curta']}

const modules=makeQuestions();
const MODULE_POINTS=[40,60,80,100,120],RETAKE_MS=48*60*60*1000;
function canRetakeModule(id){const t=currentUserData?.training?.completedAt?.[id];return t&&Date.now()-new Date(t).getTime()>=RETAKE_MS}
window.retakeModule=async function(id){if(!canRetakeModule(id))return toast('Este módulo poderá ser refeito 48h após a conclusão.');Object.keys(currentUserData.training.answered).forEach(k=>{if(k.startsWith(id+'-'))delete currentUserData.training.answered[k]});delete currentUserData.training.completedAt[id];currentModule=id;currentPage=0;await saveUserToFirebase(currentUserData);toast('Módulo liberado para refazer e pontuar novamente.');renderAll()};
function renderQ(q,idx){const key=currentModule+'-'+idx,answered=currentUserData?.training?.answered[key],locked=answered?.correct;return `<div class="card q-card"><div class="quiz-question"><span class="pill gold">Questão ${idx+1}</span><br>${q.pergunta}</div><div class="alts">${q.alternativas.map((a,i)=>`<button class="alt ${answered?(i===q.correta?'correct':(i===answered.choice?'wrong':'')):''}" ${locked?'disabled':''} onclick="window.answerQ(${idx},${i})">${'ABCD'[i]}) ${a}</button>`).join('')}</div>${answered?`<div class="explain"><b>${answered.correct?'Resposta perfeita! ✓':'Quase lá. Resposta correta: '+('ABCD'[q.correta])+'.'}</b> ${q.explicacao}</div>`:''}</div>`}
window.answerQ=async function(idx,choice){const q=modules[currentModule-1].questions[idx],key=currentModule+'-'+idx;if(currentUserData?.training?.answered[key]?.correct)return;const ok=choice===q.correta;if(!currentUserData.training.answered) currentUserData.training.answered={};currentUserData.training.answered[key]={choice,correct:ok};if(ok){currentUserData.points = (currentUserData.points || 0) + 5;toast('Resposta correta! +5 pontos');}else toast('Resposta incorreta. Leia a explicação e tente novamente.');const completed=modules[currentModule-1].questions.every((_,i)=>currentUserData.training.answered[currentModule+'-'+i]?.correct===true);if(completed&&!currentUserData.training.completedAt[currentModule]){const pts=MODULE_POINTS[currentModule-1]||40;currentUserData.training.completedAt[currentModule]=new Date().toISOString();currentUserData.points = (currentUserData.points || 0) + pts;await saveUserToFirebase(currentUserData);toast(`🏆 Módulo ${currentModule} completo! +${pts} pontos! Poderá refazer em 48h.`);confetti();}else{await saveUserToFirebase(currentUserData);}renderAll()};
function renderTraining(){const m=modules.find(x=>x.id===currentModule),prog=m.questions.filter((_,i)=>currentUserData?.training?.answered[currentModule+'-'+i]?.correct).length,start=currentPage*10,qs=m.questions.slice(start,start+10),total=totalAnswered(),phrase=prog<10?'Vamos construir a base com calma.':'Ótimo ritmo. Agora transforme conhecimento em segurança para orientar visitantes e parceiros.',completedAt=currentUserData?.training?.completedAt?.[currentModule],next=completedAt?new Date(new Date(completedAt).getTime()+RETAKE_MS):null;document.getElementById('treinamento').innerHTML=`<div class="training-hero"><div><h2 style="color:#fff;margin:0 0 8px">Sala de Formação do Colaborador</h2><p style="margin:0;color:#eef7f0">${phrase} Sua missão atual é concluir todas as 10 questões do módulo, revisar as explicações e avançar no mapa de aprendizagem.</p><div class="actions"><span class="pill gold">${total}/50 questões</span><span class="pill gold">Módulo ${currentModule}: ${prog}/10</span><span class="pill gold">Módulo completo: ${MODULE_POINTS[currentModule-1]} pontos</span>${completedAt?`<span class="pill gold">Refazer após ${next.toLocaleString('pt-BR')}</span>`:''}</div></div></div><div class="lesson-path">${modules.map(mm=>{const done=mm.questions.filter((_,i)=>currentUserData?.training?.answered[mm.id+'-'+i]?.correct).length,ready=canRetakeModule(mm.id);return`<button class="lesson-node ${mm.id===currentModule?'active':''} ${done===10?'done':''}" onclick="currentModule=${mm.id};currentPage=0;renderTraining()"><b>${mm.id}. ${mm.title}</b><br><small>${done}/10 concluídas · ${MODULE_POINTS[mm.id-1]} pts</small>${ready?'<br><small>Disponível para refazer</small>':''}<div class="bar" style="margin-top:8px"><i style="width:${(done/10)*100}%"></i></div></button>`}).join('')}</div><div class="card"><div class="item-head"><div><b>Módulo ${currentModule} · ${m.title}</b><p class="hint">Responda todas as 10 questões corretamente para concluir o módulo e ganhar ${MODULE_POINTS[currentModule-1]} pontos.</p></div><span class="pill gold">${prog}% do módulo</span></div><div class="bar"><i style="width:${(prog/10)*100}%"></i></div>${canRetakeModule(currentModule)?`<div class="actions"><button class="secondary" onclick="window.retakeModule(${currentModule})">Refazer módulo e pontuar novamente</button></div>`:''}</div><div class="quiz-tools"><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage--;renderTraining()">← Questões anteriores</button><strong>Questões ${start+1} a ${start+qs.length}</strong><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage++;renderTraining()">Próximas questões →</button></div>${qs.map((q,idx)=>renderQ(q,start+idx)).join('')}`}

function renderMaterials(){
  document.getElementById('materiais').innerHTML=`<h2>Materiais para download</h2><p class="hint">Materiais gerenciados pelo painel admin. O download pode ser simulado ou abrir um link configurado.</p><div class="list">${(firebaseMaterials||[]).filter(m=>m.ativo!==false).map(m=>`<div class="item item-head"><div><b>${m.titulo}</b><p class="hint">${m.descricao}</p></div><button class="secondary" onclick="window.handleMaterialDownload('${m.id}','${m.titulo}','${m.link || ''}')">${m.link?'Abrir':'Baixar'}</button></div>`).join('')||'<div class="empty">Nenhum material cadastrado.</div>'}</div>`

window.handleMaterialDownload = async function(id, titulo, link) {
  if(titulo === 'Material de Serviço') {
    const task = currentUserData?.tasks?.find(t => t.id === 2);
    if(task && !task.done) {
      task.done = true;
      currentUserData.points = (currentUserData.points || 0) + task.pontos;
      await saveUserToFirebase(currentUserData);
      toast(`🎉 Tarefa "Baixar o kit comercial" concluída! +${task.pontos} pontos!`);
      confetti();
      if(currentTab === 'tarefas') renderTasks();
    }
  }
  if(link) {
    window.open(link, '_blank');
  } else {
    toast(`Download simulado: ${titulo}`);
  }
};

async function saveMaterial(e){e.preventDefault();const id = matId.value ? matId.value.toString() : Date.now().toString();const data={id:id,titulo:matTitulo.value,descricao:matDesc.value,link:matLink.value,ativo:matAtivo.checked};await saveMaterialToFirebase(data);toast('Material salvo com sucesso!');matId.value='';matTitulo.value='';matDesc.value='';matLink.value='';matAtivo.checked=true;renderAdmin();renderMaterials()}
function editMaterial(id){const m = firebaseMaterials.find(x => x.id == id || x.id === id.toString());if(!m){toast('Material não encontrado');return;}matId.value=m.id;matTitulo.value=m.titulo;matDesc.value=m.descricao;matLink.value=m.link||'';matAtivo.checked=m.ativo!==false;toast('Material carregado para edição.')}
async function deleteMaterial(id){if(!confirm('Remover este material permanentemente?'))return;await deleteMaterialFromFirebase(id);toast('Material removido com sucesso.');renderAdmin();renderMaterials()}

window.doneTask=async function(id){let t=currentUserData.tasks.find(x=>x.id===id);if(t.done)return;if(t.id===1){const perfilCompleto = currentUserData.profile.nome && currentUserData.profile.cidade && currentUserData.profile.telefone;if(!perfilCompleto){toast('Complete seu perfil (nome, cidade e telefone) primeiro!');return;}t.done=true;currentUserData.points = (currentUserData.points || 0) + t.pontos;await saveUserToFirebase(currentUserData);toast(`+${t.pontos} pontos: tarefa concluída`);}

else if(t.id===7){toast('Esta tarefa será concluída automaticamente ao ter 2 parceiros aprovados!');}
else if(t.id===8){toast('Esta tarefa será concluída automaticamente ao acumular 3 horas online!');}
else{t.done=true;currentUserData.points = (currentUserData.points || 0) + t.pontos;await saveUserToFirebase(currentUserData);toast(`+${t.pontos} pontos: tarefa concluída`);}await saveUserToFirebase(currentUserData);renderAll()}

window.addPartner = async function(e){ e.preventDefault(); if(!currentUser || !currentUser.uid) { toast('Usuário não autenticado. Faça login novamente.'); return; } const [plano, valor] = document.getElementById('pplano').value.split('|'); const posFile = document.getElementById('pos').files[0]; const pixFile = document.getElementById('ppix').files[0]; const isAdminUser = (currentUser?.role === 'admin'); let osData = window.editingPartnerData?.osData || ''; let pixData = window.editingPartnerData?.pixData || ''; if(posFile) { toast('Processando imagem da Ordem de Serviço...'); osData = await processFile(posFile, 400); } if(pixFile) { toast('Processando imagem do Comprovante Pix...'); pixData = await processFile(pixFile, 400); } let partnerStatus = window.editingPartnerId ? (window.editingPartnerData?.status || 'Pendente') : 'Pendente'; let partnerAwarded = window.editingPartnerId ? (window.editingPartnerData?.awarded || false) : false; let partnerComissaoPaga = window.editingPartnerId ? (window.editingPartnerData?.comissaoPaga || false) : false; if(isAdminUser && !window.editingPartnerId) { partnerStatus = 'Aprovado'; partnerAwarded = true; partnerComissaoPaga = true; } const partnerData = { nome: document.getElementById('pnome').value || '', categoria: document.getElementById('pcat').value || '', cidade: document.getElementById('pcidade').value || '', contato: document.getElementById('pcontato').value || '', plano: plano || 'Comum', valor: Number(valor) || 69.90, obs: document.getElementById('pobs').value || '', osData: osData || '', pixData: pixData || '', status: partnerStatus, awarded: partnerAwarded, comissaoPaga: partnerComissaoPaga, colaboradorEmail: currentUser?.email || '', colaboradorNome: isAdminUser ? 'Administrador' : (currentUserData?.profile?.nome || currentUser?.nome || 'Colaborador'), userUid: currentUser?.uid || '', createdAt: window.editingPartnerId ? (window.editingPartnerData?.createdAt || new Date().toISOString()) : new Date().toISOString() }; if(window.editingPartnerId) partnerData.id = window.editingPartnerId; try { await window.cpBlogApi.savePartner(partnerData); await syncPartnersFromFirebase(); toast(window.editingPartnerId ? '✏️ Parceiro atualizado com sucesso!' : (isAdminUser ? '✅ Parceiro adicionado diretamente como APROVADO!' : '🤝 Parceiro enviado para aprovação do admin!')); window.editingPartnerId = null; window.editingPartnerData = null; renderPartners(); document.getElementById('pos').value = ''; document.getElementById('ppix').value = ''; } catch(error) { toast('Erro ao salvar parceiro: ' + error.message); } };

function updateChatUI() {
  const chatContainer = document.getElementById('chatContainer');
  const chatMessages = document.getElementById('chatMessages');
  if(!chatContainer || !chatMessages) return;
  
  const onlineUsersList = firebaseUsers.filter(u => u.lastSeen && (Date.now() - u.lastSeen) < 45000);
  const sortedMessages = [...firebaseMessages].sort((a,b) => new Date(a.time) - new Date(b.time));
  
  const onlineCountSpan = document.getElementById('onlineCount');
  if(onlineCountSpan) onlineCountSpan.textContent = onlineUsersList.length;
  
  const msgCountSpan = document.getElementById('msgCount');
  if(msgCountSpan) msgCountSpan.textContent = firebaseMessages.length;
  
  chatMessages.innerHTML = sortedMessages.slice(-80).map(m => `
    <div class="msg ${m.user === currentUserData?.profile?.nome ? 'me' : ''}">
      <b>${m.user || 'Anônimo'} · ${m.city || ''}</b>
      ${escapeHtml(m.text)}<br>
      <small>${m.time ? new Date(m.time).toLocaleString('pt-BR') : 'Agora'}</small>
    </div>
  `).join('');
  
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function escapeHtml(text) {
  if(!text) return '';
  return text.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

window.refreshChat = function() {
  const chatMessages = document.getElementById('chatMessages');
  if(chatMessages) {
    const sortedMessages = [...firebaseMessages].sort((a,b) => new Date(a.time) - new Date(b.time));
    chatMessages.innerHTML = sortedMessages.slice(-80).map(m => `
      <div class="msg ${m.user === currentUserData?.profile?.nome ? 'me' : ''}">
        <b>${m.user || 'Anônimo'} · ${m.city || ''}</b>
        ${escapeHtml(m.text)}<br>
        <small>${m.time ? new Date(m.time).toLocaleString('pt-BR') : 'Agora'}</small>
      </div>
    `).join('');
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
  toast('Chat atualizado!');
};

window.sendChatMessage = async function() {
  const input = document.getElementById('chatInput');
  if(!input) {
    console.error('Campo de chat não encontrado');
    return;
  }
  const text = input.value.trim();
  if(!text) {
    toast('Digite uma mensagem antes de enviar');
    input.focus();
    return;
  }
  
  const userName = currentUserData?.profile?.nome || currentUser?.nome || 'Colaborador';
  const userCity = currentUserData?.profile?.cidade || '';
  
  try {
    await sendMessageToFirebase(text, userName, userCity);
    input.value = '';
    input.focus();
    toast('Mensagem enviada!');
    
    setTimeout(() => {
      window.refreshChat();
    }, 100);
  } catch(error) {
    console.error('Erro ao enviar mensagem:', error);
    toast('Erro ao enviar mensagem: ' + error.message);
  }
};

window.sendChat = window.sendChatMessage;

window.adjustPoints = async function(uid) { const user = firebaseUsers.find(u => u.uid === uid); if(!user) { toast('Colaborador não encontrado'); return; } const safeId = uid.replace(/[^a-zA-Z0-9]/g, '_'); const pointsInput = document.getElementById(`pointsValue_${safeId}`); let points = parseInt(pointsInput?.value); if(isNaN(points) || points <= 0) { toast('Digite um valor válido (maior que 0)'); return; } const oldPoints = user.points || 0; const newPoints = oldPoints + points; user.points = newPoints; try { await window.cpBlogApi.saveUser(user); await syncUsersFromFirebase(); if(!pointsAdjustmentHistory[uid]) pointsAdjustmentHistory[uid] = []; pointsAdjustmentHistory[uid].push({ date: new Date().toISOString(), operation: `+${points}`, oldPoints: oldPoints, newPoints: newPoints, admin: currentUser?.email || 'Admin' }); toast(`✅ +${points} pontos adicionados!`); if(uid === currentUser?.uid) { currentUserData = await window.cpBlogApi.loadUser(uid); renderAll(); } renderAdmin(); if(currentTab === 'certificados') renderCerts(); if(currentTab === 'ranking') renderRanking(); const modal = document.getElementById('profileModalGlobal'); if(modal && modal.style.display === 'flex') { modal.style.display = 'none'; window.verPerfilColaborador(uid, user.profile?.nome || ''); } } catch(error) { toast('❌ Erro ao salvar pontos: ' + error.message); } };

  if(currentUser?.uid !== ADMIN_UID){ document.getElementById('admin').innerHTML='<div class="card">Acesso restrito ao administrador.</div>'; return; }
  await syncCertSettingsFromFirebase();
  document.getElementById('admin').innerHTML = `<h2>👥 Gerenciar Colaboradores</h2><div class="card" style="margin-bottom:20px"><h3>➕ Criar Novo Colaborador</h3><div class="split"><div><label>Nome</label><input type="text" id="newCollabNome" placeholder="Nome completo"><label>E-mail</label><input type="email" id="newCollabEmail" placeholder="colaborador@exemplo.com"></div><div><label>Senha</label><input type="password" id="newCollabSenha" placeholder="********"><label>Cidade</label><input type="text" id="newCollabCidade" placeholder="Itacarambi"></div></div><button class="secondary" onclick="window.createCollaboratorAccount()">➕ Criar Conta</button></div><div class="card"><h3>📋 Colaboradores (${firebaseUsers.length})</h3><div class="list" style="max-height:300px;overflow-y:auto">${firebaseUsers.map(c => `<div class="item"><div class="item-head"><div><b>${c.profile?.nome || c.email || 'Sem nome'}</b><p class="hint">${c.email || ''} · ${level(c.points || 0)} · ${c.points || 0} pts</p></div><div class="actions"><button class="ok" onclick="window.verPerfilColaborador('${c.uid}', '${c.profile?.nome || c.email}')">👁️ VER</button><button class="ghost" onclick="window.resetCollaboratorPassword('${c.email}')">🔑 Senha</button><button class="danger" onclick="window.deleteCollaborator('${c.uid}')">🗑️ Excluir</button></div></div></div>`).join('')}</div></div><div class="cert-admin-panel"><h3>🎓 GERENCIAR LINKS DOS CERTIFICADOS</h3><p class="hint">Insira os links (Google Drive, Dropbox, OneDrive, etc) para cada certificado. Quando o colaborador atingir a pontuação, o botão de download será liberado automaticamente.</p><button class="save-all-btn secondary" onclick="window.saveAllCertSettings()">💾 SALVAR TODOS OS LINKS</button><div class="cert-grid">${CERTIFICADOS.map(cert => { const certConfig = firebaseCertSettings[cert.nome] || { url: '', active: false }; const safeName = cert.nome.replace(/[^a-zA-Z0-9]/g, '_'); return `<div class="cert-card-admin"><h4>${cert.nome} <span class="hint">(${cert.pontos} pontos)</span></h4><label>🔗 Link do certificado (URL)</label><input type="url" id="certUrl_${safeName}" value="${certConfig.url || ''}" placeholder="https://drive.google.com/..."><label class="checkbox-label"><input type="checkbox" id="certActive_${safeName}" ${certConfig.active === true ? 'checked' : ''}><span>✅ Ativo (liberado para download)</span></label><button class="save-single-btn" onclick="window.saveSingleCertSetting('${cert.nome}')">💾 Salvar ${cert.nome}</button></div>`; }).join('')}</div></div><div class="grid" style="margin-top:20px"><div class="card stat"><span>📚 Materiais</span><b>${firebaseMaterials.length}</b></div></div><div class="split"><div><h2>📚 MATERIAIS</h2><form class="card" style="margin-top:18px" onsubmit="window.saveMaterial(event)"><input type="hidden" id="matId"><label>Título</label><input id="matTitulo" required><label>Descrição</label><textarea id="matDesc" required></textarea><label>Link (URL)</label><input id="matLink" placeholder="https://..."><label><input id="matAtivo" type="checkbox" checked> Ativo</label><button class="secondary">Salvar Material</button></form><div class="list">${firebaseMaterials.map(m => `<div class="item"><b>${m.titulo}</b><div class="actions"><button class="ghost" onclick="window.editMaterial('${m.id}')">✏️ Editar</button><button class="danger" onclick="window.deleteMaterial('${m.id}')">🗑️ Excluir</button></div></div>`).join('')}</div></div></div>`;
}
window.saveAllCertSettings = async function() { const newSettings = {}; for(const cert of CERTIFICADOS) { const safeName = cert.nome.replace(/[^a-zA-Z0-9]/g, '_'); const urlInput = document.getElementById(`certUrl_${safeName}`); const activeCheckbox = document.getElementById(`certActive_${safeName}`); if(urlInput) { newSettings[cert.nome] = { url: urlInput.value.trim(), active: activeCheckbox ? activeCheckbox.checked : false }; } } await saveCertSettingsToFirebase(newSettings); toast('✅ Todos os certificados foram salvos!'); renderAdmin(); renderCerts(); };
window.saveSingleCertSetting = async function(certNome) { const safeName = certNome.replace(/[^a-zA-Z0-9]/g, '_'); const urlInput = document.getElementById(`certUrl_${safeName}`); const activeCheckbox = document.getElementById(`certActive_${safeName}`); if(!urlInput) return; const newSettings = { ...firebaseCertSettings }; newSettings[certNome] = { url: urlInput.value.trim(), active: activeCheckbox ? activeCheckbox.checked : false }; await saveCertSettingsToFirebase(newSettings); toast(`✅ Certificado "${certNome}" salvo!`); renderAdmin(); renderCerts(); };
window.createCollaboratorAccount = async function() { const email = document.getElementById('newCollabEmail')?.value.trim(); const nome = document.getElementById('newCollabNome')?.value.trim(); const senha = document.getElementById('newCollabSenha')?.value; const cidade = document.getElementById('newCollabCidade')?.value.trim() || 'Itacarambi'; if(!email || !nome || !senha) return toast('Preencha todos os campos'); if(senha.length < 6) return toast('Senha deve ter no mínimo 6 caracteres'); const existingUser = firebaseUsers.find(u => u.email === email); if(existingUser) return toast('Este e-mail já está cadastrado'); try { const userCredential = await window.cpBlogApi.createFirebaseUser(email, senha, nome); const firebaseUid = userCredential.uid; const newUserData = { uid: firebaseUid, email: email, points: 0, profile: { nome: nome, cidade: cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' }, training: { answered: {}, bonus: [], completedAt: {} }, tasks: JSON.parse(JSON.stringify(defaultTasks)), contents: [], onlineTime: 0, createdAt: new Date().toISOString() }; await window.cpBlogApi.saveUser(newUserData); await syncUsersFromFirebase(); toast(`✅ Colaborador "${nome}" criado com sucesso!`); document.getElementById('newCollabEmail').value = ''; document.getElementById('newCollabNome').value = ''; document.getElementById('newCollabSenha').value = ''; document.getElementById('newCollabCidade').value = ''; renderAdmin(); renderCommunity(); } catch (error) { if(error.code === 'auth/email-already-in-use') { toast('❌ Este e-mail já está em uso no Firebase.'); } else { toast('❌ Erro: ' + error.message); } } };
window.deleteCollaborator = async function(uid) { if(!confirm(`⚠️ Remover colaborador permanentemente? Esta ação é irreversível!`)) return; try { await window.cpBlogApi.deleteUserFirebase(uid); await syncUsersFromFirebase(); toast('✅ Colaborador removido com sucesso!'); renderAdmin(); renderCommunity(); } catch(e) { toast('Erro ao excluir: ' + e.message); } };
window.resetCollaboratorPassword = function(email) { toast(`✅ Solicitação de redefinição de senha enviada para ${email}`); };
window.saveMaterial = saveMaterial;
window.editMaterial = editMaterial;
window.deleteMaterial = deleteMaterial;

// ==================== INICIALIZAÇÃO ====================
document.getElementById('loginForm').onsubmit = async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  try {
    const userCredential = await window.cpBlogApi.signIn(email, senha);
    const firebaseUser = userCredential.user;
    let role = 'colaborador';
    let isAdminUser = false;
    if(firebaseUser.uid === ADMIN_UID) { role = 'admin'; isAdminUser = true; }
    currentUser = { email: firebaseUser.email, role: role, nome: role === 'admin' ? 'Administrador' : 'Colaborador', cidade: 'Itacarambi', uid: firebaseUser.uid, isAdmin: isAdminUser };
    if(role === 'colaborador') {
      let userFromFirebase = await window.cpBlogApi.loadUser(firebaseUser.uid);
      if(!userFromFirebase) {
        const newUser = { uid: firebaseUser.uid, email: firebaseUser.email, points: 0, profile: { nome: currentUser.nome, cidade: currentUser.cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' }, training: { answered: {}, bonus: [], completedAt: {} }, tasks: JSON.parse(JSON.stringify(defaultTasks)), contents: [], onlineTime: 0, createdAt: new Date().toISOString() };
        await window.cpBlogApi.saveUser(newUser);
        currentUserData = newUser;
      } else { currentUserData = userFromFirebase; }
    }
    localStorage.setItem('cpSession', JSON.stringify(currentUser));
    await syncUsersFromFirebase();
    await syncPartnersFromFirebase();
    await syncMaterialsFromFirebase();
    await syncSettingsFromFirebase();
    await syncCertSettingsFromFirebase();
    await initMessagesListener();
    startApp();
  } catch(error) { toast('Login inválido: ' + error.message); }
};
const session = localStorage.getItem('cpSession');
if(session){
  currentUser = JSON.parse(session);
  if(currentUser.uid === ADMIN_UID){ currentUser.role = 'admin'; currentUser.isAdmin = true; } else { currentUser.role = 'colaborador'; }
  (async () => {
    await syncUsersFromFirebase();
    await syncPartnersFromFirebase();
    await syncMaterialsFromFirebase();
    await syncSettingsFromFirebase();
    await syncCertSettingsFromFirebase();
    await initMessagesListener();
    if(currentUser.role === 'colaborador') {
      currentUserData = await window.cpBlogApi.loadUser(currentUser.uid);
      if(!currentUserData) {
        currentUserData = { uid: currentUser.uid, email: currentUser.email, points: 0, profile: { nome: currentUser.nome, cidade: currentUser.cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' }, training: { answered: {}, bonus: [], completedAt: {} }, tasks: JSON.parse(JSON.stringify(defaultTasks)), contents: [], onlineTime: 0, createdAt: new Date().toISOString() };
        await window.cpBlogApi.saveUser(currentUserData);
      }
    }
    startApp();
  })();
}
</script>
