  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, setDoc, getDoc, updateDoc, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg",
      authDomain: "caminhos-peruacu-blog.firebaseapp.com",
      projectId: "caminhos-peruacu-blog",
      storageBucket: "caminhos-peruacu-blog.firebasestorage.app",
      messagingSenderId: "427400451429",
      appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c"
    };
    
    const app = initializeApp(firebaseConfig);
    const firestore = getFirestore(app);
    const auth = getAuth(app);
    
    window.cpBlogApi = {
      userEmail: '',
      async signIn(email, password) {
        const result = await signInWithEmailAndPassword(auth, email, password);
        this.userEmail = result.user.email;
        return result;
      },
      async createFirebaseUser(email, password, displayName) {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        return userCredential.user;
      },
      async resetPassword(email) {
        await sendPasswordResetEmail(auth, email);
      },
      async publishPost(postData) {
        const postsCollection = collection(firestore, 'posts');
        const normalized = {
          title: postData.title || postData.titulo || 'Publicação do colaborador',
          category: postData.category || postData.categoria || 'COLABORADOR',
          excerpt: postData.excerpt || postData.resumo || '',
          full: postData.full || postData.texto || '',
          img: postData.img || '',
          video: postData.video || '',
          link: postData.link || '',
          gallery: Array.isArray(postData.gallery) ? postData.gallery : [],
          galleryLayout: Number(postData.galleryLayout || 3),
          autoCarousel: Boolean(postData.autoCarousel),
          isFeatured: Boolean(postData.isFeatured),
          author: postData.author || 'Central do Colaborador',
          source: 'central-colaborador',
          date: new Date().toISOString()
        };
        const ref = await addDoc(postsCollection, normalized);
        return { id: ref.id, ...normalized };
      },
      async deletePost(postId) {
        const postRef = doc(firestore, 'posts', postId);
        await deleteDoc(postRef);
        return true;
      },
      async loadPosts() {
        const postsCollection = collection(firestore, 'posts');
        const snap = await getDocs(query(postsCollection, orderBy('date', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      }
    };
    
    window.dispatchEvent(new CustomEvent('cpBlogApiReady'));
  </script>

const modules=makeQuestions();
const MODULE_POINTS=[40,60,80,100,120],RETAKE_MS=48*60*60*1000;
let currentUser=null,currentTab='dashboard',currentModule=1,currentPage=0,onlineInterval=null;

// Firebase Database Collections
const USERS_COLLECTION = 'central_users';
const SETTINGS_DOC = 'central_settings';
const CHAT_COLLECTION = 'central_chat';
const CERTS_COLLECTION = 'central_certificates';
const MATERIALS_COLLECTION = 'central_materials';
const PRESENCE_COLLECTION = 'central_presence';

// Helper functions for Firebase operations
async function loadUserData(email) {
  if(!email) return null;
  try {
    const userRef = doc(firestore, USERS_COLLECTION, email.toLowerCase());
    const docSnap = await getDoc(userRef);
    if(docSnap.exists()){
      return docSnap.data();
    }
  } catch(e) { console.error("Error loading user:", e); }
  return null;
}

async function saveUserData(email, data) {
  try {
    const userRef = doc(firestore, USERS_COLLECTION, email.toLowerCase());
    await setDoc(userRef, data, { merge: true });
    return true;
  } catch(e) { console.error("Error saving user:", e); toast("Erro ao salvar dados"); return false; }
}

async function loadAllUsers() {
  try {
    const usersCollection = collection(firestore, USERS_COLLECTION);
    const snapshot = await getDocs(usersCollection);
    const users = {};
    snapshot.forEach(doc => {
      users[doc.id] = doc.data();
    });
    return users;
  } catch(e) { console.error("Error loading users:", e); return {}; }
}

async function loadSettings() {
  try {
    const settingsRef = doc(firestore, SETTINGS_DOC, 'main');
    const docSnap = await getDoc(settingsRef);
    if(docSnap.exists()){
      return docSnap.data();
    }
  } catch(e) { console.error("Error loading settings:", e); }
  return { whatsappConteudos: '', whatsappForum: '', materials: materialsList };
}

async function saveSettings(settings) {
  try {
    const settingsRef = doc(firestore, SETTINGS_DOC, 'main');
    await setDoc(settingsRef, settings, { merge: true });
    return true;
  } catch(e) { console.error("Error saving settings:", e); return false; }
}

async function loadChat() {
  try {
    const chatCollection = collection(firestore, CHAT_COLLECTION);
    const q = query(chatCollection, orderBy('time', 'desc'));
    const snapshot = await getDocs(q);
    const messages = [];
    snapshot.forEach(doc => {
      messages.push({ id: doc.id, ...doc.data() });
    });
    return messages.reverse();
  } catch(e) { console.error("Error loading chat:", e); return []; }
}

async function saveChatMessage(msg) {
  try {
    const chatCollection = collection(firestore, CHAT_COLLECTION);
    await addDoc(chatCollection, msg);
  } catch(e) { console.error("Error saving chat:", e); }
}

async function clearOldChat() {
  try {
    const chatCollection = collection(firestore, CHAT_COLLECTION);
    const oneDayAgo = Date.now() - (24 * 60 * 60 * 1000);
    const q = query(chatCollection, where('time', '<', oneDayAgo));
    const snapshot = await getDocs(q);
    for(const doc of snapshot.docs) {
      await deleteDoc(doc.ref);
    }
  } catch(e) { console.error("Error clearing chat:", e); }
}

async function loadCertificates() {
  try {
    const certsCollection = collection(firestore, CERTS_COLLECTION);
    const snapshot = await getDocs(certsCollection);
    const certs = [];
    snapshot.forEach(doc => {
      certs.push({ id: doc.id, ...doc.data() });
    });
    return certs;
  } catch(e) { console.error("Error loading certificates:", e); return []; }
}

async function saveCertificate(cert) {
  try {
    const certsCollection = collection(firestore, CERTS_COLLECTION);
    if(cert.id){
      const certRef = doc(firestore, CERTS_COLLECTION, String(cert.id));
      await setDoc(certRef, cert);
    } else {
      const newCert = { ...cert, id: Date.now().toString() };
      await addDoc(certsCollection, newCert);
      return newCert;
    }
    return cert;
  } catch(e) { console.error("Error saving certificate:", e); return null; }
}

async function deleteCertificate(certId) {
  try {
    const certRef = doc(firestore, CERTS_COLLECTION, String(certId));
    await deleteDoc(certRef);
  } catch(e) { console.error("Error deleting certificate:", e); }
}

async function loadMaterials() {
  try {
    const settings = await loadSettings();
    return settings.materials || materialsList;
  } catch(e) { console.error("Error loading materials:", e); return materialsList; }
}

async function saveMaterial(material) {
  try {
    const settings = await loadSettings();
    const materials = settings.materials || materialsList;
    const existingIndex = materials.findIndex(m => m.id === material.id);
    if(existingIndex !== -1){
      materials[existingIndex] = material;
    } else {
      materials.push(material);
    }
    await saveSettings({ ...settings, materials });
  } catch(e) { console.error("Error saving material:", e); }
}

async function deleteMaterial(materialId) {
  try {
    const settings = await loadSettings();
    const materials = (settings.materials || materialsList).filter(m => m.id !== materialId);
    await saveSettings({ ...settings, materials });
  } catch(e) { console.error("Error deleting material:", e); }
}

async function updatePresence(userId, userData) {
  try {
    const presenceRef = doc(firestore, PRESENCE_COLLECTION, userId);
    await setDoc(presenceRef, {
      ...userData,
      lastSeen: Date.now(),
      id: userId
    }, { merge: true });
  } catch(e) { console.error("Error updating presence:", e); }
}

async function loadOnlineUsers() {
  try {
    const presenceCollection = collection(firestore, PRESENCE_COLLECTION);
    const snapshot = await getDocs(presenceCollection);
    const now = Date.now();
    const online = [];
    snapshot.forEach(doc => {
      const data = doc.data();
      if(now - (data.lastSeen || 0) < 45000){
        online.push(data);
      }
    });
    return online;
  } catch(e) { console.error("Error loading online users:", e); return []; }
}

async function loadAllPeople() {
  const users = await loadAllUsers();
  const admin = { id: 'admin', nome: 'Administrador', cidade: 'Itacarambi', nivel: 'Admin', pontos: '-', bio: 'Aprova conteúdos, certificados e gerencia a plataforma.' };
  const people = [admin];
  for(const [email, user] of Object.entries(users)){
    people.push({
      id: email,
      nome: user.profile?.nome || email,
      cidade: user.profile?.cidade || '',
      nivel: level(user.points || 0),
      pontos: user.points || 0,
      bio: user.profile?.bio || '',
      me: currentUser?.email === email
    });
  }
  return people;
}

function emptyUser(nome='',email='',cidade=''){
  return {
    points: 0,
    profile: { nome, email, cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' },
    training: { answered: {}, bonus: [], completedAt: {} },
    tasks: JSON.parse(JSON.stringify(defaultTasks)),
    partners: [],
    contents: [],
    onlineTime: 0
  };
}

function level(points){
  for(let i = LEVELS.length-1; i >= 0; i--){
    if(points >= LEVELS[i][1]) return LEVELS[i][0];
  }
  return LEVELS[0][0];
}

function nextLevel(points){
  return LEVELS.find(x => points < x[1]) || LEVELS[LEVELS.length-1];
}

async function addPoints(n, why){
  if(currentUser?.role !== 'colaborador') return;
  const userData = await loadUserData(currentUser.email);
  if(userData){
    userData.points = (userData.points || 0) + n;
    await saveUserData(currentUser.email, userData);
  }
  toast('+'+n+' pontos: '+why);
  await renderAll();
}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.getElementById('toastbox').appendChild(t);
  setTimeout(()=>t.remove(),3300);
}

function confetti(){
  const c=document.getElementById('confetti');
  for(let i=0;i<90;i++){
    let s=document.createElement('span');
    s.style.left=Math.random()*100+'%';
    s.style.background=['#F5B81B','#1E3A2F','#fff','#39a66a'][i%4];
    s.style.animationDelay=Math.random()*.35+'s';
    c.appendChild(s);
    setTimeout(()=>s.remove(),2300);
  }
}

async function renderDashboard(userData){
  if(currentUser?.role !== 'colaborador'){
    document.getElementById('dashboard').innerHTML=`<div class="card">Bem-vindo, Administrador! Acesse as abas para gerenciar a plataforma.</div>`;
    return;
  }
  const doneTasks = userData?.tasks?.filter(t=>t.done).length || 0;
  const closed = userData?.partners?.filter(p=>p.status==='Aprovado').length || 0;
  const ans = Object.keys(userData?.training?.answered || {}).length;
  const nl = nextLevel(userData?.points || 0);
  const pct = nl[1]===0?100:Math.min(100,Math.round((userData?.points||0)/nl[1]*100));
  document.getElementById('dashboard').innerHTML=`<div class="grid"><div class="card stat"><span>Pontos</span><b>${userData?.points||0}</b></div><div class="card stat"><span>Nível</span><b>${level(userData?.points||0)}</b></div><div class="card stat"><span>Treino</span><b>${ans}/50</b></div><div class="card stat"><span>Tarefas / Parceiros</span><b>${doneTasks}/${defaultTasks.length} · ${closed}</b></div></div><div class="card" style="margin-top:16px"><div class="item-head"><div><h2>Progresso até ${nl[0]}</h2><p class="hint">Pontuação dinâmica atualizada em tempo real.</p></div><span class="pill gold">${pct}%</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>`;
}

function canRetakeModule(userData, id){
  const t = userData?.training?.completedAt?.[id];
  return t && Date.now() - new Date(t).getTime() >= RETAKE_MS;
}

async function renderTraining(userData){
  if(currentUser?.role !== 'colaborador'){
    document.getElementById('treinamento').innerHTML='<div class="card">Acesso restrito a colaboradores.</div>';
    return;
  }
  if(!userData) userData = await loadUserData(currentUser.email);
  const m = modules.find(x=>x.id===currentModule);
  const prog = m.questions.filter((_,i)=>userData?.training?.answered[currentModule+'-'+i]?.correct).length;
  const start = currentPage*10;
  const qs = m.questions.slice(start, start+10);
  const total = Object.keys(userData?.training?.answered || {}).length;
  const phrase = prog<10?'Vamos construir a base com calma.':'Ótimo ritmo. Agora transforme conhecimento em segurança para orientar visitantes e parceiros.';
  const completedAt = userData?.training?.completedAt?.[currentModule];
  const next = completedAt ? new Date(new Date(completedAt).getTime()+RETAKE_MS) : null;
  
  document.getElementById('treinamento').innerHTML=`<div class="training-hero"><div><h2 style="color:#fff;margin:0 0 8px">Sala de Formação do Colaborador</h2><p style="margin:0;color:#eef7f0">${phrase} Sua missão atual é concluir todas as 10 questões do módulo, revisar as explicações e avançar no mapa de aprendizagem.</p><div class="actions"><span class="pill gold">${total}/50 questões</span><span class="pill gold">Módulo ${currentModule}: ${prog}/10</span><span class="pill gold">Módulo completo: ${MODULE_POINTS[currentModule-1]} pontos</span>${completedAt?`<span class="pill gold">Refazer após ${next.toLocaleString('pt-BR')}</span>`:''}</div></div></div><div class="lesson-path">${modules.map(mm=>{const done = userData?.training?.answered ? Object.keys(userData.training.answered).filter(k=>k.startsWith(mm.id+'-') && userData.training.answered[k]?.correct).length : 0;const ready = canRetakeModule(userData, mm.id);return`<button class="lesson-node ${mm.id===currentModule?'active':''} ${done===10?'done':''}" onclick="currentModule=${mm.id};currentPage=0;renderTraining()"><b>${mm.id}. ${mm.title}</b><br><small>${done}/10 concluídas · ${MODULE_POINTS[mm.id-1]} pts</small>${ready?'<br><small>Disponível para refazer</small>':''}<div class="bar" style="margin-top:8px"><i style="width:${(done/10)*100}%"></i></div></button>`}).join('')}</div><div class="card"><div class="item-head"><div><b>Módulo ${currentModule} · ${m.title}</b><p class="hint">Responda todas as 10 questões corretamente para concluir o módulo e ganhar ${MODULE_POINTS[currentModule-1]} pontos.</p></div><span class="pill gold">${prog}% do módulo</span></div><div class="bar"><i style="width:${(prog/10)*100}%"></i></div>${canRetakeModule(userData, currentModule)?`<div class="actions"><button class="secondary" onclick="window.retakeModule(${currentModule})">Refazer módulo e pontuar novamente</button></div>`:''}</div><div class="quiz-tools"><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage--;renderTraining()">← Questões anteriores</button><strong>Questões ${start+1} a ${start+qs.length}</strong><button class="ghost" ${currentPage===0?'disabled':''} onclick="currentPage++;renderTraining()">Próximas questões →</button></div>${qs.map((q,idx)=>renderQ(q,start+idx, userData)).join('')}`;
}

function renderQ(q, idx, userData){
  const key = currentModule+'-'+idx;
  const answered = userData?.training?.answered?.[key];
  const locked = answered?.correct;
  return `<div class="card q-card"><div class="quiz-question"><span class="pill gold">Questão ${idx+1}</span><br>${q.pergunta}</div><div class="alts">${q.alternativas.map((a,i)=>`<button class="alt ${answered?(i===q.correta?'correct':(i===answered.choice?'wrong':'')):''}" ${locked?'disabled':''} onclick="window.answerQ(${idx},${i})">${'ABCD'[i]}) ${a}</button>`).join('')}</div>${answered?`<div class="explain"><b>${answered.correct?'Resposta perfeita! ✓':'Quase lá. Resposta correta: '+('ABCD'[q.correta])+'.'}</b> ${q.explicacao}</div>`:''}</div>`;
}

window.answerQ = async function(idx, choice){
  if(currentUser?.role !== 'colaborador') return;
  const userData = await loadUserData(currentUser.email);
  const q = modules[currentModule-1].questions[idx];
  const key = currentModule+'-'+idx;
  if(userData?.training?.answered?.[key]?.correct) return;
  const ok = choice === q.correta;
  if(!userData.training.answered) userData.training.answered = {};
  userData.training.answered[key] = {choice, correct: ok};
  if(ok){
    userData.points = (userData.points || 0) + 5;
    toast('Resposta correta! +5 pontos');
  } else {
    toast('Resposta incorreta. Leia a explicação e tente novamente.');
  }
  const completed = modules[currentModule-1].questions.every((_,i)=>userData.training.answered[currentModule+'-'+i]?.correct===true);
  if(completed && !userData.training.completedAt?.[currentModule]){
    const pts = MODULE_POINTS[currentModule-1] || 40;
    if(!userData.training.completedAt) userData.training.completedAt = {};
    userData.training.completedAt[currentModule] = new Date().toISOString();
    userData.points = (userData.points || 0) + pts;
    await saveUserData(currentUser.email, userData);
    toast(`🏆 Módulo ${currentModule} completo! +${pts} pontos! Poderá refazer em 48h.`);
    confetti();
  } else {
    await saveUserData(currentUser.email, userData);
  }
  await renderAll();
};

window.retakeModule = async function(id){
  if(currentUser?.role !== 'colaborador') return;
  const userData = await loadUserData(currentUser.email);
  if(!canRetakeModule(userData, id)) return toast('Este módulo poderá ser refeito 48h após a conclusão.');
  Object.keys(userData.training.answered).forEach(k=>{if(k.startsWith(id+'-')) delete userData.training.answered[k];});
  if(userData.training.completedAt) delete userData.training.completedAt[id];
  currentModule = id;
  currentPage = 0;
  await saveUserData(currentUser.email, userData);
  toast('Módulo liberado para refazer e pontuar novamente.');
  await renderAll();
};

window.deleteMyContent = async function(id){
  if(!confirm('Tem certeza que deseja excluir esta solicitação de conteúdo?')) return;
  const userData = await loadUserData(currentUser.email);
  const index = (userData.contents || []).findIndex(c => c.id === id);
  if(index !== -1){
    const content = userData.contents[index];
    if(content.blogId && window.cpBlogApi){
      window.cpBlogApi.deletePost(content.blogId).catch(e => console.log('Erro ao remover do blog:', e));
    }
    userData.contents.splice(index, 1);
    await saveUserData(currentUser.email, userData);
    toast('Solicitação de conteúdo removida com sucesso!');
    await renderContents(userData);
    if(currentUser?.uid === ADMIN_UID) await renderAdmin();
  }
};

window.deleteMyPartner = async function(id){
  if(!confirm('Tem certeza que deseja excluir esta solicitação de parceiro?')) return;
  const userData = await loadUserData(currentUser.email);
  const index = (userData.partners || []).findIndex(p => p.id === id);
  if(index !== -1){
    userData.partners.splice(index, 1);
    await saveUserData(currentUser.email, userData);
    toast('Solicitação de parceiro removida com sucesso!');
    await renderPartners(userData);
    if(currentUser?.uid === ADMIN_UID) await renderAdmin();
  }
};

window.updatePostPreview = function(){
  const box = document.getElementById('postLivePreview');
  if(!box) return;
  const title = document.getElementById('ctitulo')?.value || 'Título da publicação';
  const cat = document.getElementById('ccat')?.value || 'COLABORADOR';
  const resumo = document.getElementById('cresumo')?.value || 'Resumo da publicação aparecerá aqui.';
  const text = document.getElementById('ctexto')?.value || '<p>O conteúdo completo do post será exibido nesta área.</p>';
  const img = document.getElementById('cimg')?.value || '';
  
  const galleryUrls = [];
  for(let i = 1; i <= 6; i++){
    const base64 = document.getElementById(`galleryBase64${i}`)?.value.trim();
    if(base64) galleryUrls.push(base64);
  }
  
  const layout = document.getElementById('clayout')?.value || 3;
  const galleryHtml = galleryUrls.length ? 
    `<div class="gallery-preview cols-${layout}" style="margin-top:12px">
      ${galleryUrls.map(url => `<img src="${url}" style="width:100%;height:120px;object-fit:cover;border-radius:8px" onerror="this.style.display='none'">`).join('')}
    </div>` : '';
  
  box.innerHTML = `
    <span class="pill gold">${cat}</span>
    <h2 style="margin:12px 0;color:var(--secondary)">${title}</h2>
    <p class="hint">${resumo}</p>
    ${img ? `<img src="${img}" style="width:100%;max-height:260px;object-fit:cover;border-radius:14px;margin:10px 0" onerror="this.style.display='none'">` : ''}
    ${galleryHtml}
    <div style="border-top:1px solid var(--line);padding-top:12px;margin-top:12px">${text}</div>
  `;
}

window.updateGalleryPreview = function(){
  const urls = [];
  for(let i = 1; i <= 6; i++){
    const url = document.getElementById(`galleryBase64${i}`)?.value.trim();
    if(url) urls.push(url);
  }
  const layout = document.getElementById('clayout')?.value || 3;
  const previewDiv = document.getElementById('galleryPreview');
  if(previewDiv){
    if(urls.length === 0){
      previewDiv.innerHTML = '<p class="hint">Nenhuma imagem adicionada. Adicione imagens acima para ver a prévia.</p>';
      return;
    }
    previewDiv.innerHTML = `<div class="gallery-preview cols-${layout}">${urls.map(url => `<img src="${url}" onerror="this.style.display='none'">`).join('')}</div>`;
  }
}

window.addContent = async function(e){
  e.preventDefault();
  if(currentUser?.role !== 'colaborador') return;
  const galleryUrls = [];
  for(let i = 1; i <= 6; i++){
    const base64 = document.getElementById(`galleryBase64${i}`)?.value.trim();
    if(base64) galleryUrls.push(base64);
  }
  
  const imgBase64 = document.getElementById('cimg')?.value || '';
  
  const newContent = {
    id: Date.now(),
    titulo: document.getElementById('ctitulo').value,
    categoria: document.getElementById('ccat').value || 'COLABORADOR',
    resumo: document.getElementById('cresumo').value,
    texto: document.getElementById('ctexto').value,
    img: imgBase64,
    video: document.getElementById('cvideo').value,
    link: document.getElementById('clink').value,
    gallery: galleryUrls,
    galleryLayout: Number(document.getElementById('clayout').value || 3),
    autoCarousel: document.getElementById('ccarousel').checked,
    isFeatured: document.getElementById('cfeatured').checked,
    status: 'Pendente',
    blogStatus: 'Aguardando aprovação',
    blogId: '',
    awarded: false,
    createdAt: new Date().toISOString()
  };
  
  const userData = await loadUserData(currentUser.email);
  if(!userData.contents) userData.contents = [];
  userData.contents.push(newContent);
  await saveUserData(currentUser.email, userData);
  toast('📝 Postagem enviada para aprovação do administrador!');
  toast('🔔 O administrador verá esta solicitação na aba Admin > Conteúdos Pendentes');
  
  document.getElementById('ctitulo').value = '';
  document.getElementById('ccat').value = 'COLABORADOR';
  document.getElementById('cresumo').value = '';
  document.getElementById('ctexto').value = '';
  document.getElementById('cimg').value = '';
  document.getElementById('cimgPreview').style.display = 'none';
  document.getElementById('cimgFile').value = '';
  document.getElementById('cvideo').value = '';
  document.getElementById('clink').value = '';
  for(let i = 1; i <= 6; i++){
    document.getElementById(`galleryBase64${i}`).value = '';
    document.getElementById(`galleryPreview${i}`).style.display = 'none';
    document.getElementById(`galleryFile${i}`).value = '';
  }
  document.getElementById('ccarousel').checked = false;
  document.getElementById('cfeatured').checked = false;
  
  await renderAll();
};

async function renderTasks(userData){
  if(currentUser?.role !== 'colaborador'){
    document.getElementById('tarefas').innerHTML='<div class="card">Acesso restrito a colaboradores.</div>';
    return;
  }
  if(!userData) userData = await loadUserData(currentUser.email);
  document.getElementById('tarefas').innerHTML=`<h2>Tarefas</h2><div class="list">${(userData.tasks || []).map(t=>{
    let progresso = '';
    if(t.id === 6 && !t.done){
      const aprovados = (userData.contents || []).filter(c => c.status === 'Aprovado' && c.blogStatus === 'Publicado').length;
      progresso = `<p class="hint">📊 Progresso: ${aprovados}/3 conteúdos aprovados</p>`;
    }
    if(t.id === 7 && !t.done){
      const aprovados = (userData.partners || []).filter(p => p.status === 'Aprovado').length;
      progresso = `<p class="hint">📊 Progresso: ${aprovados}/2 parceiros aprovados</p>`;
    }
    if(t.id === 8 && !t.done){
      const horas = Math.floor((userData.onlineTime || 0) / 3600);
      const minutos = Math.floor(((userData.onlineTime || 0) % 3600) / 60);
      progresso = `<p class="hint">⏱️ Progresso: ${horas}h ${minutos}m / 3h online</p>`;
    }
    return `<div class="item item-head"><div><b>${t.titulo}</b><p class="hint">${t.descricao}</p><span class="pill gold">${t.pontos} pontos</span>${progresso}</div><button class="${t.done?'ghost':'secondary'}" ${t.done?'disabled':''} onclick="window.doneTask(${t.id})">${t.done?'Concluída':'Concluir'}</button></div>`;
  }).join('')}</div>`;
}

window.doneTask = async function(id){
  if(currentUser?.role !== 'colaborador') return;
  const userData = await loadUserData(currentUser.email);
  let t = (userData.tasks || []).find(x=>x.id===id);
  if(t.done) return;
  if(t.id===1){
    const perfilCompleto = userData.profile?.nome && userData.profile?.cidade && userData.profile?.telefone;
    if(!perfilCompleto){toast('Complete seu perfil (nome, cidade e telefone) primeiro!');return;}
    t.done=true;
    userData.points = (userData.points || 0) + t.pontos;
    await saveUserData(currentUser.email, userData);
    toast(`+${t.pontos} pontos: tarefa concluída`);
  }
  else if(t.id===2){toast('Conclua esta tarefa acessando a aba Materiais e baixando o conteúdo!');}
  else if(t.id===3){toast('Conclua esta tarefa cadastrando 3 parceiros na aba Parceiros!');}
  else if(t.id===4){toast('Conclua esta tarefa enviando um conteúdo que seja aprovado pelo admin!');}
  else if(t.id===5){toast('Conclua esta tarefa mantendo parceiros atualizados!');}
  else if(t.id===6){toast('Esta tarefa será concluída automaticamente ao ter 3 conteúdos aprovados!');}
  else if(t.id===7){toast('Esta tarefa será concluída automaticamente ao ter 2 parceiros aprovados!');}
  else if(t.id===8){toast('Esta tarefa será concluída automaticamente ao acumular 3 horas online!');}
  else{
    t.done=true;
    userData.points = (userData.points || 0) + t.pontos;
    await saveUserData(currentUser.email, userData);
    toast(`+${t.pontos} pontos: tarefa concluída`);
  }
  await renderAll();
};

function readFileData(input){
  return new Promise(resolve=>{
    const f=input?.files?.[0];
    if(!f) return resolve('');
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>resolve('');
    r.readAsDataURL(f);
  });
}

window.approveContent = async function(contentId, approved, colaboradorEmail){
  let targetUser = null;
  let targetContent = null;
  let targetUserEmail = null;
  
  const users = await loadAllUsers();
  for(const [email, user] of Object.entries(users)){
    if(user.contents){
      const found = user.contents.find(c => c.id === contentId);
      if(found){
        targetUser = user;
        targetContent = found;
        targetUserEmail = email;
        break;
      }
    }
  }
  
  if(!targetContent){
    toast('Conteúdo não encontrado');
    return;
  }
  
  const oldStatus = targetContent.status;
  targetContent.status = approved ? 'Aprovado' : 'Rejeitado';
  
  if(approved && oldStatus !== 'Aprovado'){
    try{
      if(!window.cpBlogApi) throw new Error('Firebase não disponível');
      const postForBlog = {
        titulo: targetContent.titulo,
        categoria: targetContent.categoria,
        resumo: targetContent.resumo,
        texto: targetContent.texto,
        img: targetContent.img,
        video: targetContent.video,
        link: targetContent.link,
        gallery: targetContent.gallery,
        galleryLayout: targetContent.galleryLayout,
        autoCarousel: targetContent.autoCarousel,
        isFeatured: targetContent.isFeatured
      };
      const published = await window.cpBlogApi.publishPost(postForBlog);
      targetContent.blogStatus = 'Publicado';
      targetContent.blogId = published.id;
      if(!targetContent.awarded){
        targetContent.awarded = true;
        if(targetUser) targetUser.points = (targetUser.points || 0) + 50;
        await saveUserData(targetUserEmail, targetUser);
        toast(`✅ Conteúdo aprovado e publicado! +50 pontos para ${targetUser.profile?.nome || targetUserEmail}.`);
        confetti();
      } else {
        await saveUserData(targetUserEmail, targetUser);
        toast(`✅ Conteúdo aprovado e publicado!`);
      }
    } catch(error){
      targetContent.blogStatus = 'Erro';
      toast('⚠️ Conteúdo aprovado, mas erro na publicação: ' + error.message);
    }
  } else if(!approved) {
    targetContent.blogStatus = 'Rejeitado';
    await saveUserData(targetUserEmail, targetUser);
    toast(`❌ Conteúdo rejeitado.`);
  }
  await renderAll();
};

window.deleteAdminContent = async function(contentId, blogId, colaboradorEmail){
  if(!confirm('Excluir este conteúdo permanentemente? Isso também removerá do blog se já publicado.')) return;
  
  if(blogId && window.cpBlogApi){
    try{

      toast('Post removido do blog');
    } catch(e){}
  }
  
  let found = false;
  const users = await loadAllUsers();
  for(const [email, user] of Object.entries(users)){
    if(user.contents){
      const index = user.contents.findIndex(c => c.id === contentId);
      if(index !== -1){
        user.contents.splice(index, 1);
        await saveUserData(email, user);
        found = true;

  }
  
  if(found) {
    toast('Conteúdo excluído!');

};

window.saveMaterial = async function(e){
  e.preventDefault();
  const id = document.getElementById('matId').value ? Number(document.getElementById('matId').value) : Date.now();
  const material = {
    id,
    titulo: document.getElementById('matTitulo').value,
    descricao: document.getElementById('matDesc').value,
    link: document.getElementById('matLink').value,
    ativo: document.getElementById('matAtivo').checked
  };
  await saveMaterial(material);
  toast('Material salvo!');
  document.getElementById('matId').value = '';
  document.getElementById('matTitulo').value = '';
  document.getElementById('matDesc').value = '';
  document.getElementById('matLink').value = '';
  document.getElementById('matAtivo').checked = true;
  await renderAdmin();
  await renderMaterials();
};

window.editMaterial = function(id){
  loadMaterials().then(materials => {
    const m = materials.find(x=>x.id===id);
    if(!m) return;
    document.getElementById('matId').value = m.id;
    document.getElementById('matTitulo').value = m.titulo;
    document.getElementById('matDesc').value = m.descricao;
    document.getElementById('matLink').value = m.link || '';
    document.getElementById('matAtivo').checked = m.ativo !== false;
    toast('Material carregado para edição.');
  });
};

window.deleteMaterial = async function(id){
  if(!confirm('Remover este material?')) return;
  await deleteMaterial(id);
  toast('Material removido.');
  await renderAdmin();
  await renderMaterials();
};

window.openAttachmentViewer = function(dataUrl){
  if(!dataUrl) return toast('Anexo não encontrado.');
  const w = window.open('','_blank');
  if(dataUrl.startsWith('data:application/pdf')) w.document.write(`<iframe src="${dataUrl}" style="width:100%;height:100vh;border:0"></iframe>`);
  else w.document.write(`<img src="${dataUrl}" style="max-width:100%;height:auto">`);
  w.document.close();
};

// File handling helpers
window.handleImageUpload = function(event, elementId, previewId){
  const file = event.target.files[0];
  if(file && file.type.startsWith('image/')){
    fileToBase64(file).then(base64 => {
      document.getElementById(elementId).value = base64;
      const preview = document.getElementById(previewId);
      if(preview){
        preview.src = base64;
        preview.style.display = 'block';
      }
      if(window.updatePostPreview) window.updatePostPreview();
    }).catch(err => toast('Erro ao carregar imagem: '+err));
  } else if(file){
    toast('Por favor, selecione apenas arquivos de imagem.');
    event.target.value = '';
  }
};

window.handleGalleryUpload = function(index, fileInput){
  const file = fileInput.files[0];
  if(file && file.type.startsWith('image/')){
    fileToBase64(file).then(base64 => {
      const inputField = document.getElementById(`galleryBase64${index}`);
      if(inputField) inputField.value = base64;
      const preview = document.getElementById(`galleryPreview${index}`);
      if(preview){
        preview.src = base64;
        preview.style.display = 'block';
      }
      if(window.updatePostPreview) window.updatePostPreview();
      if(window.updateGalleryPreview) window.updateGalleryPreview();
    }).catch(err => toast('Erro ao carregar imagem da galeria: '+err));
  } else if(file){
    toast('Por favor, selecione apenas arquivos de imagem para a galeria.');
    fileInput.value = '';
  }
};

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Online tracking
function startOnlineTracking(){
  if(onlineInterval) clearInterval(onlineInterval);
  onlineInterval = setInterval(async () => {
    if(currentUser && currentUser.role !== 'admin' && document.hasFocus()){
      const userData = await loadUserData(currentUser.email);
      if(userData){
        const task = (userData.tasks || []).find(t => t.id === 8);
        if(task && !task.done){
          userData.onlineTime = (userData.onlineTime || 0) + 1;
          if(userData.onlineTime >= 10800){
            task.done = true;
            userData.points = (userData.points || 0) + task.pontos;
            await saveUserData(currentUser.email, userData);
            toast(`🎉 Tarefa "${task.titulo}" concluída! +${task.pontos} pontos!`);
            confetti();
            if(currentTab === 'tarefas') await renderTasks(userData);
          } else {
            await saveUserData(currentUser.email, userData);
          }
        }
      }
    }
  }, 1000);
}

async function checkSpecialTasks(){
  if(currentUser?.role !== 'colaborador') return;
  const userData = await loadUserData(currentUser.email);
  let needsUpdate = false;
  
  const task6 = (userData.tasks || []).find(t => t.id === 6);
  if(task6 && !task6.done){
    const approvedContents = (userData.contents || []).filter(c => c.status === 'Aprovado' && c.blogStatus === 'Publicado').length;
    if(approvedContents >= 3){
      task6.done = true;
      userData.points = (userData.points || 0) + task6.pontos;
      needsUpdate = true;
      toast(`🎉 Tarefa "${task6.titulo}" concluída! +${task6.pontos} pontos!`);
      confetti();
      if(currentTab === 'tarefas') await renderTasks(userData);
    }
  }
  
  const task7 = (userData.tasks || []).find(t => t.id === 7);
  if(task7 && !task7.done){
    const approvedPartners = (userData.partners || []).filter(p => p.status === 'Aprovado').length;
    if(approvedPartners >= 2){
      task7.done = true;
      userData.points = (userData.points || 0) + task7.pontos;
      needsUpdate = true;
      toast(`🎉 Tarefa "${task7.titulo}" concluída! +${task7.pontos} pontos!`);
      confetti();
      if(currentTab === 'tarefas') await renderTasks(userData);
    }
  }
  
  if(needsUpdate){
    await saveUserData(currentUser.email, userData);
  }
}

// Clean old chat messages periodically
setInterval(async () => {
  await clearOldChat();
}, 60 * 60 * 1000);

// Presence tracking
setInterval(async () => {
  if(currentUser){
    const profile = await currentProfile();
    await updatePresence(currentUser.uid || currentUser.email, {
      id: currentUser.uid || currentUser.email,
      nome: profile.nome,
      cidade: profile.cidade,
      role: currentUser.role
    });
    if(currentTab === 'comunidade') await renderCommunity();
  }
}, 15000);

// Login handling
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  try{
    const userCredential = await window.cpBlogApi.signIn(email, senha);
    const firebaseUser = userCredential.user;
    let role = 'colaborador';
    let isAdminUser = false;
    if(firebaseUser.uid === ADMIN_UID){
      role = 'admin';
      isAdminUser = true;
    }
    currentUser = {
      email: firebaseUser.email,
      role: role,
      nome: role === 'admin' ? 'Administrador' : 'Colaborador',
      cidade: 'Itacarambi',
      uid: firebaseUser.uid,
      isAdmin: isAdminUser
    };
    
    localStorage.setItem('cpSession', JSON.stringify({ email: firebaseUser.email }));
    
    if(role === 'colaborador'){
      let userData = await loadUserData(firebaseUser.email);
      if(!userData){
        userData = emptyUser(currentUser.nome, firebaseUser.email, currentUser.cidade);
        await saveUserData(firebaseUser.email, userData);
      }
    }
    
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.body.classList.toggle('is-admin', isAdminUser);
    await renderNav();
    await renderAll();
    window.showTab('dashboard');
    await clearOldChat();
    checkSpecialTasks();
    if(currentUser.role !== 'admin') startOnlineTracking();
    
    const profile = await currentProfile();
    await updatePresence(firebaseUser.uid || firebaseUser.email, {
      id: firebaseUser.uid || firebaseUser.email,
      nome: profile.nome,
      cidade: profile.cidade,
      role: currentUser.role
    });
    
  } catch(error){
    toast('Login inválido: ' + error.message);
  }
};

window.logout = function(){
  if(onlineInterval) clearInterval(onlineInterval);
  localStorage.removeItem('cpSession');
  location.reload();
};

// Check for existing session
const session = localStorage.getItem('cpSession');
if(session){
  try{
    const sessionData = JSON.parse(session);
    if(sessionData && sessionData.email){
      const emailInput = document.getElementById('email');
      if(emailInput) emailInput.value = sessionData.email;
    }
  } catch(e){}
}
