  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc, onSnapshot, setDoc, getDoc, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBVz5x3b04nybzJXFpMqsYJAFnDdfFf7fg",
      authDomain: "caminhos-peruacu-blog.firebaseapp.com",
      projectId: "caminhos-peruacu-blog",
      storageBucket: "caminhos-peruacu-blog.firebasestorage.app",
      messagingSenderId: "427400451429",
      appId: "1:427400451429:web:0a1a4eb36bdc94bc0c3d8c"
    };
    
    const app = initializeApp(firebaseConfig);
    const firestore = getFirestore(app);
    const auth = getAuth(app);
    
    window.cpBlogApi = {
      userEmail: '',
      userUid: '',
      auth: auth,
      signIn(email, password) {
        return signInWithEmailAndPassword(auth, email, password);
      },
      async createFirebaseUser(email, password, displayName) {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        return userCredential.user;
      },
      async publishPost(postData) {
        const postsCollection = collection(firestore, 'posts');
        const normalized = {
          title: postData.title || postData.titulo || 'Publicação do colaborador',
          category: postData.category || postData.categoria || 'COLABORADOR',
          excerpt: postData.excerpt || postData.resumo || '',
          full: postData.full || postData.texto || '',
          img: postData.img || '',
          video: postData.video || '',
          link: postData.link || '',
          gallery: Array.isArray(postData.gallery) ? postData.gallery : [],
          galleryLayout: Number(postData.galleryLayout || 3),
          autoCarousel: Boolean(postData.autoCarousel),
          isFeatured: Boolean(postData.isFeatured),
          author: postData.author || 'Central do Colaborador',
          source: 'central-colaborador',
          date: new Date().toISOString()
        };
        const ref = await addDoc(postsCollection, normalized);
        return { id: ref.id, ...normalized };
      },
      async deletePost(postId) {
        const postRef = doc(firestore, 'posts', postId);
        await deleteDoc(postRef);
        return true;
      },
      async loadPosts() {
        const postsCollection = collection(firestore, 'posts');
        const snap = await getDocs(query(postsCollection, orderBy('date', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async savePartner(partnerData) {
        const partnersCollection = collection(firestore, 'partners');
        if(partnerData.id) {
          const partnerRef = doc(firestore, 'partners', partnerData.id);
          await updateDoc(partnerRef, partnerData);
          return { id: partnerData.id, ...partnerData };
        }
        const docRef = await addDoc(partnersCollection, partnerData);
        return { id: docRef.id, ...partnerData };
      },
      async deletePartnerFirebase(partnerId) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await deleteDoc(partnerRef);
        return true;
      },
      async loadPartners() {
        const partnersCollection = collection(firestore, 'partners');
        const snap = await getDocs(query(partnersCollection, orderBy('createdAt', 'desc')));
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async updatePartnerStatus(partnerId, status, awarded, comissaoPaga) {
        const partnerRef = doc(firestore, 'partners', partnerId);
        await updateDoc(partnerRef, { status, awarded, comissaoPaga });
        return true;
      },
      async saveUser(userData) {
        const userRef = doc(firestore, 'users', userData.uid);
        await setDoc(userRef, userData, { merge: true });
        return userData;
      },
      async loadUser(uid) {
        const userRef = doc(firestore, 'users', uid);
        const snap = await getDoc(userRef);
        if(snap.exists()) return { uid: snap.id, ...snap.data() };
        return null;
      },
      async loadAllUsers() {
        const usersCollection = collection(firestore, 'users');
        const snap = await getDocs(usersCollection);
        const items = [];
        snap.forEach(doc => items.push({ uid: doc.id, ...doc.data() }));
        return items;
      },
      async deleteUserFirebase(uid) {
        const userRef = doc(firestore, 'users', uid);
        await deleteDoc(userRef);
        return true;
      },
      async saveMessage(messageData) {
        const messagesCollection = collection(firestore, 'messages');
        const ref = await addDoc(messagesCollection, messageData);
        return { id: ref.id, ...messageData };
      },
      async loadMessages(callback) {
        const messagesCollection = collection(firestore, 'messages');
        const q = query(messagesCollection, orderBy('time', 'desc'));
        const unsubscribe = onSnapshot(q, (snapshot) => {
          const items = [];
          snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          callback(items.reverse());
        });
        return unsubscribe;
      },
      async saveCert(certData) {
        const certsCollection = collection(firestore, 'certificates');
        if(certData.id) {
          const certRef = doc(firestore, 'certificates', certData.id);
          await setDoc(certRef, certData, { merge: true });
          return certData;
        } else {
          const ref = await addDoc(certsCollection, certData);
          return { id: ref.id, ...certData };
        }
      },
      async loadCerts(userUid) {
        const certsCollection = collection(firestore, 'certificates');
        let q = query(certsCollection, orderBy('requestDate', 'desc'));
        if(userUid) q = query(certsCollection, where('userUid', '==', userUid), orderBy('requestDate', 'desc'));
        const snap = await getDocs(q);
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async deleteCertFirebase(certId) {
        const certRef = doc(firestore, 'certificates', certId);
        await deleteDoc(certRef);
        return true;
      },
      async saveMaterial(materialData) {
        const materialsCollection = collection(firestore, 'materials');
        const materialId = materialData.id ? materialData.id.toString() : Date.now().toString();
        const materialRef = doc(firestore, 'materials', materialId);
        await setDoc(materialRef, { ...materialData, id: materialId });
        return { id: materialId, ...materialData };
      },
      async loadMaterials() {
        const materialsCollection = collection(firestore, 'materials');
        const snap = await getDocs(materialsCollection);
        const items = [];
        snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
      },
      async deleteMaterialFirebase(materialId) {
        const materialRef = doc(firestore, 'materials', materialId.toString());
        await deleteDoc(materialRef);
        return true;
      },
      async saveSettings(settingsData) {
        const settingsRef = doc(firestore, 'settings', 'appSettings');
        await setDoc(settingsRef, settingsData, { merge: true });
        return settingsData;
      },
      async loadSettings() {
        const settingsRef = doc(firestore, 'settings', 'appSettings');
        const snap = await getDoc(settingsRef);
        if(snap.exists()) return snap.data();
        return { whatsappConteudos: '', whatsappForum: '' };
      }
    };
    
    window.dispatchEvent(new CustomEvent('cpBlogApiReady'));
  </script>

// ==================== FUNÇÕES DE SINCRONIZAÇÃO FIREBASE ====================
async function syncCertsFromFirebase() {
  if(!window.cpBlogApi) return;
  try {
    const userUid = (currentUser?.role === 'admin' || currentUser?.uid === ADMIN_UID) ? null : currentUser?.uid;
    const certs = await window.cpBlogApi.loadCerts(userUid);
    firebaseCerts = certs;
    console.log('✅ Certificados sincronizados:', firebaseCerts.length);
    if(currentTab === 'certificados') renderCerts();
    if(currentTab === 'admin' && currentUser?.uid === ADMIN_UID) renderAdmin();
  } catch(e) { 
    console.error('Erro sync certs:', e);
  }
}

async function saveCertToFirebase(certData) {
  if(!window.cpBlogApi) return;
  try {
    await window.cpBlogApi.saveCert(certData);
    await syncCertsFromFirebase();
  } catch(e) { 
    console.error('Erro save cert:', e);
    toast('Erro ao salvar certificado: ' + e.message);
  }
}

// ==================== FUNÇÃO CORRIGIDA PARA SOLICITAR CERTIFICADO ====================
window.askCert = async function(nome, pts){ 
  const existingCert = firebaseCerts.find(c => 
    c.userUid === currentUser?.uid && 
    c.nome === nome && 
    c.status !== 'Rejeitado'
  );
  
  if(existingCert){ 
    if(existingCert.status === 'Pendente') {
      return toast('⏳ Você já possui uma solicitação pendente para este certificado.');
    }
    if(existingCert.status === 'Aprovado') {
      return toast('✅ Você já possui este certificado aprovado!');
    }
  }
  
  const certData = { 
    id: `${Date.now()}_${currentUser?.uid}_${nome.replace(/\s/g, '')}`,
    userUid: currentUser?.uid, 
    usuario: currentUserData?.profile?.nome || currentUser?.email || 'Colaborador', 
    nome: nome, 
    pts: pts, 
    status: 'Pendente', 
    requestDate: new Date().toISOString(), 
    certificadoUrl: '', 
    motivo: '' 
  }; 
  
  try {
    await window.cpBlogApi.saveCert(certData);
    await syncCertsFromFirebase();
    toast('📜 Certificado solicitado para análise!');
    if(currentTab === 'certificados') renderCerts();
  } catch(error) {
    console.error('Erro ao salvar certificado:', error);
    toast('Erro ao solicitar certificado: ' + error.message);
  }
};

  document.getElementById('certModalBody').innerHTML = `
    <h2>✅ Aprovar Certificado: ${cert.nome}</h2>
    <p>👤 Colaborador: ${cert.usuario}</p>

    <p class="hint" style="margin-top:8px">Cole o link onde o colaborador poderá baixar o certificado</p>
    <div class="actions" style="margin-top:16px">
      <button class="ok" onclick="window.approveCertWithLink('${certId}')">✅ APROVAR</button>
      <button class="danger" onclick="closeCertModal()">Cancelar</button>
    </div>
  `;
  document.getElementById('certModal').style.display = 'flex';
};

window.closeCertModal = function(){ document.getElementById('certModal').style.display = 'none'; };

window.approveCertWithLink = async function(certId){
  const link = document.getElementById('certLink')?.value.trim();
  if(!link) return toast('Insira o link do certificado');
  if(!link.startsWith('http://') && !link.startsWith('https://')) return toast('Insira um link válido');
  const cert = firebaseCerts.find(c => c.id == certId);
  if(cert){
    cert.status = 'Aprovado';
    cert.certificadoUrl = link;
    await saveCertToFirebase(cert);
    toast(`✅ Certificado "${cert.nome}" aprovado!`);
    renderAll();
    closeCertModal();
  }
};

window.rejectCertPrompt = async function(certId){
  const motivo = prompt('Informe o motivo da rejeição:', 'Não atende aos critérios necessários');
  if(motivo === null) return;
  if(motivo.trim() === '') return toast('Informe um motivo para rejeição');
  const cert = firebaseCerts.find(c => c.id == certId);
  if(cert){ 
    cert.status = 'Rejeitado'; 
    cert.motivo = motivo; 
    await saveCertToFirebase(cert); 
    toast(`❌ Certificado "${cert.nome}" rejeitado.`); 
    renderAll(); 
  }
};

  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  try {
    const userCredential = await window.cpBlogApi.signIn(email, senha);
    const firebaseUser = userCredential.user;
    let role = 'colaborador';
    let isAdminUser = false;
    if(firebaseUser.uid === ADMIN_UID) { role = 'admin'; isAdminUser = true; }
    
    currentUser = {
      email: firebaseUser.email,
      role: role,
      nome: role === 'admin' ? 'Administrador' : 'Colaborador',
      cidade: 'Itacarambi',
      uid: firebaseUser.uid,
      isAdmin: isAdminUser
    };
    
    if(role === 'colaborador') {
      let userFromFirebase = await window.cpBlogApi.loadUser(firebaseUser.uid);
      if(!userFromFirebase) {
        const newUser = {
          uid: firebaseUser.uid,
          email: firebaseUser.email,
          points: 0,
          profile: { nome: currentUser.nome, cidade: currentUser.cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' },
          training: { answered: {}, bonus: [], completedAt: {} },
          tasks: JSON.parse(JSON.stringify(defaultTasks)),
          contents: [],
          onlineTime: 0,
          createdAt: new Date().toISOString()
        };
        await window.cpBlogApi.saveUser(newUser);
        currentUserData = newUser;
      } else {
        currentUserData = userFromFirebase;
      }
    }
    
    localStorage.setItem('cpSession', JSON.stringify(currentUser));
    await syncUsersFromFirebase();
    await syncPartnersFromFirebase();
    await syncCertsFromFirebase();
    await syncMaterialsFromFirebase();
    await syncSettingsFromFirebase();
    await initMessagesListener();
    startApp();
  } catch(error) {
    toast('Login inválido: ' + error.message);
  }
};

// ==================== DEMAIS FUNÇÕES NECESSÁRIAS (COMPACTADAS) ====================
async function syncUsersFromFirebase() {
  if(!window.cpBlogApi) return;
  try {
    firebaseUsers = await window.cpBlogApi.loadAllUsers();
    if(currentUser && currentUser.uid !== ADMIN_UID) {
      const fbUser = await window.cpBlogApi.loadUser(currentUser.uid);
      if(fbUser) {
        currentUserData = fbUser;
        if(!currentUserData.tasks) currentUserData.tasks = JSON.parse(JSON.stringify(defaultTasks));
        if(!currentUserData.training) currentUserData.training = { answered: {}, bonus: [], completedAt: {} };
        if(!currentUserData.contents) currentUserData.contents = [];
        if(!currentUserData.onlineTime) currentUserData.onlineTime = 0;
        if(!currentUserData.points) currentUserData.points = 0;
        if(!currentUserData.profile) currentUserData.profile = { nome: currentUser.nome || 'Colaborador', cidade: 'Itacarambi', telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' };
        await window.cpBlogApi.saveUser(currentUserData);
      }
    }
    if(currentTab === 'admin' && currentUser?.uid === ADMIN_UID) renderAdmin();
    if(currentTab === 'ranking') renderRanking();
    if(currentTab === 'comunidade') renderCommunity();
  } catch(e) { console.error('Erro sync users:', e); }
}

async function syncPartnersFromFirebase() {
  if(!window.cpBlogApi) return;
  try {
    firebasePartners = await window.cpBlogApi.loadPartners();
    if(currentTab === 'parceiros') renderPartners();
    if(currentUser?.uid === ADMIN_UID && currentTab === 'admin') renderAdmin();
  } catch(e) { console.error('Erro sync partners:', e); }
}

async function syncMaterialsFromFirebase() {
  if(!window.cpBlogApi) return;
  try {
    firebaseMaterials = await window.cpBlogApi.loadMaterials();
    if(firebaseMaterials.length === 0) {
      for(const m of defaultMaterials) {
        await window.cpBlogApi.saveMaterial(m);
      }
      firebaseMaterials = await window.cpBlogApi.loadMaterials();
    }
    if(currentTab === 'materiais') renderMaterials();
    if(currentTab === 'admin' && currentUser?.uid === ADMIN_UID) renderAdmin();
  } catch(e) { console.error('Erro sync materials:', e); }
}

async function syncSettingsFromFirebase() {
  if(!window.cpBlogApi) return;
  try {
    firebaseSettings = await window.cpBlogApi.loadSettings();
    if(currentTab === 'comunidade') renderCommunity();
  } catch(e) { console.error('Erro sync settings:', e); }
}

async function initMessagesListener() {
  if(messagesUnsubscribe) messagesUnsubscribe();
  if(!window.cpBlogApi) return;
  messagesUnsubscribe = await window.cpBlogApi.loadMessages((messages) => {
    firebaseMessages = messages;
    if(currentTab === 'comunidade') renderCommunity();
  });
}

async function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const isAdmin = (currentUser?.uid === ADMIN_UID);
  document.body.classList.toggle('is-admin',isAdmin);
  await syncUsersFromFirebase();
  await syncPartnersFromFirebase();
  await syncCertsFromFirebase();
  await syncMaterialsFromFirebase();
  await syncSettingsFromFirebase();
  await initMessagesListener();
  renderNav();
  renderAll();
  showTab('dashboard');
  if(currentUser.role !== 'admin') startOnlineTracking();
  await checkSpecialTasks();
}

window.logout=async function(){
  if(onlineInterval) clearInterval(onlineInterval);
  if(messagesUnsubscribe) messagesUnsubscribe();
  localStorage.removeItem('cpSession');
  location.reload();
};

function toggleMenu(){document.getElementById('sidebar').classList.toggle('open')}
function renderNav(){const isAdmin = (currentUser?.uid === ADMIN_UID);document.getElementById('nav').innerHTML=navItems.map(x=>`<button class="${x[0]===currentTab?'active':''} ${x[0]==='admin' && !isAdmin?'admin-only':''}" onclick="window.showTab('${x[0]}')"><span>${x[1]}</span>${x[2]}</button>`).join('')}
window.showTab=function(id){currentTab=id;document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));document.getElementById('pageTitle').textContent=navItems.find(x=>x[0]===id)[2];document.getElementById('sidebar').classList.remove('open');renderNav();renderAll()};

async function renderAll(){
  if(!currentUser)return;
  document.getElementById('sideName').textContent=currentUser.role==='admin'?'Administrador':currentUserData?.profile?.nome || 'Colaborador';
  document.getElementById('sideLevel').textContent=currentUser.role==='admin'?'Painel administrativo':level();
  document.getElementById('sidePoints').textContent=currentUser.role==='admin'?'Admin':(currentUserData?.points || 0)+' pontos';
  renderDashboard();
  renderTraining();
  renderMaterials();
  renderTasks();
  renderPartners();
  renderRanking();
  renderCerts();
  renderCommunity();
  renderProfile();
  renderBlog();
  renderAdmin();
}

function renderDashboard(){const doneTasks=currentUserData?.tasks?.filter(t=>t.done).length || 0,closed=firebasePartners.filter(p=>p.status==='Aprovado' && p.userUid === currentUser?.uid).length,ans=totalAnswered(),nl=nextLevel(),pct=nl[1]===0?100:Math.min(100,Math.round((currentUserData?.points||0)/nl[1]*100));document.getElementById('dashboard').innerHTML=`<div class="grid"><div class="card stat"><span>Pontos</span><b>${currentUserData?.points || 0}</b></div><div class="card stat"><span>Nível</span><b>${level()}</b></div><div class="card stat"><span>Treino</span><b>${ans}/50</b></div><div class="card stat"><span>Tarefas / Parceiros</span><b>${doneTasks}/${currentUserData?.tasks?.length || 8} · ${closed}</b></div></div><div class="card" style="margin-top:16px"><div class="item-head"><div><h2>Progresso até ${nl[0]}</h2><p class="hint">Pontuação dinâmica atualizada em tempo real.</p></div><span class="pill gold">${pct}%</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>`}

// Funções restantes (treinamento, tarefas, parceiros, etc) mantidas intactas...
// [O código continua com todas as outras funções normalmente]

const session = localStorage.getItem('cpSession');
if(session){
  currentUser = JSON.parse(session);
  if(currentUser.uid === ADMIN_UID){
    currentUser.role = 'admin';
    currentUser.isAdmin = true;
  } else {
    currentUser.role = 'colaborador';
  }
  (async () => {
    await syncUsersFromFirebase();
    await syncPartnersFromFirebase();
    await syncCertsFromFirebase();
    await syncMaterialsFromFirebase();
    await syncSettingsFromFirebase();
    await initMessagesListener();
    if(currentUser.role === 'colaborador') {
      currentUserData = await window.cpBlogApi.loadUser(currentUser.uid);
      if(!currentUserData) {
        currentUserData = {
          uid: currentUser.uid,
          email: currentUser.email,
          points: 0,
          profile: { nome: currentUser.nome, cidade: currentUser.cidade, telefone: '', bio: 'Colaborador do projeto Caminhos do Peruaçu.' },
          training: { answered: {}, bonus: [], completedAt: {} },
          tasks: JSON.parse(JSON.stringify(defaultTasks)),
          contents: [],
          onlineTime: 0,
          createdAt: new Date().toISOString()
        };
        await window.cpBlogApi.saveUser(currentUserData);
      }
    }
    startApp();
  })();
}
</script>
